<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vocabulary – Gen AI in the OFSE Industry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f1f2e;--ink2:#1e3a52;
  --accent:#ea580c;--accent2:#c2410c;
  --sky:#fff7ed;--bg:#fefcfa;--border:#fdba74;
  --r:14px;--shadow:0 4px 24px rgba(15,31,46,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:linear-gradient(135deg,#0f1f2e 0%,#1e3a52 55%,#ea580c 100%);color:#fff;padding:2.2rem 1.5rem 1.8rem;text-align:center}
header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.5rem,4vw,2.4rem);margin-bottom:.4rem}
header p{font-size:.92rem;opacity:.85}
.badge{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:.25rem .9rem;font-size:.78rem;margin-bottom:.7rem;letter-spacing:.04em}
.controls{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;padding:1.2rem 1rem .6rem;max-width:860px;margin:0 auto}
.controls button{border:2px solid var(--border);background:#fff;color:var(--ink2);border-radius:30px;padding:.38rem .95rem;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .18s}
.controls button.active,.controls button:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.stats{text-align:center;font-size:.8rem;color:var(--ink2);padding:.2rem 0 .8rem;opacity:.75}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.1rem;padding:0 1rem 2rem;max-width:1100px;margin:0 auto}
.card{perspective:900px;cursor:pointer;height:210px}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--r);padding:1.1rem 1.15rem;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}
.front{background:#fff;border:2px solid var(--border)}
.back{background:var(--sky);border:2px solid var(--accent);transform:rotateY(180deg)}
.tag{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.18rem .55rem;border-radius:10px;color:#fff;width:fit-content}
.tag-phrasal{background:#0891b2}
.tag-idiom{background:#7c3aed}
.tag-colloc{background:#0f1f2e}
.tag-vocab{background:#c0392b}
.tag-biz{background:#ea580c}
.word{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--ink);line-height:1.2;margin:.35rem 0 .1rem}
.pron{font-size:.78rem;color:var(--ink2);font-style:italic;margin-bottom:.2rem}
.ko{font-size:.88rem;color:var(--ink2);font-weight:500}
.diff{display:flex;gap:3px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--accent)}
.back .word{font-size:1.1rem;color:var(--ink)}
.nuance{font-size:.82rem;color:#374151;line-height:1.55;flex:1;margin:.35rem 0 .2rem;overflow:hidden}
.learned-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.35rem .8rem;font-size:.75rem;font-weight:700;cursor:pointer;align-self:flex-end;transition:background .2s}
.learned-btn.done{background:#10b981;color:#fff}
.card.learned .front{border-color:#10b981;background:#f0fff8}
</style>
</head>

<script>
const STORE_KEY='ofse_genai_learned';
const learned=new Set(JSON.parse(localStorage.getItem(STORE_KEY)||'[]'));
const cards=[
  {id:'pv1',type:'phrasal',word:'lag behind',ko:'뒤처지다, 기대치에 못 미치다',pron:'[læɡ bɪˈhaɪnd]',nuance:'"lag"은 원래 통 제조에서 나무판이 늘어지는 것을 뜻했다. 현재는 기대 속도나 경쟁자 대비 진전이 느린 상태. "progress lags behind intent" = 실제 진전이 의도보다 뒤처져 있다. "lag behind peers" = 동종 업계 대비 뒤처지다. "time lag" = 시간 지연. 명사형 "laggard"는 구조적 뒤처짐의 뉘앙스가 더 강함.',diff:1,ex:'Gen AI adoption in the OFSE sector has not met initial expectations—progress continues to <b>lag behind</b> intent, with only 1% achieving significant scale.'},
  {id:'pv2',type:'phrasal',word:'hold back',ko:'저지하다, 발목을 잡다, 나아가지 못하게 하다',pron:'[həʊld bæk]',nuance:'"hold"(붙잡다) + "back"(뒤로). 어떤 힘이 앞으로 나아가려는 움직임을 막거나 늦추는 것. "hold companies back" = 기업들의 진전을 막다. "hold back growth" = 성장을 저해하다. 수동적으로 억제하는 느낌. 능동적으로 방해하는 "prevent"와 달리 "hold back"은 구조적 장벽이나 관성에 의한 억제를 함의.',diff:1,ex:'Certain hurdles <b>hold</b> OFSE companies <b>back</b> from realizing gen AI\'s potential—data fragmentation, organizational readiness, and unclear ROI chief among them.'},
  {id:'pv3',type:'phrasal',word:'fall short of',ko:'~에 미치지 못하다, 목표에 달하지 못하다',pron:'[fɔːl ʃɔːt əv]',nuance:'"fall short" = 거리·높이가 충분하지 않아 목표에 닿지 못하는 것. 총알이 과녁에 닿지 못하고 땅에 떨어지는 이미지. "fall short of expectations" = 기대에 미치지 못하다. "fall short of target" = 목표 미달. 실패(fail)보다는 어느 정도 진전이 있었지만 기대치에는 못 미쳤다는 더 정확한 표현.',diff:1,ex:'Reported adoption <b>fell short of</b> the 2023 target, with less than 25% of companies showing some use by 2025—far below the expected 72%.'},
  {id:'pv4',type:'phrasal',word:'embed into',ko:'~에 깊이 내재화하다, 일상 업무 흐름에 녹아들게 하다',pron:'[ɪmˈbed ˈɪntə]',nuance:'"embed"는 무언가를 단단한 재질 속에 고정시키는 것에서 유래. IT·경영에서는 기술·프로세스·행동을 조직의 일상 업무나 시스템 속에 깊숙이 통합하는 것. "embed gen AI into daily workflows" = gen AI를 단발성 도구가 아닌 일상 업무의 일부로 만들다. "embed into core operational processes" = 핵심 운영 프로세스에 내재화하다. 피상적 도입과 대비되는 깊이 있는 통합을 의미.',diff:2,ex:'To sustain value creation, OFSE leaders must <b>embed</b> gen AI capabilities <b>into</b> daily workflows through upskilling and responsible AI governance.'},
  {id:'pv5',type:'phrasal',word:'tie to',ko:'~에 연결하다, ~와 직접 연동하다',pron:'[taɪ tuː]',nuance:'"tie"(묶다)의 비유적 사용. 두 가지를 강하게 연결하여 하나의 결과가 다른 것에 의존하도록 만드는 것. "tie every gen AI initiative to measurable outcomes" = 모든 gen AI 이니셔티브를 측정 가능한 비즈니스 성과에 직접 연동하다. "tie investment to ROI" = 투자를 ROI에 연계하다. 막연한 AI 도입이 아니라 정량적 비즈니스 목표와 명시적으로 연결하는 책임 있는 접근의 핵심.',diff:2,ex:'To realize gen AI\'s potential, OFSE companies need to <b>tie</b> the technology <b>to</b> defined business outcomes rather than pursuing pilots for their own sake.'},
  {id:'pv6',type:'phrasal',word:'bridge the gap',ko:'격차를 해소하다, 차이를 좁히다',pron:'[brɪdʒ ðə ɡæp]',nuance:'강 양쪽 사이에 다리를 놓아 단절을 연결하는 이미지. 두 가지 간의 격차(실제 vs 기대, 현재 역량 vs 목표)를 채우는 것. "bridge talent gaps" = 인재 부족을 보완하다. "bridge the gap between pilot and production" = 파일럿과 실제 운영 사이의 간극을 메우다. "skill gap"(역량 격차), "adoption gap"(도입 격차) 등과 자주 결합. 단순한 개선이 아니라 구조적 연결을 만드는 의미.',diff:1,ex:'Leaders can <b>bridge</b> talent <b>gaps</b> through targeted partnerships and ecosystem collaboration—gen AI applications can also work with unstructured data, reducing barriers.'},

  {id:'id1',type:'idiom',word:'pilot paralysis',ko:'파일럿 마비 — 소규모 시범 사업에서 벗어나지 못하는 조직 상태',pron:'[ˈpaɪlət pəˈræləsɪs]',nuance:'"pilot paralysis" = 파일럿이 많이 실행되지만 그 어느 것도 전사 규모로 확장되지 못하고 파일럿 단계에서 동결되는 현상. "파괴적 혁신에 열망은 있지만 실행은 없는" 조직의 전형적 병리. 이 기사에서 직접 사용된 핵심 표현. 원인: 불명확한 ROI, 레거시 시스템 통합 복잡성, 변화 관리 부재. 반도체 분야의 "analysis paralysis"와 유사한 구조.',diff:2,ex:'These challenges have left parts of the OFSE industry in "<b>pilot paralysis</b>," preventing scale—only 1% of companies achieved significant gen AI deployment by 2025.'},
  {id:'id2',type:'idiom',word:'green-light',ko:'승인하다, 진행 허가를 내리다',pron:'[ˈɡriːn laɪt]',nuance:'교통 신호등의 녹색 불(go = 진행)에서 유래. 프로젝트·이니셔티브에 공식 승인을 내려 진행을 허용하는 것. "get green-lighted" = 승인을 받다. "Our company culture is conservative, and experimenting with gen AI would not get green-lighted easily" = 보수적인 기업 문화에서 gen AI 시도가 쉽게 승인받지 못한다는 현실. 동사·명사 겸용: "give the green light" = 승인을 주다.',diff:1,ex:'"Our company culture is conservative, and experimenting with gen AI would not get <b>green-lighted</b> easily." — Executive vice president, asset owner company.'},
  {id:'id3',type:'idiom',word:'move the needle',ko:'의미 있는 차이를 만들다, 수치를 실질적으로 움직이다',pron:'',nuance:'계기판의 바늘(needle)이 움직이는 이미지에서 유래. 작은 변화가 아니라 측정 가능하고 의미 있는 성과 향상을 만들어내는 것. "gen AI adoption has not moved the needle on EBITDA" = gen AI 도입이 EBITDA에 실질적 변화를 만들지 못했다. "move the needle from X to Y" = 지표를 X에서 Y로 실질적으로 변화시키다. 단순히 활동을 늘리는 것이 아니라 결과에 변화를 만든다는 강조.',diff:2,ex:'Scaling gen AI could <b>move the needle</b> significantly—translating into an EBITDA gain of $12 billion to $20 billion for the OFSE industry.'},
  {id:'id4',type:'idiom',word:'on the cusp of',ko:'~의 직전에; 전환점 바로 앞에',pron:'[ɒn ðə kʌsp əv]',nuance:'"cusp"은 두 곡선이 만나는 뾰족한 끝점(점성술에서는 별자리 경계). "on the cusp of"는 한 시대에서 다른 시대로 넘어가는 바로 그 경계에 서 있는 상태. "on the cusp of transformation" = 변혁이 시작되려는 바로 그 순간. "cusp of a new era" = 새 시대의 직전. 기회와 전환이 동시에 강조되는 표현으로, 지금 행동하지 않으면 기회를 놓친다는 긴박감을 내포.',diff:2,ex:'The OFSE industry is <b>on the cusp of</b> a transformation—those who act decisively now will define the next era; those who wait will lag behind permanently.'},
  {id:'id5',type:'idiom',word:'lead the charge',ko:'앞장서서 이끌다, 변화의 선두에 서다',pron:'',nuance:'"charge"는 군사 용어로 돌격. "lead the charge" = 돌격의 맨 앞에 서다. 비즈니스에서는 변화·혁신·캠페인의 선두에 서서 적극적으로 이끄는 것. "visible leadership" = 리더가 직접 나서서 보이는 방식으로 AI 전환을 추진하는 것. 반대: "wait and see" (관망하다). 이 기사에서 리더들이 실험에서 실행으로 과감히 전환해야 한다는 메시지와 직결.',diff:1,ex:'The moment has arrived for OFSE leaders to <b>lead the charge</b>—moving decisively from AI experimentation to execution before the competitive gap becomes insurmountable.'},
  {id:'id6',type:'idiom',word:'pick up the pace',ko:'속도를 높이다, 더 빠르게 추진하다',pron:'',nuance:'"pace"(걸음 속도). 현재의 속도가 불충분하여 더 빨리 나아가야 한다는 촉구. "OFSE gen AI adoption needs to pick up the pace" = 지금 속도로는 목표를 달성하기 어렵다. "pick up"은 기존의 흐름을 이어받아 가속하는 뉘앙스. "speed up"보다 연속성을 강조. "the pace of AI adoption" = AI 도입의 속도. 지금 행동해야 한다는 긴박감을 전달.',diff:1,ex:'With only 1% having achieved significant scale, the OFSE industry urgently needs to <b>pick up the pace</b> of gen AI adoption before competitors widen the gap.'},

  {id:'cl1',type:'colloc',word:'bottom-line impact',ko:'순이익 영향 — 회사의 최종 수익에 직접 영향을 미치는 결과',pron:'',nuance:'"bottom line" = 손익계산서의 맨 아래 줄(순이익). "bottom-line impact" = gen AI 도입이 비용·매출·마진에 직접적으로 미치는 재무적 효과. "create significant bottom-line impact" = 단순한 효율화가 아니라 실제 이익에 측정 가능한 변화를 만드는 것. 반대: "top-line impact" = 매출 증대. EBITDA gain $12B~$20B이 이 기사의 핵심 bottom-line impact 주장.',diff:2,ex:'To scale gen AI and create significant <b>bottom-line impact</b>, OFSE leaders must anchor every initiative in six critical enablers across strategy, capabilities, and change management.'},
  {id:'cl2',type:'colloc',word:'responsible AI governance',ko:'책임 있는 AI 거버넌스 — 윤리적·투명한 AI 사용을 위한 규칙과 감독 체계',pron:'',nuance:'"responsible AI" = 편향·오류·프라이버시 침해·안전 리스크를 관리하는 AI 사용 원칙. "governance" = 의사결정 구조와 책임 체계. "responsible AI governance" = 누가 어떤 기준으로 AI를 사용·감독하는지 명시적으로 정의하는 것. "risk and responsible use of AI across the organization" = 조직 전반에서의 리스크 관리. AI 확산이 빠를수록 거버넌스 공백이 리스크를 키운다.',diff:3,ex:'Change management includes visible leadership, <b>responsible AI governance</b>, and upskilling employees—ensuring gen AI is deployed ethically at scale.'},
  {id:'cl3',type:'colloc',word:'legacy system integration',ko:'레거시 시스템 통합 — 기존 구형 IT 인프라를 새로운 AI 플랫폼과 연결하는 것',pron:'',nuance:'"legacy system" = 오래되었지만 여전히 사용 중인 IT 시스템(ERP, 데이터베이스, SCADA 등). "integration" = 다른 시스템과 데이터·프로세스를 연결하는 것. OFSE 산업에서 파일럿이 전사 확장에 실패하는 가장 큰 기술적 이유. 50% 이상의 OFSE 리더가 레거시 시스템 통합을 주요 장벽으로 꼽음. "inconsistent data quality across global project sites" = 글로벌 프로젝트 사이트 간 데이터 품질 불일치.',diff:2,ex:'More than 50% of respondents cited data fragmentation and <b>legacy system integration</b> as the main barriers to scaling gen AI across geographies and functions.'},
  {id:'cl4',type:'colloc',word:'digital infrastructure',ko:'디지털 인프라 — AI와 데이터 운용을 뒷받침하는 기술 기반 환경',pron:'',nuance:'클라우드 플랫폼, 데이터 파이프라인, 네트워크, 컴퓨팅 자원 등 AI·디지털 역량을 구동하는 기술 기반 전체. 65%의 OFSE 리더가 10억 달러 투자 시 "digital infrastructure and AI capabilities"를 최우선으로 꼽음. "scalable tech stack and infrastructure to support multiple gen AI applications" = 여러 gen AI 응용 프로그램을 지원할 수 있는 확장 가능한 기술 스택.',diff:1,ex:'65% of leaders said they would prioritize <b>digital infrastructure</b> and AI capabilities if given $1 billion to strengthen their business.'},
  {id:'cl5',type:'colloc',word:'pilot phase',ko:'파일럿 단계 — 소규모 시범 테스트 단계; 전사 배포 이전의 검증 구간',pron:'',nuance:'"pilot"(조종사)에서 유래 — 먼저 경로를 시험해보는 사람. "pilot phase" = 소수의 사용자·지역·기능에 한정하여 기술을 시험하는 단계. "beyond pilot phases" = 파일럿을 넘어 실제 운영 규모로 확장. "pilot to production" = 테스트 환경에서 실제 운영 환경으로 전환. "pilot paralysis" = 이 단계에서 영구적으로 멈추는 조직 병리.',diff:1,ex:'Currently less than 25% of OFSE companies have progressed beyond <b>pilot phases</b>—the gap between enthusiastic intent and actual scale is stark.'},
  {id:'cl6',type:'colloc',word:'operating model',ko:'운영 모델 — 전략을 실행하기 위해 조직이 인력·프로세스·기술을 구조화하는 방식',pron:'',nuance:'"operating model" = 기업이 전략적 목표를 달성하기 위해 조직 구조, 프로세스, 기술, 의사결정 방식을 어떻게 설계하는지에 대한 청사진. gen AI 맥락에서는 AI 전담팀 구성, 역할 재정의, 중앙집중 vs 분산 배치 결정 등을 포함. "scalable operating model" = 규모가 커져도 효율이 유지되는 운영 구조. "operating models may need to evolve to support autonomous, agent-enabled workflows" = 에이전틱 AI 시대의 운영 모델 진화.',diff:2,ex:'OFSE leaders must assess how they structure their <b>operating models</b> to deploy gen AI effectively—and evolve them further to support agentic AI workflows.'},
  {id:'cl7',type:'colloc',word:'unstructured data',ko:'비정형 데이터 — 사전 정의된 포맷이 없는 데이터 (텍스트, 이미지, 음성 등)',pron:'',nuance:'"structured data" = 엑셀·데이터베이스처럼 행·열로 정렬된 데이터. "unstructured data" = 이메일, 보고서 PDF, 유지보수 기록, 현장 메모, 이미지, 음성 등 정해진 포맷이 없는 데이터. 전 세계 데이터의 약 80%가 비정형. 기존 분석 도구로는 처리가 어려웠으나 gen AI(LLM)는 비정형 데이터를 그대로 처리·분석할 수 있어 OFSE 산업의 현장 데이터 활용에 핵심 돌파구.',diff:2,ex:'Gen AI applications can work with <b>unstructured data</b>, reducing barriers to scaling—low data quality and fragmentation are less of an obstacle than leaders assume.'},

  {id:'vc1',type:'vocab',word:'OFSE',ko:'석유 서비스·장비 산업 — Oilfield Services and Equipment',pron:'[ˌəʊ ef es ˈiː]',nuance:'Oilfield Services and Equipment. 석유·가스 시추, 생산, 유지보수에 필요한 서비스와 장비를 제공하는 산업 분류. Schlumberger(SLB), Halliburton, Baker Hughes 등이 대표적. 통합 서비스 공급자(integrated service provider), EPC 기업, 장비 제조사, 서비스 전문 기업을 포괄. E&P(탐사·생산) 기업과 달리 OFSE는 기술·서비스·장비를 제공하는 B2B 공급망에 위치.',diff:1,ex:'The <b>OFSE</b> industry could capture up to $20 billion per year by scaling AI—yet less than 25% of companies have progressed beyond the pilot phase.'},
  {id:'vc2',type:'vocab',word:'scalable',ko:'확장 가능한 — 규모가 커져도 비용 대비 효율이 유지되는',pron:'[ˈskeɪləbəl]',nuance:'"scale"(규모) + "-able"(가능한). 소수의 사용자·지역·기능에서 검증된 솔루션을 전 조직으로 확대할 때 기술·프로세스·비용이 비례적으로 폭발하지 않는 특성. "scalable operating model" = 확장해도 효율이 유지되는 운영 구조. "not scalable" = 소규모에서는 작동하지만 규모가 커지면 무너지는 솔루션. gen AI 파일럿의 가장 큰 과제가 "scalability".',diff:1,ex:'To realize gen AI\'s potential, OFSE companies must establish <b>scalable</b> operating models—linking the technology to business outcomes at enterprise level.'},
  {id:'vc3',type:'vocab',word:'fragmentation',ko:'파편화 — 데이터·시스템·조직이 분산되어 통합되지 않은 상태',pron:'[ˌfræɡmənˈteɪʃən]',nuance:'"fragment"(조각) → "fragmentation"(파편화). OFSE 산업에서 데이터 파편화는 서로 다른 지역, 프로젝트, 사업부의 데이터가 서로 다른 포맷·시스템에 분산되어 있어 통합적 AI 분석이 어려운 상태. "data fragmentation and legacy system integration" = OFSE gen AI 확장의 가장 큰 기술적 장벽 1위(50%+ 응답). "organizational fragmentation" = 조직 간 사일로로 협업이 어려운 상태.',diff:2,ex:'<b>Fragmentation</b> of data across global project sites, combined with legacy systems, prevents successful pilots from scaling across geographies or functions.'},
  {id:'vc4',type:'vocab',word:'diligently',ko:'성실하게, 꾸준히, 철저하게',pron:'[ˈdɪlɪdʒəntli]',nuance:'"diligent"(근면한, 성실한)의 부사형. 라틴어 "diligere"(소중히 하다, 꼼꼼히 챙기다)에서 유래. 단순히 열심히가 아니라 꾸준하고 체계적으로 추진한다는 의미. "by diligently scaling AI" = AI를 성실하고 체계적으로 확장함으로써. 빠른 실행만큼 지속성과 체계성을 강조하는 뉘앙스. 전략적 일관성(strategic commitment)과 함께 쓰이는 경우가 많음.',diff:2,ex:'The OFSE industry could capture up to an additional $20 billion per year by <b>diligently</b> scaling AI—both generative and analytical—in its current operations.'},
  {id:'vc5',type:'vocab',word:'insurmountable',ko:'극복 불가능한 것처럼 보이는 — 하지만 사실 극복 가능한',pron:'[ˌɪnsəˈmaʊntəbl]',nuance:'"sur-"(위) + "mount"(오르다) + "-able"(가능한) + "in-"(부정). "insurmountable" = 넘을 수 없는 산. 이 기사에서는 "these challenges are not insurmountable" = 장벽이 높아 보이지만 실제로는 극복 가능하다는 메시지. 어려움의 크기를 인정하면서도 해결 가능하다는 낙관을 동시에 전달하는 수사적 장치. "seemingly insurmountable barriers" = 겉보기에 극복 불가능해 보이는 장벽.',diff:3,ex:'Significant barriers such as fragmented data, legacy systems, and limited organizational readiness are holding back progress, but these challenges are not <b>insurmountable</b>.'},
  {id:'vc6',type:'vocab',word:'reskilling',ko:'리스킬링 — 완전히 새로운 역할에 맞게 처음부터 재교육하는 것',pron:'[ˌriːˈskɪlɪŋ]',nuance:'"re-"(다시) + "skill"(역량). "upskilling"(기존 직무에서 더 높은 수준의 역량 추가)과 달리, "reskilling"은 기존 업무가 자동화되거나 사라질 때 전혀 다른 역할·기술을 새로 습득하는 것. "upskilling or reskilling employees" = AI로 변화하는 직무에 맞춰 역량을 향상하거나 전환하는 것. OFSE에서 현장 운영직(operational frontline)이 디지털·데이터 리터러시를 갖추는 것이 대표적 사례.',diff:2,ex:'Change management includes visible leadership and <b>reskilling</b> or upskilling employees with capabilities that will embed gen AI into daily workflows across the organization.'},
  {id:'vc7',type:'vocab',word:'differentiator',ko:'차별화 요소 — 경쟁사 대비 고유하고 우월한 가치를 만드는 요소',pron:'[dɪˈferentɪˌeɪtər]',nuance:'"differentiate"(구별하다)의 명사형. 유사한 제품·서비스가 많은 시장에서 특정 기업만의 강점으로 고객이 그 기업을 선택하게 만드는 특성. "gen AI as a source of competitive advantage through enhanced service quality, accelerated delivery, and tailored, data-driven solutions" = gen AI를 단순 비용 절감 도구가 아닌 차별화 요소로 활용하라는 전략. "key differentiator" = 핵심 차별화 요소.',diff:2,ex:'OFSE leaders view gen AI not only as a cost-reduction tool but as a <b>differentiator</b>—enabling personalized service, accelerated delivery, and data-driven solutions.'},
  {id:'vc8',type:'vocab',word:'incremental',ko:'점진적인 — 작고 단계적인; 혁신적 도약과 대비되는',pron:'[ˌɪŋkrɪˈmentəl]',nuance:'"increment"(증분, 조금씩 늘어나는 양)에서 유래. "incremental" = 작은 단계를 쌓아가는 점진적 방식. "incremental improvements" = 미미한 개선. gen AI와 agentic AI의 차이를 설명할 때 사용: 기존 gen AI는 "incremental productivity gains"를 가져다 주지만, agentic AI는 "substantial performance improvements"를 가능하게 한다. "incremental vs transformational" = 점진적 개선 vs 근본적 변혁.',diff:1,ex:'By using agentic AI systems, OFSE companies could move from <b>incremental</b> productivity gains to substantial performance improvements across operations.'},
  {id:'vc9',type:'vocab',word:'quantify',ko:'수치화하다 — 정성적 효과를 측정 가능한 숫자로 표현하다',pron:'[ˈkwɒntɪfaɪ]',nuance:'"quant-"(양, 라틴어 "quantus") + "-fy"(동사 형성 접미사). 추상적이거나 정성적인 가치를 구체적인 숫자로 표현하는 것. "struggled to quantify gen AI\'s ROI" = gen AI의 투자 수익을 수치로 증명하기 어렵다는 것이 추가 투자를 망설이게 만드는 주요 원인. "quantify business impact" = 비즈니스 영향을 측정·수치화하다. "quantified business case" = 수치로 뒷받침된 사업 타당성 분석.',diff:2,ex:'Many leaders expressed that they struggled to <b>quantify</b> gen AI\'s ROI, resulting in hesitation for further investment and initiatives stuck at the pilot phase.'},
  {id:'vc10',type:'vocab',word:'autonomous',ko:'자율적인 — 외부 지시 없이 스스로 판단하고 실행하는',pron:'[ɔːˈtɒnəməs]',nuance:'"auto"(자기) + "nomos"(법, 규칙, 그리스어). 스스로 규칙을 만들고 따르는 것. 자율주행차, 자율 에이전트(autonomous agent)에서 사용. AI 맥락에서는 인간의 개별 지시 없이 스스로 계획을 세우고 다단계 작업을 실행할 수 있는 능력. "agentic AI systems that can autonomously plan and execute multistep workflows" = 이것이 incremental 개선을 넘어 substantial 성과 향상을 가능하게 하는 핵심.',diff:2,ex:'Agentic AI systems can <b>autonomously</b> plan and execute multistep workflows, enabling OFSE companies to move beyond incremental productivity gains.'},

  {id:'bz1',type:'biz',word:'SG&A',ko:'판매·일반·관리비 — 영업 활동 외의 간접 비용 총칭',pron:'[ˌes dʒiː ænd ˈeɪ]',nuance:'Selling, General & Administrative expenses. 매출원가(COGS)를 제외한 간접 운영 비용. "Selling" = 영업인력 급여·마케팅비, "General & Administrative" = 임원 급여·법무·회계·HR 등. 손익계산서에서 EBITDA 계산 시 차감 항목. 이 기사에서 AI 도입 시 SG&A는 7%로 유지되나 운영 비용이 75%→69%로 감소하여 EBITDA가 18%→24%로 향상되는 구조.',diff:2,ex:'AI-driven efficiency gains are primarily expected in operating costs (75%→69%) while <b>SG&A</b> remains stable at 7%—translating into a 6 percentage point EBITDA improvement.'},
  {id:'bz2',type:'biz',word:'EPC',ko:'설계·조달·시공 — Engineering, Procurement, and Construction',pron:'[ˌiː piː ˈsiː]',nuance:'Engineering, Procurement, and Construction. 프로젝트를 처음부터 끝까지(설계 → 자재 조달 → 시공) 일괄 수행하는 계약 방식 또는 기업 유형. OFSE 섹터에서 해양 플랫폼, 정제 시설, 파이프라인 건설 등을 담당. "EPC company" = 이 업무를 전문으로 하는 기업. 이 기사의 설문에 EPC 기업들이 포함됨. "Director, engineering, procurement, and construction (EPC) company" = 설문 응답자 직함.',diff:2,ex:'The OFSE survey captured insights from 164 executives, including integrated service providers, <b>EPC</b> companies, equipment manufacturers, and services-focused companies.'},
  {id:'bz3',type:'biz',word:'agentic AI',ko:'에이전틱 AI — 자율적으로 다단계 워크플로를 계획·실행하는 AI 시스템',pron:'[eɪˈdʒentɪk eɪ aɪ]',nuance:'"agent"(스스로 행동하는 주체) + "-ic"(형용사). 단순히 텍스트·이미지를 생성하는 gen AI와 달리, 목표가 주어지면 스스로 계획을 세우고, 도구를 사용하고, 결과를 평가하며, 다음 단계를 결정하는 AI. "agentic AI systems that can autonomously plan and execute multistep workflows" = OFSE에서 예방 정비 스케줄링, 공급망 최적화 등 복잡한 운영 작업을 자동화할 잠재력. gen AI보다 한 단계 진화한 개념.',diff:2,ex:'<b>Agentic AI</b> systems can autonomously plan and execute multistep workflows, enabling OFSE companies to move beyond incremental gains to substantial performance improvements.'},
  {id:'bz4',type:'biz',word:'onshore / offshore',ko:'온쇼어 / 오프쇼어 — 육상 / 해상 유전 및 가스전',pron:'[ˈɒnʃɔː] / [ˈɒfʃɔː]',nuance:'"onshore" = 육지에서의 석유·가스 탐사·생산 작업. "offshore" = 해양(바다)에서의 작업. 기술적 복잡도, 비용, 안전 요구사항이 onshore < offshore. "both onshore and offshore companies" = 설문이 육상·해상 기업 모두를 포함. 이와 별개로 금융·아웃소싱에서 "offshore"는 해외에 업무를 이전하는 의미(한국의 외주)도 있어 문맥에 따라 구별 필요.',diff:1,ex:'The 2025 OFSE Leaders Gen AI Survey covered a diverse mix of companies across global markets, with a focus area covering both <b>onshore</b> and <b>offshore</b> companies.'},
  {id:'bz5',type:'biz',word:'CxO',ko:'C레벨 임원 총칭 — CEO·CFO·CTO·COO 등 최고위 경영진',pron:'[ˌsiː eks ˈəʊ]',nuance:'"C"(Chief) + "x"(임의의 기능) + "O"(Officer). 최고경영자 레벨 임원 전체를 통칭. CEO(경영), CFO(재무), CTO(기술), COO(운영), CIO(정보), CHRO(인사) 등. "2025 OFSE CxOs Survey" = OFSE 최고위 경영진 대상 조사. "C-suite"(C급 임원 집합)과 동의어. "C-suite leaders are 2.4x more likely to cite employee readiness as a barrier" = 임원들이 자신의 리더십 문제보다 직원 준비도를 과도하게 장벽으로 인식하는 경향.',diff:1,ex:'80% of <b>CxO</b>-level executives reported being "mostly to fully ready" to adopt gen AI—yet they assessed 90%+ of frontline employees as "slightly to not ready."'},
  {id:'bz6',type:'biz',word:'integrated service provider',ko:'통합 서비스 공급자 — 복수의 유전 서비스를 묶어 제공하는 OFSE 기업',pron:'',nuance:'단일 서비스(시추, 시추니 액체, 완정, 리프팅 등)에 특화된 전문 업체와 달리, 복수의 서비스를 통합하여 "one-stop shop"으로 제공하는 기업. SLB(구 Schlumberger), Halliburton, Baker Hughes가 대표적. 고객(E&P 기업)의 입장에서는 협력사 수 감소, 데이터 통합, 책임 소재 명확화 장점. "integrated service provider" vs "services-focused company"(특화 서비스 기업).',diff:2,ex:'The OFSE survey captured insights from executives representing a diverse mix including <b>integrated service providers</b>, EPC companies, equipment manufacturers, and services-focused companies.'}
];
function render(type){
  const grid=document.getElementById('grid');
  const filtered=type==='all'?cards:cards.filter(c=>c.type===type);
  grid.innerHTML=filtered.map(c=>`
  <div class="card${learned.has(c.id)?' learned':''}" id="card-${c.id}" onclick="flip('${c.id}')">
    <div class="card-inner">
      <div class="front">
        <div>
          <span class="tag tag-${c.type}">${c.type}</span>
          <div class="word">${c.word}</div>
          <div class="pron">${c.pron}</div>
          <div class="ko">${c.ko}</div>
        </div>
        <div class="diff">${[1,2,3].map(i=>`<div class="dot${i<=c.diff?' on':''}"></div>`).join('')}</div>
      </div>
      <div class="back">
        <div>
          <div class="word">${c.word}</div>
          <div class="nuance">${c.nuance}</div>
        </div>
        <button class="learned-btn${learned.has(c.id)?' done':''}" onclick="markLearned(event,'${c.id}')">${learned.has(c.id)?'✓ Learned':'Mark Learned'}</button>
      </div>
    </div>
  </div>`).join('');
  updateStats();
}
function flip(id){document.getElementById('card-'+id).classList.toggle('flipped');}
function markLearned(e,id){
  e.stopPropagation();
  if(learned.has(id)){learned.delete(id);}else{learned.add(id);}
  localStorage.setItem(STORE_KEY,JSON.stringify([...learned]));
  render(currentFilter);
}
function filter(type,btn){
  currentFilter=type;
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(type);
}
function updateStats(){
  document.getElementById('stats').textContent=`${learned.size} / ${cards.length} learned`;
}
let currentFilter='all';
render('all');
</script>
</body>
</html>
