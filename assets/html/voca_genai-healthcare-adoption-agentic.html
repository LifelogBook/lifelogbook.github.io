const cards=[
  {id:'ph1',type:'PHRASAL',word:'gravitate toward',pron:'[ˈɡrævɪteɪt təˈwɔːrd]',ko:'자연스럽게 ~쪽으로 끌리다, 기울다',nuance:'라틴어 gravitas(무게·중력)에서. 물체가 중력에 이끌리듯 선택이나 성향이 자연스럽게 특정 방향으로 향하는 것. "Care organizations may gravitate toward function-specific solutions suited to specialized clinical workflows." 의도적 이동(move toward)과 달리 구조·논리·성향에 의한 반사적 인력(引力). 비교: be attracted to(감정적), gravitate toward(자연적·구조적 인력). 이미지: 🧲 자석이 쇠를 당기듯—임상 케어 기관이 특화 솔루션 쪽으로 자연히 끌려가는 힘.',diff:1,ex:'Clinical organizations tend to <b>gravitate toward</b> function-specific AI solutions that address acute workflows, like clinical documentation or decision support.'},
  {id:'ph2',type:'PHRASAL',word:'hinge on',pron:'[hɪndʒ ɒn]',ko:'전적으로 ~에 달려 있다, ~이 핵심 변수다',nuance:'\'hinge\'(경첩)에서. 문이 경첩 하나에 달려 있어 경첩이 없으면 문 자체가 서지 못하듯, 모든 결과가 그 한 요인에 달려 있음. "competitive advantage will increasingly hinge on how well they integrate AI into core workflows." depend on < rely on < hinge on—순서로 의존의 절대성이 강해짐. 경첩이 없으면 전체가 무너지는 이미지. 이미지: 🚪 경첩(hinge) 없이는 문 전체가 서 있을 수 없듯—통합 실패가 경쟁 우위 전체를 위협.',diff:2,ex:'Long-term competitive advantage in healthcare AI will <b>hinge on</b> organizational capability, not just the quality of the models adopted.',},
  {id:'ph3',type:'PHRASAL',word:'give way to',pron:'[ɡɪv weɪ tuː]',ko:'~에게 자리를 내주다, ~로 대체되다',nuance:'원래 교통에서 양보 표지판(Give Way)—앞서 가던 것이 물러나 다음 것이 지나갈 공간을 만들어 주는 것. "one defined less by novelty and more by discipline"—novelty가 discipline에게 자리를 내줌. be replaced by보다 더 자연스럽고 점진적인 전환 뉘앙스. "Winter gives way to spring"처럼 자연스러운 계절 교체 이미지. 이미지: 🚦 양보 신호—이전에 앞서 달리던 것(설레임)이 스스로 물러나 다음 것(체계적 실행)에 길을 내줌.',diff:1,ex:'In healthcare AI, initial excitement is <b>giving way to</b> a more disciplined focus on integration, governance, and measurable ROI.',},
  {id:'ph4',type:'PHRASAL',word:'point to',pron:'[pɔɪnt tuː]',ko:'(문제·방향을) 가리키다, 시사하다, 언급하다',nuance:'손가락으로 특정 방향을 가리키는 행위. 두 가지 용법: ① 언급하다("Many leaders also point to ethical concerns"), ② 암시하다("these findings point to a deeper organizational challenge"). indicate나 mention보다 더 능동적으로 주의를 집중시키는 느낌. 화자가 청중의 시선을 특정 대상으로 끌어당기는 제스처. 이미지: 👆 무대 위에서 특정 슬라이드를 가리키는 발표자—\'여기를 보세요\'라는 능동적 강조.',diff:1,ex:'Healthcare leaders consistently <b>point to</b> integration complexity as the single biggest barrier to scaling gen AI solutions.',},
  {id:'ph5',type:'PHRASAL',word:'sit alongside',pron:'[sɪt əˈlɒŋsaɪd]',ko:'나란히 공존하다, 동등한 중요성으로 함께 자리하다',nuance:'나란히(alongside) 앉다(sit)—두 가지 서로 다른 우려나 현실이 어느 한쪽도 사라지지 않고 동등한 무게로 공존하는 상태. "Longstanding concerns around trust, safety, and governance now sit alongside the operational realities of integration." 이전엔 안전 걱정만 있었지만, 이제 통합 실행 어려움도 동등하게 중요해진 것. coexist보다 더 시각적·구체적. 이미지: ⚖️ 두 걱정이 같은 무게로 저울 양쪽에 앉아 있는 상태—어느 쪽도 사라지지 않음.',diff:2,ex:'In today\'s healthcare AI landscape, risk concerns <b>sit alongside</b> practical integration challenges as equally important barriers to scaling.',},
  {id:'ph6',type:'PHRASAL',word:'turn to',pron:'[tɜːrn tuː]',ko:'(관심·초점을) ~로 돌리다, ~에 주목하기 시작하다',nuance:'관심이나 초점이 새로운 방향으로 전환되는 것. "the focus is turning to integration, ROI, and agentic AI." 단순한 방향 전환이 아니라 시급성과 새로운 우선순위의 재편을 함축. 어려울 때 의지하다의 뉘앙스도 있음: "people turn to experts." look to보다 더 능동적이고 의지적. 이미지: 🔄 카메라가 피사체를 바꾸듯—헬스케어의 관심이 도입 여부에서 어떻게 가치를 측정하고 통합하느냐로 전환.',diff:1,ex:'As gen AI implementation spreads, healthcare leaders are <b>turning to</b> harder questions: how to measure returns, redesign workflows, and govern at scale.',},
  {id:'id1',type:'IDIOM',word:'core competency',pron:'[kɔːr kɒmˈpɪtənsi]',ko:'핵심 역량 — 경쟁자가 쉽게 모방할 수 없는 조직의 근본적 강점',nuance:'1990년 C.K. Prahalad & Gary Hamel이 Harvard Business Review에서 제안한 전략 경영 개념. 핵심 역량의 3가지 조건: ① 고객 가치 창출 ② 경쟁자 모방 어려움 ③ 다양한 시장 적용 가능. "healthcare organizations no longer view gen AI as experimental but increasingly as a core competency." gen AI가 \'써볼 만한 도구\'에서 \'우리 DNA\'로 격상됨. skill(개인 스킬)과 달리 core competency는 조직 전체의 깊은 역량. 이미지: 🏆 기업의 모든 경쟁 우위가 뿌리를 두고 있는 깊은 원천—빼앗기거나 복사되기 어려운 것.',diff:2,ex:'For leading healthcare organizations, gen AI is transitioning from an experimental tool to a <b>core competency</b> that defines operational excellence.',},
  {id:'id2',type:'IDIOM',word:'cross-cutting',pron:'[ˈkrɒs ˌkʌtɪŋ]',ko:'수평 횡단적 — 특정 도메인에 국한되지 않고 여러 영역에 두루 적용되는',nuance:'특정 기능이나 부서에 갇히지 않고 여러 도메인을 가로지르는 (cutting across). "HST firms may focus on cross-cutting use cases that can be reused and scaled across various customers." function-specific(특정 기능 특화)과 대립. 소프트웨어에서 cross-cutting concerns(logging, security, caching)는 별도 모듈로 처리해야 하는 공통 관심사. 장점: 재사용성 높음. 단점: 특정 영역의 깊은 가치 창출 어려울 수 있음. 이미지: ✂️ 가로, 세로, 사선 모두를 자르는 가위—도메인 경계를 무시하고 모든 영역에 적용 가능.',diff:2,ex:'HST firms prefer <b>cross-cutting</b> AI use cases—like knowledge synthesis or documentation automation—that work across multiple healthcare clients.',},
  {id:'id3',type:'IDIOM',word:'off the shelf',pron:'[ɒf ðə ʃelf]',ko:'기성품의, 별도 개발 없이 즉시 구매해 쓸 수 있는',nuance:'소매점 선반(shelf)에서 바로 꺼낼 수 있는 기성품—17세기 영국 상점 관행에서 유래. "leaders are considering off-the-shelf solutions." custom/bespoke(맞춤 제작)의 반대. 장점: 빠른 도입, 낮은 초기 비용, 검증된 기능. 단점: 특정 요구에 완벽히 맞지 않을 수 있음. 의료 AI에서 33% → build 전략보다 off-the-shelf(buy) 전략이 증가 추세(19%→33%). 이미지: 🛒 슈퍼마켓 선반에서 이미 포장된 제품을 카트에 담는 것—개발 시간 없이 즉시 사용 가능.',diff:1,ex:'Payers are increasingly turning to <b>off-the-shelf</b> AI tools for claims processing, driven by the desire for faster deployment over custom builds.',},
  {id:'id4',type:'IDIOM',word:'proof of impact',pron:'[pruːf əv ˈɪmpækt]',ko:'임팩트 증명 — AI가 실제 비즈니스 가치를 창출함을 수치로 입증하는 단계',nuance:'proof of concept(PoC)와 혼동 주의. PoC = 기술적으로 가능한가? Proof of impact = 실제로 가치가 있는가? "Difficulty measuring pilot impact" — 29%의 리더가 이를 가장 큰 확장 장벽으로 꼽음. 성숙 사이클: PoC → Pilot → Proof of impact → Scaled deployment. 임팩트를 증명하지 못하면 아무리 좋은 기술도 예산을 얻지 못함. 의료에서: 임상 시간 단축, 오류율 감소, 비용 절감 등의 수치. 이미지: 📊 실험실 성공(PoC)이 아닌, 실제 병원 운영에서 측정된 구체적 성과표.',diff:2,ex:'Many healthcare pilots get stuck because teams demonstrate technical feasibility but fail to achieve <b>proof of impact</b> with measurable clinical or financial outcomes.',},
  {id:'id5',type:'IDIOM',word:'raise the stakes',pron:'[reɪz ðə steɪks]',ko:'판돈을 높이다 — 위험도·중요도·결과의 무게를 높이다',nuance:'포커·룰렛 등 도박에서 베팅 금액(stake)을 올리는 행위에서 유래. "Moving from isolated applications to orchestrated systems will raise the stakes for design, governance, and execution." isolated 앱은 실패해도 국소적 영향, orchestrated 시스템은 하나가 잘못되면 전체 시스템 영향. 이길 때 더 크게 이기지만, 잃을 때도 더 크게 잃는 양날의 구조. 이미지: 🎰 칩을 더 많이 걸수록 승패의 결과가 더 커지는 카지노 테이블—복잡한 AI 시스템은 성공의 보상도, 실패의 비용도 커짐.',diff:2,ex:'As healthcare organizations move to orchestrated multiagent systems, they <b>raise the stakes</b> significantly—the impact of failures grows alongside the potential benefits.',},
  {id:'id6',type:'IDIOM',word:'gain traction',pron:'[ɡeɪn ˈtrækʃən]',ko:'탄력을 받다, 점점 더 채택·지지를 얻다',nuance:'물리학에서 traction: 바퀴·신발이 지면을 잡는 마찰력. 빙판에서 바퀴가 헛돌다가 마침내 지면을 잡아 앞으로 나아가는 것처럼, 아이디어·기술·운동이 실질적 채택·지지를 얻기 시작하는 순간. "multiagent workflows are gaining traction." become popular보다 더 역동적·점진적 모멘텀 뉘앙스. gain momentum보다 더 구체적인 \'기반을 잡는\' 느낌. 이미지: 🚗 눈길에서 타이어가 마침내 지면을 잡아 차가 앞으로 나아가기 시작하는 순간.',diff:1,ex:'Agentic AI is rapidly <b>gaining traction</b> in healthcare, with 51 percent of surveyed leaders now pursuing proofs of concept for multiagent workflows.',},
  {id:'cl1',type:'COLLOC',word:'administrative efficiency',pron:'',ko:'행정 효율성 — 의료 청구·인사·조달 등 비임상 업무의 효율화',nuance:'Revenue cycle, claims processing, HR, procurement, finance—환자에게 직접 보이지 않는 의료 행정 업무 전체의 효율. gen AI 잠재력 영역 1위(87% 응답). 왜 1위? 행정 업무는 반복적·구조적·대량 처리—gen AI의 강점과 가장 잘 맞는 조합. \'administrative efficiency\' 향상의 실질적 의미: 의사·간호사가 행정에 쏟는 시간을 줄여 환자 케어에 집중. 미국 의료비의 34%가 행정 비용이라는 연구 결과—이 비효율이 AI의 최대 타깃. 이미지: 📋 prior authorization(사전 승인), 청구서 처리, 진료 예약—환자가 보지 못하는 의료 기계의 톱니바퀴.',diff:1,ex:'<b>Administrative efficiency</b> tops the list of gen AI opportunities, with 87 percent of healthcare leaders citing it as the domain with the greatest potential.',},
  {id:'cl2',type:'COLLOC',word:'clinical productivity',pron:'',ko:'임상 생산성 — 의료인이 환자를 진료하는 속도·품질·효율의 총체',nuance:'acute provider operations, ambulatory operations, clinical workforce를 포함하는 광의의 임상 효율. 54%의 임상 케어 기관 응답자가 이미 gen AI를 clinical productivity에 구현—모든 세부 도메인 중 가장 높은 실제 구현률. 실례: AI 기반 ambient clinical documentation(진료 대화 자동 기록)으로 의사의 차트 작성 시간 40% 절감. 단순 처리 속도가 아닌 \'품질 유지하며 처리량 증가\'가 핵심. 이미지: 👨‍⚕️ 같은 8시간에 더 많은 환자를 보면서도 진료 품질을 유지하는 의사—AI 문서화 어시스턴트 덕분.',diff:1,ex:'<b>Clinical productivity</b> leads actual gen AI implementation, with 54% of care organization leaders reporting deployment—exceeding even administrative efficiency.',},
  {id:'cl3',type:'COLLOC',word:'organizational hesitation',pron:'',ko:'조직적 망설임 — 신기술 도입을 앞두고 나타나는 집단적 주저함',nuance:'개인의 hesitation이 아니라 조직 구조·문화·위험 회피 성향이 만들어내는 집합적 관성. "a decrease in organizational hesitation to use the technology." for the first time, 모든 응답자가 적어도 일부 계획을 보고—조직적 망설임이 줄었다는 신호. 의료 업계는 환자 안전, 규제, 데이터 프라이버시 우려로 타 산업보다 hesitation 특히 큼. 이미지: 🚧 기술 도입 앞에 세워진 주의 바리케이드—\'아직은 더 지켜보자\'는 조직 전체의 집합적 브레이크.',diff:2,ex:'For the first time in this survey series, all respondents reported at least some plans to pursue gen AI—indicating a significant decrease in <b>organizational hesitation</b>.',},
  {id:'cl4',type:'COLLOC',word:'operational readiness',pron:'',ko:'운영 준비 태세 — 새 시스템·프로세스를 실전 운영할 수 있는 조직적 준비 상태',nuance:'기술 준비(technical readiness)와 구별되는 조직·인력·프로세스의 실전 준비도. "Half of leaders report that their organizations deployed their first use cases more than six months ago—reflecting increased confidence in both organizational capabilities and operational readiness." 군사 용어 유래: 부대가 실전 투입 준비가 완료된 상태(combat readiness). AI 맥락: 기술만 구매해도 operational readiness 없으면 실제 가치 창출 불가. 이미지: 🚀 로켓(기술)이 있어도 발사대(운영 체계)와 관제 센터(인력)가 준비되어야 실제 발사 가능.',diff:2,ex:'Increasing <b>operational readiness</b>—training staff, redesigning workflows, and building governance—is now as important as deploying the technology itself.',},
  {id:'cl5',type:'COLLOC',word:'workflow redesign',pron:'',ko:'워크플로 재설계 — 기존 업무 흐름을 AI 중심으로 근본적으로 다시 설계하는 것',nuance:'AI가 기존 프로세스에 단순 추가(bolt-on)가 아닌 업무 방식 자체를 바꿀 때 발생하는 심층적 변화. "orchestration and workflow redesign become the primary constraints." 기술 구현(code works)보다 어려운 것이 실제 일하는 방식을 바꾸는 것. 1990년대 BPR(Business Process Reengineering, Hammer & Champy)의 현대 AI 버전. 이미지: 🔄 기존의 직선형 업무 흐름도(flowchart)를 전부 지우고 AI 에이전트를 중심으로 완전히 새로 그리는 재설계 작업.',diff:2,ex:'The biggest challenge in scaling healthcare AI is not technology—it\'s the <b>workflow redesign</b> required to embed AI agents into complex clinical and administrative processes.',},
  {id:'cl6',type:'COLLOC',word:'residual risk',pron:'[rɪˈzɪdjuəl rɪsk]',ko:'잔여 위험 — 완화 조치 후에도 남아있는 불가피한 리스크',nuance:'위험 관리 공식: Inherent Risk(내재 리스크) - Mitigation Measures(완화 조치) = Residual Risk(잔여 리스크). "manage residual risks as applications expand in scope and autonomy." 어떤 완화 조치를 취해도 100% 제거는 불가능한 잔여 위험. AI 의료에서: 안전장치 뒤에도 남는 hallucination, 희귀 케이스 편향, 예상치 못한 사용 패턴. 에이전틱 AI로 갈수록 자율성 증가 → residual risk도 증가. 이미지: ⚗️ 여러 단계의 필터를 거쳤어도 일부 불순물이 남은 액체—완벽한 정제는 불가능한 현실.',diff:2,ex:'As healthcare AI applications expand in scope and autonomy, organizations must build governance systems to continuously monitor and mitigate <b>residual risk</b>.',},
  {id:'cl7',type:'COLLOC',word:'sourcing strategy',pron:'',ko:'소싱 전략 — 필요한 AI 역량을 어떻게 조달할지에 대한 전략적 접근',nuance:'Build(직접 개발), Partner(협력사와 공동), Buy(상용 솔루션 구매)—세 경로로 구성된 전략적 선택 프레임. "US healthcare leaders\' gen AI sourcing strategy": 44% partner, 33% buy, 23% build. make-or-buy(만들거나 살거나)의 현대적 확장판—partner라는 제3의 옵션이 핵심. HST(36% build) vs 임상·페이어(buy/partner 지향). buy 전략이 19%(2024)→33%(2025)로 가파른 증가. 이미지: 🛠️ 세 갈래 갈림길—직접 만들까(build), 같이 만들까(partner), 살까(buy).',diff:2,ex:'Healthcare leaders are diversifying their <b>sourcing strategy</b>, with the proportion pursuing a \'buy\' approach rising from 19 percent to 33 percent in a single year.',},
  {id:'vc1',type:'VOCAB',word:'mature',pron:'[məˈtʃʊər]',ko:'성숙하다 (v) / 성숙한 (adj) — 더 발전된·안정된·정교한 단계로 진전되다',nuance:'라틴어 maturus(무르익은, 충분히 발달한). 과일이 자연스럽게 익는 과정—강요가 아닌 시간과 경험을 통한 자연스러운 발전. "Adoption matures as agentic AI emerges." AI 도입의 성숙: experimental(실험적) → proof of concept → deployed → core competency. 비즈니스에서: market maturity(시장 성숙), technology maturity(기술 성숙도), organizational maturity(조직 성숙도). 반의어: nascent(초기), immature(미성숙). 이미지: 🍎 덜 익은 녹색 사과(실험 단계)에서 붉고 완숙한 사과(안정적 배포)로 변하는 자연스러운 과정.',diff:1,ex:'Gen AI adoption in healthcare is <b>maturing</b> rapidly—half of organizations have already implemented it and are moving past experimentation into operational integration.',},
  {id:'vc2',type:'VOCAB',word:'productionize',pron:'[prəˈdʌkʃənaɪz]',ko:'(PoC·파일럿을) 실운영 환경으로 전환하다, 프로덕션화하다',nuance:'production(실제 운영 환경) + -ize(동사화). 연구실에서 작동하는 것을 실제 대규모 운영 환경에서 안정적으로 작동하도록 만드는 과정. "pursuing gen AI proof of concept but have not productionized/scaled yet." PoC와 production 사이의 큰 간극: 보안, 확장성, 오류 처리, 모니터링, 컴플라이언스, 사용자 훈련 등. 실리콩밸리 엔지니어링 용어에서 헬스케어·비즈니스 맥락으로 확산. 이미지: 🏭 연구소의 소규모 실험 결과를 대량 생산 가능한 공장 공정으로 전환하는 과정—\'작동한다\'에서 \'대규모로 안전하게 작동한다\'로.',diff:2,ex:'The hardest step for most healthcare organizations is not building a gen AI prototype but <b>productionizing</b> it—embedding it into existing systems at full clinical scale.',},
  {id:'vc3',type:'VOCAB',word:'cadence',pron:'[ˈkeɪdəns]',ko:'리듬·주기·속도 — 반복되는 패턴의 규칙적인 흐름',nuance:'라틴어 cadere(떨어지다, 리듬을 타다)에서. 음악에서 선율의 마무리 패턴·박자 → 비즈니스에서 예측 가능한 반복 주기. "This cadence reflects increased confidence in both organizational capabilities and operational readiness." 단순 속도(pace, speed)와 달리 cadence는 예측 가능한 리듬과 규칙성 함의. 주로 "meeting cadence"(회의 주기), "release cadence"(출시 주기), "deployment cadence"(배포 리듬). 이미지: 🎵 음악의 박자처럼—처음에는 느리고 불규칙했던 AI 도입이 점점 규칙적이고 안정적인 리듬을 타기 시작함.',diff:2,ex:'The accelerating <b>cadence</b> of gen AI deployments—with half of implementations more than six months old—signals growing organizational confidence.',},
  {id:'vc4',type:'VOCAB',word:'momentum',pron:'[məˈmentəm]',ko:'모멘텀 — 한 번 붙으면 멈추기 어려운 자기강화적 가속도',nuance:'물리학 용어: 질량 × 속도(mass × velocity). 움직이는 물체가 가진 관성적 힘—가속할수록 멈추기가 더 어려워짐. "this growing momentum" — gen AI 채택의 자기강화 사이클: 더 많은 조직이 참여 → 더 많은 성공 사례 → 더 많은 투자 → 더 많은 참여. sports 표현: "build momentum"(탄력을 쌓다), "lose momentum"(탄력을 잃다). \'maintain momentum\'도 중요—멈추면 다시 시작하기 어려움. 이미지: ⚽ 느리게 시작한 경기가 점점 빨라지며 공격 흐름이 형성되는 순간—멈추기 어려운 가속도.',diff:1,ex:'The <b>momentum</b> behind gen AI adoption in healthcare is now self-reinforcing—each new implementation builds confidence and capabilities for the next.',},
  {id:'vc5',type:'VOCAB',word:'recency',pron:'[ˈriːsənsi]',ko:'최근성 — 어떤 현상이나 기술이 얼마나 최근에 등장했는지',nuance:'라틴어 recens(새로운, 최근의). 무언가가 얼마나 최근인지를 나타내는 추상 명사. "Agentic AI is also drawing broad interest, despite its recency." 일상 대화에서는 거의 안 쓰지만 학술·보고서 문체에서 자주 등장. recency bias(최신 편향): 심리학에서 최근 정보에 과도한 가중치를 두는 인지 오류. \'despite its recency\'—새로 나왔음에도 불구하고 이미 광범위한 관심을 끌고 있다는 역설적 상황 표현. 이미지: 🆕 방금 포장을 뜯은 기술—신선함이 장점이지만 장기 검증이 부족한 양면성.',diff:3,ex:'Despite its <b>recency</b>, agentic AI has rapidly captured the attention of healthcare leaders, with 51 percent already pursuing proofs of concept.',},
  {id:'vc6',type:'VOCAB',word:'consequential',pron:'[ˌkɒnsɪˈkwenʃəl]',ko:'중대한 결과를 초래하는, 중요한 파급력을 가진',nuance:'라틴어 consequi(뒤따르다, 결과로 이어지다)에서. 단순히 important나 significant보다 \'중대한 결과를 수반하는\'에 방점. "healthcare could be entering a more consequential phase of AI adoption." 이전 단계는 novelty(새로움)가 주도—잘못돼도 실험이었음. consequential phase는 실수의 결과도 더 무거워지는 단계. 반의어: inconsequential(사소한, 결과 없는). 이미지: ⚠️ 결정을 내릴 때마다 무거운 도미노가 넘어지는—실험 단계를 벗어나 실제 임상·운영에 영향을 미치는 단계.',diff:2,ex:'Healthcare is entering a more <b>consequential</b> phase of AI—where decisions about integration, governance, and autonomy carry real operational and clinical stakes.',},
  {id:'vc7',type:'VOCAB',word:'subsector',pron:'[ˈsʌbˌsektər]',ko:'하위 부문 — 더 큰 산업 섹터 내의 특화된 세부 구분',nuance:'sub(아래·부분) + sector(분야·부문). 의료 섹터의 subsector: payer(보험사), clinical-care(병원·클리닉), HST(의료 서비스·기술 기업)—각각 다른 규제, 비즈니스 모델, 고객, AI 전략. "Adoption rates vary across subsectors." HST 64% > 임상 케어 52% > 페이어 34%—subsector마다 gen AI 도입률이 크게 다름. 이유: HST는 자체가 기술 기업, 페이어는 규제 복잡성·보수성. 이미지: 🏥🏛️💊 병원, 보험사, 의료 IT 기업—같은 헬스케어 지붕 아래 있지만 완전히 다른 방들.',diff:1,ex:'Gen AI adoption varies significantly across healthcare <b>subsectors</b>: HST firms lead at 64%, while payers lag at 34%, reflecting their different operating contexts.',},
  {id:'vc8',type:'VOCAB',word:'novelty',pron:'[ˈnɒvəlti]',ko:'신기함 — 새롭고 낯선 것이 주는 흥분과 매력',nuance:'라틴어 novellus(새로운). 처음 접하는 것에서 오는 흥분·호기심·매력. "a more consequential phase of AI adoption—one defined less by novelty and more by discipline." 초기 AI 채택의 원동력 = novelty(새로운 기술 써보고 싶다는 설레임). 이제의 원동력 = discipline(체계적 실행). novelty wears off(신기함은 사라진다)—시간이 지나면 실질적 가치만 남아야 지속. novelty bias: 새것에 과도하게 흥분해 냉철한 평가 없이 도입하는 경향. 이미지: 🎁 새 선물의 포장을 뜯는 순간의 흥분—시간이 지나면 실용성만 남음.',diff:1,ex:'Healthcare AI is moving beyond <b>novelty</b>—organizations are less impressed by demos and more focused on whether AI delivers measurable operational or clinical value.',},
  {id:'vc9',type:'VOCAB',word:'discipline',pron:'[ˈdɪsɪplɪn]',ko:'규율·체계 — 충동이나 새로움이 아닌 방법론적 엄격함과 일관된 실행',nuance:'라틴어 discipulus(학생·제자)에서—배움과 훈련을 통한 자기 통제. "a more consequential phase of AI adoption—one defined less by novelty and more by discipline." gen AI 도입 성숙의 핵심 전환: excitement(설레임) → discipline(체계). 의료 AI discipline: ① ROI 측정 체계 ② 거버넌스 프레임워크 ③ 워크플로 재설계 ④ 지속적 리스크 관리. 이미지: 🎯 화려한 실험이 아닌 정밀 훈련—같은 동작을 완벽해질 때까지 반복하며 체계를 쌓는 과정.',diff:2,ex:'The next phase of healthcare AI is defined by <b>discipline</b>: rigorous integration, systematic measurement, and the organizational capability to govern AI at scale.',},
  {id:'bz1',type:'BIZ',word:'HST',pron:'[eɪtʃ es tiː]',ko:'의료 서비스·기술 기업 (Healthcare Services and Technology)',nuance:'McKinsey의 헬스케어 서베이에서 사용하는 분류—병원(clinical-care)이나 보험사(payer)가 아닌 의료 소프트웨어·디지털헬스·의료정보시스템·아웃소싱서비스 기업. 예: Epic(EHR), Optum(analytics), Change Healthcare, Veeva Systems, Teladoc. gen AI 도입률 1위(64%)—자체가 기술 기업이라 AI 역량 내재화 빠름. 전략: cross-cutting use cases를 다양한 고객(병원, 보험사)에게 재판매. 이미지: 💻🏥 병원과 의료인이 쓰는 소프트웨어·서비스를 만드는 의료 IT/디지털헬스 기업들—의료 산업의 기술 인프라 제공자.',diff:1,ex:'<b>HST</b> firms are at the forefront of gen AI adoption, with 64% already implementing solutions—and building AI capabilities that can be scaled across healthcare clients.',},
  {id:'bz2',type:'BIZ',word:'payer',pron:'[ˈpeɪər]',ko:'의료 지불자 — 주로 건강보험사; 의료 서비스 비용을 지불하는 주체',nuance:'의료 서비스 삼각형: patient(환자/member), provider(의료 제공자—병원·의사), payer(지불자—보험사). 미국 대표 payer: UnitedHealth, CVS/Aetna, Cigna, Humana, BCBS. payer의 핵심 업무: 보험 승인(prior authorization), 청구 처리(claims), 회원 케어 관리(member care management). gen AI 잠재력: 사전 승인 자동화(prior auth), 청구 심사, 의료 코딩 오류 탐지. payer vs provider 구분이 미국 의료 시스템 이해의 핵심. 이미지: 🏛️ 의료비 청구서를 받아 검토·결정하고 의사에게 지급하는 보험 회사.',diff:1,ex:'<b>Payers</b> report the lowest gen AI implementation rate at 34%, reflecting unique regulatory complexities and the high stakes of errors in coverage decisions.',},
  {id:'bz3',type:'BIZ',word:'EHR',pron:'[iː eɪtʃ ɑːr]',ko:'전자 건강 기록 (Electronic Health Record)',nuance:'환자의 모든 의료 기록(진단, 처방, 검사 결과, 치료 이력, 알러지)을 디지털로 통합 관리하는 시스템. 전신: 종이 차트(Paper chart). 미국: 2009년 HITECH Act(경기 부양법 일부)로 EHR 의무화·인센티브. 주요 벤더: Epic(선호도 1위, 대형 병원), Oracle Cerner(중형), MEDITECH. gen AI 맥락: EHR 데이터가 AI 학습의 가장 풍부한 원천이나, 접근 시 HIPAA 준수 필수. 기존 EHR에 AI 통합하는 것이 주요 도전—"difficulty integrating or adapting tools to existing workflows(59%)". 이미지: 💾 병원의 모든 환자 정보가 집약된 중앙 디지털 허브—AI의 가장 가까운 데이터 금광.',diff:1,ex:'Most healthcare AI use cases require deep integration with <b>EHR</b> systems, making interoperability and data access one of the primary technical barriers to scaling.',},
  {id:'bz4',type:'BIZ',word:'revenue cycle',pron:'',ko:'의료 수익 주기 — 환자 서비스부터 최종 수납까지의 전체 재무 프로세스',nuance:'의료 기관의 재정 혈관. 단계: ① 환자 등록 → ② 보험 자격 확인 → ③ 서비스 제공 → ④ 의료 코딩(ICD-10, CPT) → ⑤ 청구(claim) 제출 → ⑥ 페이어 처리 → ⑦ 수납. Revenue Cycle Management(RCM)은 이 전 과정을 최적화. gen AI 활용: 코딩 오류 자동 수정, 사전 승인 자동화, 청구 거부 이유 분석. 병원 수익의 관리 실패 = 거부율 상승·현금 흐름 위기. 이미지: 💰→🏥 환자가 진료받는 순간부터 보험사 수표가 입금될 때까지의 긴 재정 여정.',diff:2,ex:'Gen AI offers major value in the <b>revenue cycle</b>—automating prior authorizations, reducing claim denials, and cutting the administrative burden on billing teams.',},
  {id:'bz5',type:'BIZ',word:'C-level',pron:'[siː ˈlevəl]',ko:'C레벨 — CEO, CFO, CIO 등 조직 최고 경영진 레벨',nuance:'C = Chief. CEO(최고경영), CFO(재무), CIO(정보), CMO(의무/마케팅), CISO(정보보안), CHRO(인사), CNO(간호) 등. "38 percent were C-level executives"—서베이 응답자의 신뢰도·전략적 의미를 높이는 근거. C-suite = C-level 임원들의 집합적 공간(= \'임원실\'). 의료 AI에서 C-level의 중요성: 대규모 AI 투자는 예산·전략·조직 변화를 수반하므로 최고 경영진 sponsorship 없이 진전 어려움. 이미지: 👔 조직도 최상단—회사의 전략적 방향을 결정하는 임원 회의실.',diff:1,ex:'With 38% of survey respondents at the <b>C-level</b>, findings reflect strategic priorities rather than just technical preferences of mid-level implementers.',},
  {id:'bz6',type:'BIZ',word:'HIPAA',pron:'[ˈhɪpə]',ko:'미국 의료 정보 보호법 (Health Insurance Portability and Accountability Act, 1996)',nuance:'1996년 제정. PHI(Protected Health Information—이름, 생년월일, 진단, 사회보장번호 등)의 수집·사용·공개를 규제. 위반 시 벌금: 건당 최대 $1.9M, 연간 최대 $1.9M(카테고리별). gen AI 맥락: AI 모델 학습에 환자 데이터 사용 시 Business Associate Agreement(BAA) 체결 필수. "Regulatory compliance"—52%의 헬스케어 리더가 gen AI의 주요 리스크로 꼽음. HIPAA + AI = 컴플라이언스의 새 최전선. 이미지: 🔒 미국 병원·보험사가 반드시 지켜야 하는 환자 데이터 보호 방패—위반 시 수억 달러 벌금.',diff:2,ex:'Every gen AI use case involving patient data must be designed with <b>HIPAA</b> compliance at its core—from model training to output logging and access controls.',},
  {id:'bz7',type:'BIZ',word:'clinical decision support',pron:'',ko:'임상 의사결정 지원 — 의료인의 진단·처방 결정을 돕는 AI·소프트웨어 시스템',nuance:'CDS(Clinical Decision Support). 역사: 1970년대 MYCIN(감염 진단 전문가 시스템)에서 시작 → 현대 AI 기반 CDS로 진화. 기능: 약물 상호작용 경고, 진단 추천, 임상 가이드라인 알림, 이상 징후 탐지. "Clinical decision support, quality, medical/care management"—clinical productivity 도메인의 핵심 하위 영역. 도전: FDA 규제 대상(SaMD—Software as Medical Device), alert fatigue(경고 과부하), explainability 요구. 이미지: 🩺+💻 의사 옆에서 \'이 약은 간 독성 주의\'라고 속삭이는 AI 어시스턴트—실수를 잡아주는 임상 안전망.',diff:2,ex:'<b>Clinical decision support</b> powered by gen AI can surface relevant guidelines and flag potential errors in real time—but requires careful validation to earn clinician trust.',}
];
function render(filter){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  cards.forEach(c=>{
    if(filter!=='ALL'&&c.type!==filter)return;
    const div=document.createElement('div');
    div.className='card'+(learned.has(c.id)?' learned':'');
    div.innerHTML=`<div class="card-inner">
      <div class="front">
        <div><span class="cat-tag cat-${c.type}">${c.type}</span></div>
        <div class="word">${c.word}</div>
        <div class="pron">${c.pron}</div>
        <div class="diff">${[1,2,3].map(i=>`<div class="dot${c.diff>=i?' on':''}"></div>`).join('')}</div>
      </div>
      <div class="back">
        <div class="ko">${c.ko}</div>
        <div class="nuance">${c.nuance}</div>
        <button class="learn-btn" data-id="${c.id}">${learned.has(c.id)?'✓ 학습 완료':'학습 완료로 표시'}</button>
      </div>
    </div>`;
    div.addEventListener('click',e=>{if(e.target.classList.contains('learn-btn'))return;div.classList.toggle('flipped');});
    div.querySelector('.learn-btn').addEventListener('click',e=>{
      e.stopPropagation();
      const id=e.target.dataset.id;
      if(learned.has(id)){learned.delete(id);div.classList.remove('learned');e.target.textContent='학습 완료로 표시';}
      else{learned.add(id);div.classList.add('learned');e.target.textContent='✓ 학습 완료';}
      localStorage.setItem(KEY,JSON.stringify([...learned]));
      document.getElementById('cnt').textContent=learned.size;
    });
    grid.appendChild(div);
  });
}
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');render(btn.dataset.filter);
  });
});
document.getElementById('cnt').textContent=learned.size;
render('ALL');
</script>
