<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocabulary – The Dairy Industry's 2026 Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#18100a;--surface:#261a0f;--border:#4a3018;--ink:#fef9ef;--muted:#b8956a;--accent:#f59e0b;--accent2:#fcd34d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;padding:20px;}
  header{text-align:center;margin-bottom:20px;}
  .badge{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:.72rem;color:var(--muted);margin-bottom:10px;letter-spacing:.03em;}
  h1{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--ink);margin-bottom:6px;}
  .subtitle{font-size:.8rem;color:var(--muted);}
  .filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px;}
  .filters button{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
  .filters button.active{background:var(--accent);border-color:var(--accent);color:#1a1208;}
  .progress{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:14px;}
  .progress span{color:var(--accent2);font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;perspective:800px;height:200px;transition:opacity .3s;}
  .card.hidden{display:none;}
  .card.learned{opacity:.45;}
  .card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s;}
  .card.flipped .card-inner{transform:rotateY(180deg);}
  .front,.back{position:absolute;inset:0;border-radius:13px;padding:16px;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:space-between;}
  .front{background:var(--surface);}
  .back{background:#201408;transform:rotateY(180deg);}
  .cat-tag{font-size:.65rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:10px;align-self:flex-start;}
  .phrasal .cat-tag{background:#1e2e1a;color:#86efac;}
  .idiom .cat-tag{background:#2e1a1a;color:#fca5a5;}
  .colloc .cat-tag{background:#1a2630;color:#7dd3fc;}
  .vocab .cat-tag{background:#2e2010;color:#fde68a;}
  .biz .cat-tag{background:#201a30;color:#c4b5fd;}
  .word{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--ink);line-height:1.3;}
  .dots{display:flex;gap:3px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--border);}
  .dot.on{background:var(--accent);}
  .ko{font-size:.88rem;color:var(--accent2);font-weight:600;margin-bottom:6px;}
  .nuance{font-size:.72rem;color:var(--muted);line-height:1.5;flex:1;overflow:hidden;}
  .mark-btn{margin-top:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:4px 10px;font-size:.7rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;align-self:flex-end;}
  .mark-btn:hover{border-color:var(--accent);color:var(--accent);}
  .card.learned .mark-btn{border-color:#22c55e;color:#22c55e;}
  .reset{display:block;margin:20px auto 0;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:7px 20px;font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .reset:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<header>
  <div class="badge">McKinsey &amp; Company · Agriculture Practice · April 2026</div>
  <h1>The Dairy Industry's 2026 Playbook</h1>
  <p class="subtitle">유제품 산업 전략 핵심 표현 35선 — 이미지·어원·뉘앙스 완전 해설</p>
</header>

<div class="filters">
  <button class="active" data-cat="all">ALL</button>
  <button data-cat="phrasal">PHRASAL</button>
  <button data-cat="idiom">IDIOM</button>
  <button data-cat="colloc">COLLOC</button>
  <button data-cat="vocab">VOCAB</button>
  <button data-cat="biz">BIZ</button>
</div>

<div class="progress">학습 완료: <span id="cnt">0</span> / <span id="tot">35</span></div>

<div class="grid" id="grid"></div>
<button class="reset" id="resetBtn">진행도 초기화</button>

<script>
const STORE='dairy_2026_playbook_learned';
const cards=[
  {id:'pv1',cat:'phrasal',word:'compress (margins)',ko:'(마진을) 압축하다, 이익을 짓눌다',nuance:'물리학 이미지: 스펀지를 양손으로 꽉 누르면 안에 있는 물이 밖으로 빠져나가듯, 원가(cost)와 판매가격(price) 사이에 낀 이익이 사라지는 것. "margins are being compressed" = 원가는 오르고 가격은 못 올리는 상황. squeeze와 비슷하지만 compress는 더 정밀하고 기술적인 뉘앙스. 반대: expand margins(마진 확대)',diff:2},
  {id:'pv2',cat:'phrasal',word:'contend with',ko:'~와 씨름하다, 여러 어려움에 동시에 맞서다',nuance:'Latin contendere = con(함께) + tendere(뻗다·긴장하다). 원래 의미: 경쟁하다. 현대 영어에서 "contend with"는 단순히 deal with(다루다)가 아닌, 여러 가지 힘든 상황들과 동시에 맞서 싸우며 버텨야 하는 상황. "as producers contend with animal health issues, climate, and labor shortages" = 세 가지를 한꺼번에 상대하는 이미지. 복수로 쓸 때 더 강렬함',diff:2},
  {id:'pv3',cat:'phrasal',word:'outpace',ko:'앞서 나가다, 더 빠른 속도로 초과하다',nuance:'out(초과) + pace(걸음 속도). 달리기에서 상대보다 빠른 페이스로 앞서 나가는 이미지. 중요한 것은 "pace" = 일정하게 지속되는 속도. "demand could outpace supply" = 수요가 공급보다 빠르게 증가해 격차 발생. outrun(더 빨리 달리다)과 비슷하지만, outpace는 일시적이 아닌 지속적 속도차에 초점. 경제 기사에서 자주 사용',diff:1},
  {id:'pv4',cat:'phrasal',word:'weather (a storm)',ko:'(어려운 상황을) 견뎌내다, 버티고 살아남다',nuance:'명사 "날씨(weather)"가 동사로 전환: "거친 날씨를 버텨내다" → "어떤 어려운 상황도 살아남다". "weather the storm"이 가장 유명한 형태 — 폭풍 속에서 도망치지 않고 계속 항해하는 배의 이미지. 수동적 회피가 아닌 능동적 인내. "weather volatility" = 변동성을 버텨내다. survive보다 훨씬 더 능동적이고 강인한 뉘앙스',diff:2},
  {id:'pv5',cat:'phrasal',word:'compound (a problem)',ko:'(문제를) 더욱 악화시키다, 복리처럼 증폭시키다',nuance:'금융의 compound interest(복리) 이미지: 이자에 이자가 붙어 기하급수적으로 커지는 것. "compound a problem" = 이미 나쁜 상황 위에 또 다른 나쁜 요소가 더해져 문제가 복리처럼 악화. "An aging farming population compounds these pressures" = 농촌 고령화가 기존 압박들을 복리처럼 증폭시킨다. make worse보다 규모와 속도 감이 더 강함',diff:2},
  {id:'pv6',cat:'phrasal',word:'let loose',ko:'묶인 것을 풀어놓다, 자유롭게 방치하다',nuance:'loose = 묶임이 없는, 자유로운 상태. "let loose" = 묶거나 통제하던 것을 풀어 자유롭게 놔두다. 맹수를 우리에서 풀어놓는 이미지. unleash와 같은 의미지만 훨씬 구어적(informal)이고, 때로 위험하거나 통제를 잃는 뉘앙스. "not ready to let AI loose on our plants" = AI를 공장에 자유롭게 풀어놓을 준비가 안 됐다 — 강력하지만 아직 통제 필요',diff:1},
  {id:'id1',cat:'idiom',word:'headwind',ko:'역풍, 진전을 방해하는 외부 요인',nuance:'항공·항해 용어에서 유래: 비행기나 배의 진행 방향과 정반대로 부는 바람 → 속도 감소, 연료 소비 증가. 반대: tailwind(순풍 = 성장을 돕는 조건). 금융·경제 언론의 필수 단어: "despite these headwinds" = 이러한 역풍들에도 불구하고. "structural headwinds" = 구조적 역풍. 복수 "headwinds"로 쓰면 여러 동시 장애 요인 암시. The Economist, FT, WSJ에서 주 2회 이상 등장할 정도로 빈번한 표현',diff:1},
  {id:'id2',cat:'idiom',word:'in a tough spot',ko:'곤란한 처지에, 어려운 상황에 놓인',nuance:'spot = 위치(location). 18세기 영어에서 "in a spot" = 움직이지 못하는 곤란한 자리에 처한 상태. "tough" = 힘들고 거친. "puts us in a tough spot" = 우리를 곤란한 처지로 만든다. 비슷한 표현들의 뉘앙스 차이: in a bind(얽매인), in a pickle(영국식, 절여진 것처럼 진퇴양난), in a jam(막힌), in a fix(고장 난 것처럼 꼼짝 못 하는). "tough spot"이 가장 중립적이고 비즈니스에서 자주 쓰임',diff:1},
  {id:'id3',cat:'idiom',word:'mind-blowing',ko:'경이로운, 마음이 날아갈 정도로 충격적으로 대단한',nuance:'1960년대 미국 반문화(counterculture) 운동에서 유래: 강렬한 체험이 "마음(mind)을 날려버린다(blow)"는 표현. 당시 부정적 뉘앙스에서 "엄청나게 놀랍고 인상적인"으로 일반화. "The progress we\'ve made with AI is mind-blowing" — 비즈니스 인터뷰에서도 자연스럽게 사용. incredible, astonishing보다 더 구어적이고 강렬함. 영어 원어민이 일상에서 진심으로 감동했을 때 자연스럽게 쓰는 표현',diff:1},
  {id:'id4',cat:'idiom',word:'through the lens of',ko:'~의 시각으로, ~라는 프레임을 통해 바라보다',nuance:'렌즈(lens) = 카메라나 안경의 광학 유리. 렌즈를 통해 보면 세상이 특정 방식으로 확대되거나 초점이 맞춰짐. "protein has become the primary lens through which leaders evaluate growth" = 단백질이라는 렌즈로 모든 기회를 바라본다. 분석·학문·전략에서 매우 자주 쓰이는 은유. 비슷한 표현: "through the prism of"(더 격식적), "from the perspective of"(더 중립적). lens는 왜곡·확대의 뉘앙스 포함',diff:2},
  {id:'id5',cat:'idiom',word:'marketing angle',ko:'마케팅 각도, 제품을 소비자에게 포지셔닝하는 접근법',nuance:'angle = 기하학의 각도 → 특정 방향에서 보는 시각. 저널리즘에서: "a story\'s angle" = 기사를 어떤 관점에서 쓸 것인가. 마케팅에서: "angle" = 제품의 어떤 강점을 강조해 소비자에게 어필할 것인가. "protein not as a short-term marketing angle" = 단기 프로모션 포인트가 아니라는 것. spin(정치적 프레이밍)과 유사하지만 중립적 뉘앙스. take a new angle on = 새로운 시각으로 접근하다',diff:2},
  {id:'id6',cat:'idiom',word:'on the horizon',ko:'수평선 위에 = 가까운 미래에 다가오는',nuance:'horizon = 수평선. 바라볼 수 있지만 아직 도달하지 못한 경계선. "on the horizon" = 곧 다가오는 것으로 보이지만 아직 도착하지 않은 상태. "an emerging trend on the horizon" = 수평선 위로 막 떠오르는 신흥 트렌드. 거리 뉘앙스 비교: on the horizon(가까운 미래, 보임) > around the corner(더 임박함) > over the horizon(아직 멀거나 이미 지난). 희망적이고 시각적인 이미지',diff:1},
  {id:'co1',cat:'colloc',word:'margin pressure',ko:'마진 압박, 이익률을 쥐어짜는 외부 압력',nuance:'margin = 매출에서 원가를 뺀 이익률. pressure = 외부에서 가해지는 힘. 원자재 비용 상승 + 가격 인상 불가 = margin pressure. "margin pressure" vs "margin compression": pressure는 외부에서 가해지는 힘 자체, compression은 실제로 마진이 눌린 결과. "under margin pressure" = 마진 압박 하에 있다. 제조업, 소매, 식품업에서 거의 매 분기 실적 발표에 등장하는 필수 표현',diff:1},
  {id:'co2',cat:'colloc',word:'input volatility',ko:'원자재 투입 비용 변동성',nuance:'input = 생산에 들어가는 원재료·에너지·노동력. volatility는 원래 물리학 용어: volatile(휘발성 있는) = 쉽게 기화하는 성질 → 금융에서 가격이 예측 불가능하게 오르내리는 성질로 확장. "input volatility" = 원재료·에너지 비용이 불안정하게 변동하는 것. 낙농업은 곡물(사료), 에너지, 포장재 가격 변동에 특히 취약. high-volatility environment = 비용 예측이 불가능한 환경',diff:2},
  {id:'co3',cat:'colloc',word:'supply security',ko:'공급 안보, 안정적인 원료 공급 보장',nuance:'"energy security"(에너지 안보)와 같은 패턴. security = 위협으로부터 보호된 안정된 상태. "supply security" = 생산에 필요한 원료나 자원이 중단 없이 안정적으로 공급될 것이라는 확신. COVID·전쟁 이후 글로벌 공급망 재편 논의에서 핵심 용어로 부상. 유럽 낙농업에서는 원유 공급 자체가 위협받는 상황: "supply security and labor availability as intertwined challenges"',diff:2},
  {id:'co4',cat:'colloc',word:'investment thesis',ko:'투자 논리, 투자 결정의 핵심 근거',nuance:'thesis = 논제(대학원 학위논문처럼 증명해야 할 명제). "investment thesis" = "이 투자를 해야 하는 이유와 기대 결과에 대한 논리적 주장". VC(벤처캐피털)가 스타트업에 투자할 때 "our investment thesis is X" 형식으로 사용. "protein not as a short-term marketing angle but as a long-term investment thesis" = 단기 프로모션이 아닌 장기 투자 근거로 단백질을 바라본다는 것. 전략적 사고의 핵심 표현',diff:3},
  {id:'co5',cat:'colloc',word:'protein fortification',ko:'단백질 강화, 식품에 단백질을 추가하는 것',nuance:'fortification의 어원: Latin fortis(강한) + -fication(만들기). 원래 의미: 성벽 강화, 요새화(fort). 식품 과학에서: 원래 음식에 없거나 부족한 영양소를 인공적으로 추가. 역사적 배경: 1930년대 미국에서 비타민 D 결핍으로 인한 구루병(rickets) 예방을 위해 우유에 비타민 D를 강화한 것이 fortification의 시작. "fortified milk" = 강화 우유는 미국 낙농업의 표준. 오늘날 "protein fortification" = 고단백 트렌드의 핵심 전략',diff:2},
  {id:'co6',cat:'colloc',word:'capital allocation',ko:'자본 배분, 보유 자금을 어디에 쓸지 결정하는 것',nuance:'capital = 자본(기업이 활용할 수 있는 돈·자산). allocation = 배분(allocate에서). "capital allocation" = 기업이 보유한 자금을 어떤 사업/설비/R&D/주주환원에 쓸지 결정하는 것. Warren Buffett: "The most important job of a CEO is capital allocation." CEO와 CFO가 하는 가장 중요한 전략적 의사결정. "shaping portfolio strategy and capital allocation" = 포트폴리오 전략과 자금 사용 방향 결정',diff:2},
  {id:'co7',cat:'colloc',word:'succession pipeline',ko:'승계 파이프라인, 리더십 후계자 준비 경로',nuance:'succession = 계승(왕위 계승처럼). pipeline = 파이프라인: 원유가 단계적으로 흐르는 관 → 미래 후보자들이 단계적으로 준비되는 이미지. "succession pipeline" = 핵심 직위가 빌 때 즉시 채울 준비된 후보자 풀. "thin succession pipelines for critical operational roles" = 공장장 같은 핵심 운영직 후계자가 거의 없는 상태. 군주제의 "line of succession"(왕위 계승 순서)에서 비즈니스로 전용된 표현',diff:2},

const learned=new Set(JSON.parse(localStorage.getItem(STORE)||'[]'));
let activeCat='all';

function dots(n){return[1,2,3].map(i=>`<span class="dot${i<=n?' on':''}"></span>`).join('');}
function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  cards.forEach(c=>{
    const div=document.createElement('div');
    div.className=`card ${c.cat}${learned.has(c.id)?' learned':''}${activeCat!=='all'&&c.cat!==activeCat?' hidden':''}`;
    div.innerHTML=`<div class="card-inner">
      <div class="front">
        <span class="cat-tag">${c.cat.toUpperCase()}</span>
        <div class="word">${c.word}</div>
        <div class="dots">${dots(c.diff)}</div>
      </div>
      <div class="back">
        <span class="cat-tag">${c.cat.toUpperCase()}</span>
        <div class="ko">${c.ko}</div>
        <div class="nuance">${c.nuance}</div>
        <button class="mark-btn">${learned.has(c.id)?'✓ 학습완료':'완료 표시'}</button>
      </div>
    </div>`;
    div.addEventListener('click',e=>{
      if(e.target.classList.contains('mark-btn'))return;
      div.classList.toggle('flipped');
    });
    div.querySelector('.mark-btn').addEventListener('click',()=>{
      if(learned.has(c.id))learned.delete(c.id);else learned.add(c.id);
      localStorage.setItem(STORE,JSON.stringify([...learned]));
      render();updateCount();
    });
    grid.appendChild(div);
  });
}
function updateCount(){
  document.getElementById('cnt').textContent=learned.size;
}
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeCat=btn.dataset.cat;
    render();
  });
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  learned.clear();localStorage.removeItem(STORE);render();updateCount();
});
render();updateCount();
</script>
