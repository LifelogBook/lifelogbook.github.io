<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK-India: A 21st-century partnership — Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1e3a5f;
    --ink2: #2d5f8a;
    --accent: #d4a017;
    --accent2: #b8860b;
    --sky: #fefcf3;
    --bg: #fdfcf5;
    --border: #e8d080;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--ink); }

  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5f8a 50%, #d4a017 100%);
    color: #fff;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.4rem, 4vw, 2rem); margin-bottom: .5rem; }
  .badge {
    display: inline-block;
    border: 1.5px solid rgba(255,255,255,.5);
    border-radius: 20px;
    padding: .25rem .9rem;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .progress-wrap { max-width: 700px; margin: 0 auto 1rem; padding: 0 1rem; }
  .progress-bar-bg { background: rgba(255,255,255,.2); border-radius: 4px; height: 6px; }
  .progress-bar { background: var(--accent); height: 6px; border-radius: 4px; transition: width .4s; width: 0%; }
  .progress-label { font-size: .8rem; text-align: right; margin-top: .3rem; color: rgba(255,255,255,.85); }

  .filters { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; padding: 1rem 1rem .5rem; }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--ink);
    padding: .35rem .9rem;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .filter-btn:hover:not(.active) { background: var(--sky); }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    padding: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card-wrap { perspective: 900px; }
  .card {
    position: relative;
    height: 220px;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    padding: 1.1rem 1.2rem;
    display: flex; flex-direction: column;
    border: 1.5px solid var(--border);
  }
  .front { background: #fff; }
  .back { background: var(--sky); transform: rotateY(180deg); justify-content: space-between; }

  .card.learned .front { background: linear-gradient(135deg, #fefcf3 0%, #e8d080 100%); }

  .tag {
    display: inline-block;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: .2rem .55rem;
    border-radius: 10px;
    color: #fff;
    margin-bottom: .6rem;
    width: fit-content;
  }
  .tag-phrasal  { background: #d4a017; }
  .tag-idiom    { background: #7c3aed; }
  .tag-colloc   { background: #1e3a5f; }
  .tag-vocab    { background: #0ea5e9; }
  .tag-biz      { background: #dc2626; }

  .word { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: var(--ink); line-height: 1.2; margin-bottom: .3rem; }
  .pron { font-size: .75rem; color: #666; margin-bottom: .4rem; }
  .dots { display: flex; gap: 3px; margin-top: auto; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .25; }
  .dot.on { opacity: 1; }

  .ko { font-size: .95rem; font-weight: 600; color: var(--ink); margin-bottom: .4rem; line-height: 1.4; }
  .nuance { font-size: .78rem; color: #444; line-height: 1.5; flex: 1; }
  .check-btn {
    align-self: flex-end;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: .75rem;
    font-weight: 600;
    padding: .3rem .75rem;
    border-radius: 10px;
    cursor: pointer;
    transition: background .2s;
    margin-top: .5rem;
  }
  .check-btn:hover { background: var(--accent2); }
  .check-btn.done { background: #9ca3af; }

  .learned-badge {
    position: absolute;
    top: .6rem; right: .6rem;
    font-size: .7rem;
    background: var(--accent);
    color: #fff;
    padding: .15rem .45rem;
    border-radius: 8px;
    font-weight: 700;
    display: none;
  }
  .card.learned .learned-badge { display: block; }
</style>
</head>
<body>

<header>
  <div class="badge">McKinsey &amp; Company · 2025</div>
  <h1>UK-India: A 21st-century partnership</h1>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="pbar"></div></div>
    <div class="progress-label" id="plabel">0 / 35 learned</div>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-cat="all">ALL (35)</button>
  <button class="filter-btn" data-cat="phrasal">PHRASAL (6)</button>
  <button class="filter-btn" data-cat="idiom">IDIOM (6)</button>
  <button class="filter-btn" data-cat="colloc">COLLOC (7)</button>
  <button class="filter-btn" data-cat="vocab">고급단어 (10)</button>
  <button class="filter-btn" data-cat="biz">비즈니스 (6)</button>
</div>

<div id="grid"></div>

<script>
const STORAGE_KEY = 'uk_india_partnership_learned';
const learned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

const cards = [
  // ── PHRASAL (6) ──
  {id:'pv1', cat:'phrasal', word:'open up', pron:'', ko:'열다, 개방하다 (새 기회·시장을)', nuance:'open=열다 + up=완전히 → 닫혀 있던 것을 완전히 여는 이미지. "the FTA opens up new growth opportunities for both countries." 관세 장벽 철폐로 접근 불가능하던 시장이 열리는 맥락. enter(진입하다)보다 가능성 자체가 생기는 뉘앙스.', diff:1},
  {id:'pv2', cat:'phrasal', word:'embed into', pron:'', ko:'깊이 통합되다, 편입되다', nuance:'embed=박아 넣다 + into=안으로. 표면에 붙는 것이 아니라 내부 깊숙이 통합되는 이미지. "embed themselves more deeply in global production networks." 공급망·생태계에 없어서는 안 될 존재가 되는 것.', diff:2},
  {id:'pv3', cat:'phrasal', word:'capitalize on', pron:'', ko:'~을 최대한 활용하다, 기회로 삼다', nuance:'capital=자본 → 기회를 자본처럼 운용해 수익으로 전환. "companies can capitalize on the opportunities to deliver growth." take advantage of보다 적극적·전략적 뉘앙스. 주어가 능동적으로 기회를 잡는 이미지.', diff:2},
  {id:'pv4', cat:'phrasal', word:'press ahead', pron:'', ko:'계속 밀고 나가다, 추진하다', nuance:'press=누르다 + ahead=앞으로 → 저항이 있어도 압력을 가하며 전진. "both sides pressing ahead with investment agreement discussions." push forward와 유사하지만 press ahead는 장애물이 있음을 암시하는 강한 의지 표현.', diff:2},
  {id:'pv5', cat:'phrasal', word:'build on', pron:'', ko:'~을 기반으로 발전시키다', nuance:'build=짓다 + on=~위에 → 이미 있는 토대 위에 새로운 것을 쌓아 올리는 이미지. "build on the existing trading relationship between the two countries." 처음부터 시작하는 것이 아니라 기존 강점을 활용해 더 발전시키는 것.', diff:1},
  {id:'pv6', cat:'phrasal', word:'work toward', pron:'', ko:'~을 향해 협력하다, 추진하다', nuance:'work=노력하다 + toward=~를 향해 → 목표를 향해 지속적으로 나아가는 과정. "India working toward a $1 trillion goods export target by 2030." 즉각적 달성이 아닌 방향성과 지속적 노력을 강조.', diff:1},

  // ── IDIOM (6) ──
  {id:'id1', cat:'idiom', word:'geopolitical fragmentation', pron:'', ko:'지정학적 파편화 (글로벌 무역 질서 분열)', nuance:'geo(지리)+political(정치)+fragmentation(파편화). 미중 갈등·브렉시트·관세전쟁 등으로 단일했던 글로벌 자유무역 질서가 여러 블록으로 쪼개지는 현상. "working closely in a time of geopolitical fragmentation." UK-India FTA는 이 파편화 속 새로운 파트너십의 모델.', diff:3},
  {id:'id2', cat:'idiom', word:'operating footprint', pron:'', ko:'운영 거점 범위, 사업 발자국', nuance:'operating=운영 + footprint=발자국 → 기업이 어떤 나라·지역에서 얼마만큼의 규모로 사업을 운영하는지. "revising operating footprints and optimizing supply chains." 공급망 재편 시 중국 비중을 줄이고 인도 비중을 늘리는 것이 operating footprint 조정.', diff:3},
  {id:'id3', cat:'idiom', word:'trade corridor', pron:'', ko:'무역 회랑, 교역 경로', nuance:'trade=교역 + corridor=복도·통로. 무역이 집중적으로 흐르는 경로(항로·육로·파이프라인). "a shift in current trade corridors." 지정학 변화로 중국을 우회해 인도·동남아로 흐르는 무역 경로가 재편되는 맥락.', diff:3},
  {id:'id4', cat:'idiom', word:'unicorn landscape', pron:'', ko:'유니콘 생태계 (스타트업 고성장 군상)', nuance:'unicorn=기업가치 $1B+ 스타트업 + landscape=풍경 → 유니콘 기업들이 어떻게 분포·성장하고 있는지에 대한 전체 그림. "furthering both countries\' strong venture capital and unicorn landscape." 인도: 세계 10개 유니콘 중 1개. UK: 유럽 최대 스타트업 생태계.', diff:2},
  {id:'id5', cat:'idiom', word:'policy unpredictability', pron:'', ko:'정책 불예측성 (규제 환경의 예측 불가능성)', nuance:'policy=정책 + unpredictability=예측 불가능성. 외국인 직접투자(FDI)를 저해하는 핵심 요인. "Among the challenges are legal delays, land laws, tax and compliance processes, and policy unpredictability." 인도 투자의 가장 큰 장벽 중 하나 — 갑작스러운 규제 변화나 해석 불일치.', diff:3},
  {id:'id6', cat:'idiom', word:'sets the stage for', pron:'', ko:'~을 위한 무대를 마련하다, 기반을 닦다', nuance:'연극에서 무대(stage)를 세팅하는 이미지 → 어떤 중요한 일이 일어날 조건과 환경을 갖추는 것. "global reassessment sets the stage for a shift in current trade corridors." 원인-결과의 중간 단계를 표현하는 공식적·관용적 표현.', diff:2},

  // ── COLLOC (7) ──
  {id:'co1', cat:'colloc', word:'free trade agreement', pron:'', ko:'자유무역협정 (FTA)', nuance:'free=자유로운 + trade=무역 + agreement=협정. 양국 간 관세·비관세 장벽을 줄이는 국제협정. "UK-India FTA signed May 6, 2025 — tariffs on 99% of Indian exports and 90% of UK exports eliminated." 브렉시트 이후 영국 최대 무역 협정.', diff:1},
  {id:'co2', cat:'colloc', word:'bilateral trade', pron:'', ko:'양자 무역, 쌍방 교역', nuance:'bilateral=양면의(bi+lateral) + trade=무역 → 두 국가 간 교역. multilateral(다자)과 구별. "increase bilateral trade by $34 billion a year." 2014년 $14B → 2024년 $22B으로 이미 두 배 증가한 상태에서 FTA로 추가 $34B 기대.', diff:1},
  {id:'co3', cat:'colloc', word:'offshore wind', pron:'', ko:'해상 풍력', nuance:'offshore=해안에서 떨어진 + wind=바람. 바다 위에 설치하는 풍력발전. 육상 풍력보다 바람이 강하고 부지 제약이 적음. "UK has the world\'s second-largest offshore wind pipeline." UK-India offshore wind task force(2025년 2월 출범)로 협력 강화.', diff:2},
  {id:'co4', cat:'colloc', word:'nonfossil energy capacity', pron:'', ko:'비화석 에너지 설비 용량', nuance:'nonfossil=화석연료 아닌 + energy capacity=에너지 설비 용량(GW). 태양광·풍력·수력·원자력 등 포함. "India\'s goal of 500 GW nonfossil energy capacity by 2030." 현재 전기 수요의 50%를 재생에너지로 충당하는 것이 목표.', diff:2},
  {id:'co5', cat:'colloc', word:'engineering R&D sourcing', pron:'', ko:'엔지니어링 R&D 아웃소싱', nuance:'engineering=공학+R&D=연구개발+sourcing=외부 조달. 글로벌 기업이 설계·개발 업무를 인도에서 조달하는 것. "engineering R&D sourcing from India could increase from $44B to $130B by 2030." 단순 IT 아웃소싱에서 고부가가치 R&D로 업그레이드.', diff:3},
  {id:'co6', cat:'colloc', word:'middle-class consumer', pron:'', ko:'중산층 소비자', nuance:'middle-class=중간 소득 계층 + consumer=소비자. 기본 욕구 충족 이상의 구매력을 가진 소비자. "India could have more than 1 billion middle-class consumers by 2047." 이들이 품질·브랜드에 민감해지면서 프리미엄 시장 성장 → UK 기업 기회.', diff:2},
  {id:'co7', cat:'colloc', word:'digital trade barrier', pron:'', ko:'디지털 무역 장벽', nuance:'digital=디지털 + trade barrier=무역 장벽. 데이터 현지화 의무·플랫폼 규제·사이버보안 규정 등 디지털 서비스 교역을 제한하는 규제. "reducing digital trade barriers" — UK-India FTA의 기술·AI 협력 장벽 해소 과제.', diff:3},

  // ── VOCAB (10) ──
  {id:'v1', cat:'vocab', word:'bilateral', pron:'[ˌbaɪˈlætərəl]', ko:'양자의, 쌍방의', nuance:'라틴어 bi(둘)+lateralis(측면의). "the biggest and most economically significant bilateral trade deal." two-way와 같은 뜻이지만 bilateral은 정치·외교·법률 문서에서 공식적으로 쓰임. multilateral(다자), unilateral(일방)과 구별.', diff:2},
  {id:'v2', cat:'vocab', word:'fragmentation', pron:'[ˌfræɡmənˈteɪʃən]', ko:'파편화, 분열', nuance:'라틴어 fragmentum(조각). 통합되어 있던 것이 여러 작은 조각으로 나뉘는 과정. "geopolitical fragmentation" — 단극 자유무역 질서가 진영별 블록으로 분열. 반대: integration(통합).', diff:2},
  {id:'v3', cat:'vocab', word:'procurement', pron:'[prəˈkjʊərmənt]', ko:'조달, 구매', nuance:'라틴어 procurare(관리하다). 필요한 물품·서비스를 공식 절차를 통해 구매하는 과정. "£38 billion procurement market" — 인도 정부·공공기관 구매 시장. government procurement(정부 조달)은 외국 기업에 매력적인 진입 기회.', diff:2},
  {id:'v4', cat:'vocab', word:'insurmountable', pron:'[ˌɪnsərˈmaʊntəbl]', ko:'극복할 수 없는, 넘을 수 없는', nuance:'in(부정)+sur(위)+mountain(산)+able → 산을 넘을 수 없는. "Though daunting, these challenges are not insurmountable." 이중 부정으로 긍정 강조 — 도전이 크지만 극복 가능하다는 낙관적 결론. formidable과 달리 주로 부정형(not ~)으로 쓰임.', diff:3},
  {id:'v5', cat:'vocab', word:'enduring', pron:'[ɪnˈdjʊərɪŋ]', ko:'지속적인, 영속하는', nuance:'endure(견디다, 계속되다)의 분사형. "enduring attractions" — 일시적 유행이 아닌 구조적·역사적 강점. UK의 자본시장·법적 시스템·언어는 enduring advantages. lasting과 유사하지만 enduring은 어려움에도 불구하고 지속되는 뉘앙스.', diff:2},
  {id:'v6', cat:'vocab', word:'proposition', pron:'[ˌprɒpəˈzɪʃən]', ko:'가치 제안, 명제', nuance:'라틴어 proponere(앞에 내놓다). 비즈니스에서는 "우리 제품이 당신에게 제공하는 가치"를 뜻함. "companies will need to tailor their products to win in each other\'s markets where there are different expectations across quality, price, and proposition." value proposition=가치 제안.', diff:2},
  {id:'v7', cat:'vocab', word:'constructive', pron:'[kənˈstrʌktɪv]', ko:'건설적인, 생산적인', nuance:'construct(구축하다)+-ive. 비판·파괴와 반대로 실질적 해법과 발전을 지향하는 태도. "United Kingdom and India have a similarly constructive approach to establishing and maintaining global trade ties." destructive(파괴적)의 반대.', diff:2},
  {id:'v8', cat:'vocab', word:'compliance', pron:'[kəmˈplaɪəns]', ko:'규정 준수, 컴플라이언스', nuance:'comply(따르다)+-ance. 법률·규정·표준을 지키는 것. "land laws, tax and compliance processes" — 인도 진출의 복잡한 규제 준수 과제. non-compliance=위반. compliance cost(컴플라이언스 비용)는 외국 기업 진입 장벽.', diff:2},
  {id:'v9', cat:'vocab', word:'tariff', pron:'[ˈtærɪf]', ko:'관세', nuance:'아랍어 ta\'rif(통지, 목록) → 수입품에 부과하는 세금. "tariffs on 99 percent of Indian exports to the United Kingdom eliminated." 관세 철폐가 FTA의 핵심 혜택. tariff barrier(관세 장벽) vs non-tariff barrier(비관세 장벽: 기술 규격, 위생 기준 등).', diff:1},

function renderCards(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? cards : cards.filter(c => c.cat === filter);
  filtered.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    const isLearned = learned.has(c.id);
    wrap.innerHTML = `
      <div class="card${isLearned ? ' learned' : ''}" id="card-${c.id}">
        <div class="card-face front">
          <span class="tag tag-${c.cat}">${c.cat.toUpperCase()}</span>
          <div class="word">${c.word}</div>
          ${c.pron ? `<div class="pron">${c.pron}</div>` : ''}
          <div class="dots">
            <div class="dot${c.diff>=1?' on':''}"></div>
            <div class="dot${c.diff>=2?' on':''}"></div>
            <div class="dot${c.diff>=3?' on':''}"></div>
          </div>
          <div class="learned-badge">✓ learned</div>
        </div>
        <div class="card-face back">
          <div>
            <div class="ko">${c.ko}</div>
            <div class="nuance">${c.nuance}</div>
          </div>
          <button class="check-btn${isLearned ? ' done' : ''}" data-id="${c.id}">
            ${isLearned ? '✓ learned' : 'Mark as learned'}
          </button>
        </div>
      </div>`;
    wrap.querySelector('.card').addEventListener('click', e => {
      if (e.target.classList.contains('check-btn')) return;
      e.currentTarget.classList.toggle('flipped');
    });
    wrap.querySelector('.check-btn').addEventListener('click', e => {
      e.stopPropagation();
      const id = e.target.dataset.id;
      if (learned.has(id)) { learned.delete(id); } else { learned.add(id); }
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
      renderCards(filter);
      updateProgress();
    });
    grid.appendChild(wrap);
  });
}

function updateProgress() {
  const total = 35;
  const count = learned.size;
  const pct = Math.round(count / total * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = `${count} / ${total} learned`;
}

let currentFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.cat;
    renderCards(currentFilter);
  });
});

renderCards('all');
updateProgress();
</script>
