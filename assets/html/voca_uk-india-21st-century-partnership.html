<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK-India: A 21st-century Partnership — Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1e3a5f;
    --ink2: #2d5f8a;
    --accent: #d4a017;
    --accent2: #b8860b;
    --sky: #fefcf3;
    --bg: #fdfcf5;
    --border: #e8d080;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--ink); }

  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5f8a 50%, #d4a017 100%);
    color: #fff;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.4rem, 4vw, 2rem); margin-bottom: .5rem; }
  .badge {
    display: inline-block;
    border: 1.5px solid rgba(255,255,255,.5);
    border-radius: 20px;
    padding: .25rem .9rem;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .progress-wrap { max-width: 700px; margin: 0 auto 1rem; padding: 0 1rem; }
  .progress-bar-bg { background: rgba(255,255,255,.2); border-radius: 4px; height: 6px; }
  .progress-bar { background: var(--accent); height: 6px; border-radius: 4px; transition: width .4s; width: 0%; }
  .progress-label { font-size: .8rem; text-align: right; margin-top: .3rem; color: rgba(255,255,255,.85); }

  .filters { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; padding: 1rem 1rem .5rem; }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--ink);
    padding: .35rem .9rem;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .filter-btn:hover:not(.active) { background: var(--sky); }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    padding: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card-wrap { perspective: 900px; }
  .card {
    position: relative;
    height: 220px;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    padding: 1.1rem 1.2rem;
    display: flex; flex-direction: column;
    border: 1.5px solid var(--border);
  }
  .front { background: #fff; }
  .back { background: var(--sky); transform: rotateY(180deg); justify-content: space-between; }

  .card.learned .front { background: linear-gradient(135deg, #fefcf3 0%, #f5e06a 30%, #fef9e0 100%); }

  .tag {
    display: inline-block;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: .2rem .55rem;
    border-radius: 10px;
    color: #fff;
    margin-bottom: .6rem;
    width: fit-content;
  }
  .tag-phrasal  { background: #d4a017; }
  .tag-idiom    { background: #7c3aed; }
  .tag-colloc   { background: #1e3a5f; }
  .tag-vocab    { background: #0ea5e9; }
  .tag-biz      { background: #dc2626; }

  .word { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: var(--ink); line-height: 1.2; margin-bottom: .3rem; }
  .pron { font-size: .75rem; color: #666; margin-bottom: .4rem; }
  .dots { display: flex; gap: 3px; margin-top: auto; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .25; }
  .dot.on { opacity: 1; }

  .ko { font-size: .95rem; font-weight: 600; color: var(--ink); margin-bottom: .4rem; line-height: 1.4; }
  .nuance { font-size: .78rem; color: #444; line-height: 1.5; flex: 1; }
  .check-btn {
    align-self: flex-end;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: .75rem;
    font-weight: 600;
    padding: .3rem .75rem;
    border-radius: 10px;
    cursor: pointer;
    transition: background .2s;
    margin-top: .5rem;
  }
  .check-btn:hover { background: var(--accent2); }
  .check-btn.done { background: #9ca3af; }

  .learned-badge {
    position: absolute;
    top: .6rem; right: .6rem;
    font-size: .7rem;
    background: var(--accent);
    color: #fff;
    padding: .15rem .45rem;
    border-radius: 8px;
    font-weight: 700;
    display: none;
  }
  .card.learned .learned-badge { display: block; }
</style>
</head>
<body>

<header>
  <div class="badge">McKinsey &amp; Company &middot; 2025</div>
  <h1>UK-India: A 21st-century Partnership</h1>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="pbar"></div></div>
    <div class="progress-label" id="plabel">0 / 35 learned</div>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-cat="all">ALL (35)</button>
  <button class="filter-btn" data-cat="phrasal">PHRASAL (6)</button>
  <button class="filter-btn" data-cat="idiom">IDIOM (6)</button>
  <button class="filter-btn" data-cat="colloc">COLLOC (7)</button>
  <button class="filter-btn" data-cat="vocab">고급단어 (10)</button>
  <button class="filter-btn" data-cat="biz">비즈니스 (6)</button>
</div>

<div id="grid"></div>

<script>
const STORAGE_KEY = 'uk_india_partnership_learned';
const learned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

const cards = [
  // PHRASAL (6)
  {id:'pv1', cat:'phrasal', word:'open up', pron:'', ko:'(기회·시장을) 열어주다, 가능하게 하다', nuance:'open=열다 + up=완전히 → 닫혀 있던 것이 활짝 열리는 이미지. "the FTA opens up new growth opportunities." 관세 장벽 철폐로 이전에 막혀 있던 시장 접근이 가능해지는 맥락. open the door to와 유사하지만 더 넓은 범위에 쓰임.', diff:1},
  {id:'pv2', cat:'phrasal', word:'embed into', pron:'', ko:'깊이 통합되다, 단단히 자리 잡다', nuance:'embed=박아 넣다 + into=안으로 → 표면이 아닌 내부 깊이 통합되는 이미지. "embed themselves more deeply in global production networks." 공급망에 피상적으로 참여하는 게 아니라 구조적으로 엮여드는 것. be embedded in으로도 자주 쓰임.', diff:2},
  {id:'pv3', cat:'phrasal', word:'capitalize on', pron:'', ko:'~을 최대한 활용하다, 기회로 삼다', nuance:'capital=자본 + -ize + on=~을 대상으로 → 기회를 자본처럼 투자해 수익으로 전환하는 이미지. "companies can capitalize on the opportunities." take advantage of보다 능동적·전략적 뉘앙스. 주로 비즈니스·전략 맥락.', diff:2},
  {id:'pv4', cat:'phrasal', word:'press ahead', pron:'', ko:'계속 밀고 나가다, 강행하다', nuance:'press=누르다, 밀다 + ahead=앞으로 → 어려움이나 저항이 있어도 전진하는 이미지. "both sides press ahead with investment discussions." push forward보다 더 결연한 의지 뉘앙스. 장애물이 존재하는 상황에서 주로 쓰임.', diff:2},
  {id:'pv5', cat:'phrasal', word:'build on', pron:'', ko:'~을 기반으로 하다, 토대로 발전시키다', nuance:'build=세우다 + on=~위에 → 이미 있는 것 위에 추가로 쌓아올리는 이미지. "build on the existing strong partnership." 처음부터 새로 시작하는 게 아니라 기존 성과·관계를 활용해 더 크게 확장하는 것.', diff:1},
  {id:'pv6', cat:'phrasal', word:'work toward', pron:'', ko:'~을 향해 함께 나아가다, 노력하다', nuance:'work=일하다 + toward=~방향으로 → 특정 목표를 향해 지속적으로 노력하는 이미지. "working toward a $1 trillion goods export target." strive for보다 협력적이고 점진적인 뉘앙스. 장기 목표에 자주 사용.', diff:1},

  // IDIOM (6)
  {id:'id1', cat:'idiom', word:'geopolitical fragmentation', pron:'', ko:'지정학적 파편화 (글로벌 질서 분열)', nuance:'geopolitical=지정학 + fragmentation=파편화. 하나였던 글로벌 무역·동맹 질서가 여러 조각으로 분열되는 현상. "working closely in a time of geopolitical fragmentation." 미-중 갈등, 브렉시트, 러-우 전쟁 등이 촉발한 탈세계화 흐름의 핵심 개념어.', diff:3},
  {id:'id2', cat:'idiom', word:'operating footprint', pron:'', ko:'운영 거점 범위, 사업 발자국', nuance:'operating=운영 + footprint=발자국 → 기업이 어느 국가·지역에 얼마나 사업 인프라를 두고 있는지의 범위. "revising operating footprints" — 지정학 변화로 공급망을 재편할 때 거점을 줄이거나 이전하는 것. carbon footprint처럼 규모·범위 이미지.', diff:3},
  {id:'id3', cat:'idiom', word:'trade corridor', pron:'', ko:'무역 회랑 (교역 흐름의 경로)', nuance:'trade=무역 + corridor=복도, 통로 → 복도처럼 지정된 경로로 교역이 흐르는 이미지. "shift in current trade corridors." 중국 중심의 글로벌 공급망이 인도·동남아 등으로 이동하는 것을 표현. 국제 물류·무역 정책 문서에서 자주 등장.', diff:3},
  {id:'id4', cat:'idiom', word:'unicorn landscape', pron:'', ko:'유니콘 생태계 (스타트업 군상)', nuance:'unicorn=기업가치 $1B+ 스타트업 + landscape=풍경 → 유니콘 기업들이 분포한 전체 생태계 지형. "furthering both countries\' strong VC and unicorn landscape." UK는 유럽 최대, 인도는 글로벌 10개 중 1개 배출.', diff:2},
  {id:'id5', cat:'idiom', word:'policy unpredictability', pron:'', ko:'정책 불예측성 (규제 환경의 불확실성)', nuance:'policy=정책 + unpredictability=예측 불가능성. 정부 규제·세제·승인 기준이 예고 없이 바뀌어 외국 기업이 장기 계획을 세우기 어려운 상태. 인도 진출 기업들이 꼽는 가장 큰 도전 중 하나. FDI 결정의 핵심 위험 요인.', diff:3},
  {id:'id6', cat:'idiom', word:'set the stage for', pron:'', ko:'~을 위한 무대를 마련하다, 조건을 갖추다', nuance:'연극 공연 전 무대를 세팅하는 것에서 유래 → 어떤 사건·변화가 일어날 수 있는 조건과 환경을 갖추는 것. "global reassessment sets the stage for a shift in trade corridors." 변화가 아직 일어나지 않았지만 이미 그 준비가 됐음을 암시.', diff:2},

  // COLLOC (7)
  {id:'co1', cat:'colloc', word:'free trade agreement', pron:'', ko:'자유무역협정 (FTA)', nuance:'free=자유로운 + trade=무역 + agreement=협정. 두 국가 간 관세·비관세 장벽을 줄이거나 없애는 공식 협약. UK-India FTA: 인도 수출 99%, 영국 수출 90% 관세 철폐. 영국이 브렉시트 이후 체결한 가장 큰 규모의 협정.', diff:1},
  {id:'co2', cat:'colloc', word:'bilateral trade', pron:'', ko:'양자 무역, 쌍방 교역', nuance:'bilateral=bi(둘)+lateral(측면) → 두 면(국가)을 동시에 가진. "increase bilateral trade by $34 billion a year." 2014년 $14B → 2024년 $22B → FTA 이후 추가 $34B 증가 예상. multilateral trade(다자 무역)와 구별.', diff:1},
  {id:'co3', cat:'colloc', word:'offshore wind', pron:'', ko:'해상 풍력', nuance:'offshore=해안에서 떨어진 바다 위 + wind=바람. 육지보다 풍속이 강하고 일정해 발전 효율이 높음. "UK: second-largest offshore wind pipeline globally." 인도는 500GW 비화석 목표 달성을 위해 UK 협력이 필요. UK는 해상풍력 선진국으로 기술 수출 기회.', diff:2},
  {id:'co4', cat:'colloc', word:'nonfossil energy capacity', pron:'', ko:'비화석 에너지 설비 용량', nuance:'nonfossil=화석연료가 아닌 + energy=에너지 + capacity=용량. 태양광·풍력·수력·원자력 등 탄소 배출 없는 에너지원의 발전 설비 규모. "India\'s goal of 500GW nonfossil energy capacity by 2030." 인도 에너지 전환의 핵심 수치.', diff:2},
  {id:'co5', cat:'colloc', word:'engineering R&D sourcing', pron:'', ko:'엔지니어링 R&D 아웃소싱 (인도 연구개발 조달)', nuance:'engineering=공학 + R&D=연구개발 + sourcing=조달. 글로벌 기업이 R&D·엔지니어링 업무를 인도 현지 인력에게 아웃소싱하는 것. "$44B today → $130B by 2030." 인도의 STEM 인재 풀과 저비용이 강점. Global Capability Center(GCC) 확산과 연결.', diff:3},
  {id:'co6', cat:'colloc', word:'middle-class consumer', pron:'', ko:'중산층 소비자', nuance:'middle=중간 + class=계층 + consumer=소비자. 기본 욕구를 충족하고 재량 지출이 가능한 소득 계층. "more than 1 billion middle-class consumers by 2047." 인도 소비 시장이 세계 2위($4.3T)로 성장하는 핵심 동력. 글로벌 소비재 기업의 인도 진출 논거.', diff:2},
  {id:'co7', cat:'colloc', word:'digital trade barrier', pron:'', ko:'디지털 무역 장벽', nuance:'digital=디지털 + trade=무역 + barrier=장벽. 데이터 현지화 의무, 플랫폼 규제, 알고리즘 공개 요건 등 디지털 서비스의 국경 간 이동을 제한하는 규제. "reducing digital trade barriers." IT·핀테크·AI 협력의 선결 과제. 전통 관세(물리적)의 디지털 버전.', diff:3},

  // VOCAB (10)
  {id:'v1', cat:'vocab', word:'bilateral', pron:'[ˌbaɪˈlætərəl]', ko:'양자의, 쌍방의', nuance:'bi(둘)+lateral(측면, 옆). 두 당사자(국가·기업·개인)가 모두 관련된 것. "biggest bilateral trade deal." unilateral(일방적) vs multilateral(다자적)의 중간. 외교·무역 문서의 핵심 형용사.', diff:2},
  {id:'v2', cat:'vocab', word:'fragmentation', pron:'[ˌfræɡmənˈteɪʃən]', ko:'파편화, 분절', nuance:'fragment(조각)+ation(과정). 하나로 통합되어 있던 것이 여러 조각으로 쪼개지는 과정. "geopolitical fragmentation." 글로벌화→탈세계화 흐름 표현에 핵심. de-globalization의 더 강렬한 표현.', diff:2},
  {id:'v3', cat:'vocab', word:'procurement', pron:'[prəˈkjʊərmənt]', ko:'조달, 구매 (공식적·대규모)', nuance:'라틴어 procurare(획득하다, 관리하다). 단순 구매(purchase)와 달리, 정부·기업이 공식 절차를 통해 물품·서비스를 확보하는 과정 전체. "£38 billion procurement market including clean energy." 공공 입찰이 포함된 맥락.', diff:2},
  {id:'v4', cat:'vocab', word:'insurmountable', pron:'[ˌɪnsərˈmaʊntəbl]', ko:'극복 불가능한, 넘을 수 없는', nuance:'in(부정)+sur(위)+mount(올라가다)+able. 산을 넘지 못하는 이미지. "these challenges are not insurmountable" — 이중부정으로 "충분히 극복 가능하다"는 낙관적 결론. 비즈니스 문서에서 도전을 인정하면서도 긍정으로 마무리할 때 자주 쓰임.', diff:3},
  {id:'v5', cat:'vocab', word:'enduring', pron:'[ɪnˈdjʊərɪŋ]', ko:'지속적인, 영속하는', nuance:'endure(견디다, 지속되다)의 현재분사. "enduring attractions" — 트렌드가 아닌 구조적·영구적 강점. lasting과 유사하지만 enduring은 시간의 시험을 견뎌낸 뉘앙스 강조. 오래된 파트너십·전통·가치를 수식.', diff:2},
  {id:'v6', cat:'vocab', word:'proposition', pron:'[ˌprɒpəˈzɪʃən]', ko:'가치 제안, 명제', nuance:'라틴어 proponere(앞에 내놓다). 비즈니스에서는 "value proposition" — 기업이 고객에게 제시하는 혜택의 조합. "different expectations across quality, price, and proposition." 단순 제품·서비스를 넘어 브랜드 약속 전체.', diff:2},

function renderCards(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? cards : cards.filter(c => c.cat === filter);
  filtered.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    const isLearned = learned.has(c.id);
    wrap.innerHTML = `
      <div class="card${isLearned ? ' learned' : ''}" id="card-${c.id}">
        <div class="card-face front">
          <span class="tag tag-${c.cat}">${c.cat.toUpperCase()}</span>
          <div class="word">${c.word}</div>
          ${c.pron ? `<div class="pron">${c.pron}</div>` : ''}
          <div class="dots">
            <div class="dot${c.diff>=1?' on':''}"></div>
            <div class="dot${c.diff>=2?' on':''}"></div>
            <div class="dot${c.diff>=3?' on':''}"></div>
          </div>
          <div class="learned-badge">&#10003; learned</div>
        </div>
        <div class="card-face back">
          <div>
            <div class="ko">${c.ko}</div>
            <div class="nuance">${c.nuance}</div>
          </div>
          <button class="check-btn${isLearned ? ' done' : ''}" data-id="${c.id}">
            ${isLearned ? '&#10003; learned' : 'Mark as learned'}
          </button>
        </div>
      </div>`;
    wrap.querySelector('.card').addEventListener('click', e => {
      if (e.target.classList.contains('check-btn')) return;
      e.currentTarget.classList.toggle('flipped');
    });
    wrap.querySelector('.check-btn').addEventListener('click', e => {
      e.stopPropagation();
      const id = e.target.dataset.id;
      if (learned.has(id)) { learned.delete(id); } else { learned.add(id); }
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
      renderCards(filter);
      updateProgress();
    });
    grid.appendChild(wrap);
  });
}

function updateProgress() {
  const total = 35;
  const count = learned.size;
  const pct = Math.round(count / total * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = count + ' / ' + total + ' learned';
}

let currentFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.cat;
    renderCards(currentFilter);
  });
});

renderCards('all');
updateProgress();
</script>
