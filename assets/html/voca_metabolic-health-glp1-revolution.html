<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>Vocabulary — A New Way of Thinking About Metabolic Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --ink: #052e16;
    --ink2: #14532d;
    --accent: #16a34a;
    --accent2: #15803d;
    --sky: #dcfce7;
    --bg: #f0fdf4;
    --border: #86efac;
    --card-bg: #ffffff;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #052e16 0%, #14532d 50%, #059669 100%);
    color: #fff;
    padding: 28px 24px 22px;
    text-align: center;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.1rem, 3.5vw, 1.45rem);
    letter-spacing: .01em;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .badge {
    display: inline-block;
    border: 1.5px solid #86efac;
    color: #86efac;
    border-radius: 20px;
    padding: 3px 14px;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .controls { padding: 16px 16px 0; max-width: 900px; margin: 0 auto; }

  .progress-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #34d399); transition: width .4s; }
  .progress-label { font-size: .78rem; color: var(--ink2); text-align: right; margin-bottom: 12px; font-weight: 500; }

  .filter-btn {
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--ink2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: .04em;

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    padding: 0 16px 32px;
    max-width: 900px;
    margin: 0 auto;
  }

  .card-wrap { perspective: 900px; }
  .card {
    position: relative;
    width: 100%;
    padding-top: 100%;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);

  .card-front { background: var(--card-bg); border: 1.5px solid var(--border); }
  .card-back { background: var(--card-back); border: 1.5px solid #14532d; transform: rotateY(180deg); color: #dcfce7; }
  .card-wrap.learned .card-front {
    background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
    border-color: var(--accent);
    opacity: .75;
  }

    font-size: .62rem; font-weight: 700; letter-spacing: .09em;
    text-transform: uppercase; border-radius: 10px;
    padding: 2px 9px; margin-bottom: 10px; color: #fff;

  .tag-phrasal  { background: #16a34a; }
  .tag-idiom    { background: #0891b2; }
  .tag-colloc   { background: #7c3aed; }
  .tag-vocab    { background: #b45309; }
  .tag-biz      { background: #9b1c2e; }

  .pron { font-size: .72rem; color: #6b8ab0; margin-bottom: 4px; }
  .dots { display: flex; gap: 4px; margin-top: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .dot.on { background: var(--accent); }

  .back-ko { font-size: .9rem; font-weight: 600; color: #dcfce7; margin-bottom: 8px; line-height: 1.4; }
  .back-nuance { font-size: .71rem; color: #86efac; line-height: 1.5; }
  .back-example { font-size: .67rem; color: #4ade80; margin-top: 6px; font-style: italic; line-height: 1.4; }

  .learned-check {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: .7rem; color: transparent;
    transition: all .2s; z-index: 10;
  }
  .card-wrap.learned .learned-check { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>

const learnedSet = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let activeFilter = 'all';

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const visible = activeFilter === 'all' ? cards : cards.filter(c => c.cat === activeFilter);
  visible.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (learnedSet.has(c.id) ? ' learned' : '');
    wrap.dataset.id = c.id;
    const dots = [1,2,3].map(i => `<div class="dot${i<=c.diff?' on':''}"></div>`).join('');
    const pronHtml = c.pron ? `<div class="pron">${c.pron}</div>` : '';
    wrap.innerHTML = `
      <div class="card" id="card-${c.id}">
        <div class="card-face card-front">
          <button class="learned-check" title="학습 완료">✓</button>
          <span class="tag tag-${c.cat}">${c.cat==='vocab'?'고급단어':c.cat==='biz'?'비즈니스':c.cat.toUpperCase()}</span>
          <div class="word">${c.word}</div>
          ${pronHtml}
          <div class="dots">${dots}</div>
        </div>
        <div class="card-face card-back">
          <div class="back-ko">${c.ko}</div>
          <div class="back-nuance">${c.nuance}</div>
          <div class="back-example">${c.example}</div>
        </div>
      </div>`;
    wrap.querySelector('.card').addEventListener('click', e => {
      if (e.target.closest('.learned-check')) return;
      wrap.querySelector('.card').classList.toggle('flipped');
    });
    wrap.querySelector('.learned-check').addEventListener('click', e => {
      e.stopPropagation();
      if (learnedSet.has(c.id)) { learnedSet.delete(c.id); wrap.classList.remove('learned'); }
      else { learnedSet.add(c.id); wrap.classList.add('learned'); }
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...learnedSet]));
      updateProgress();
    });
    grid.appendChild(wrap);
  });
  updateProgress();
}

function updateProgress() {
  const done = learnedSet.size;
  document.getElementById('learned-count').textContent = done;
  document.getElementById('bar').style.width = (done/cards.length*100) + '%';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

renderCards();
</script>
