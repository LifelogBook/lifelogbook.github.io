<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Circular REE 2025 — Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --ink:#052e16;--ink2:#14532d;
  --accent:#b45309;--accent2:#92400e;
  --sky:#d1fae5;--bg:#ecfdf5;--border:#a7f3d0;
  --card-w:340px;--card-h:220px;
  --radius:14px;--shadow:0 4px 20px rgba(5,46,22,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ── Header ── */
header{
  background:linear-gradient(135deg,#052e16 0%,#065f46 50%,#78350f 100%);
  color:#fff;padding:2.4rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden
}
header::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none
}
header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.5rem,4vw,2.2rem);letter-spacing:-.5px;line-height:1.2;position:relative}
header .badge{display:inline-block;margin-top:.7rem;font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);border-radius:30px;padding:.3rem 1rem;position:relative}
header p.sub{margin-top:.5rem;font-size:.88rem;opacity:.75;position:relative}

/* ── Progress ── */
#progress-wrap{background:var(--border);border-radius:20px;height:8px;margin:1.5rem auto .3rem;max-width:520px;overflow:hidden}
#progress-bar{background:var(--accent);height:100%;width:0;transition:width .5s ease;border-radius:20px}
#progress-label{text-align:center;font-size:.82rem;color:var(--ink2);margin-bottom:1.4rem}

/* ── Filter chips ── */
#filter-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem;padding:.2rem 1rem 1.2rem}
.chip{border:1.5px solid var(--border);border-radius:30px;padding:.35rem .9rem;font-size:.78rem;font-weight:600;cursor:pointer;background:#fff;color:var(--ink2);transition:all .2s}
.chip:hover,.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip[data-cat="phrasal"].active{background:#059669;border-color:#059669}
.chip[data-cat="idiom"].active{background:#047857;border-color:#047857}
.chip[data-cat="colloc"].active{background:#0369a1;border-color:#0369a1}
.chip[data-cat="vocab"].active{background:#7c3aed;border-color:#7c3aed}
.chip[data-cat="biz"].active{background:#b45309;border-color:#b45309}

/* ── Grid ── */
#card-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:1.2rem;padding:0 1rem 3rem;max-width:1200px;margin:0 auto}

/* ── Card ── */
.card-wrap{width:var(--card-w);height:var(--card-h);perspective:900px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-face{
  position:absolute;inset:0;border-radius:var(--radius);
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;box-shadow:var(--shadow);overflow:hidden
}
/* Front */
.card-front{background:#fff;border:1.5px solid var(--border);justify-content:center;align-items:center;padding:1.4rem}
.card-front .cat-tag{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.2rem .7rem;border-radius:30px;margin-bottom:.8rem}
.cat-phrasal{background:#d1fae5;color:#059669}
.cat-idiom{background:#d1fae5;color:#047857}
.cat-colloc{background:#e0f2fe;color:#0369a1}
.cat-vocab{background:#ede9fe;color:#7c3aed}
.cat-biz{background:#fef3c7;color:#b45309}
.card-front .word{font-family:'DM Serif Display',serif;font-size:1.55rem;color:var(--ink);text-align:center;line-height:1.25}
.card-front .pron{font-size:.82rem;color:#6b7280;margin-top:.35rem;letter-spacing:.03em}
.dots{display:flex;gap:4px;margin-top:.7rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.filled{background:var(--accent)}

/* Back */
.card-back{background:linear-gradient(135deg,#ecfdf5 0%,#d1fae5 100%);border:1.5px solid var(--border);transform:rotateY(180deg);padding:1.1rem 1.2rem;justify-content:space-between}
.card-back .meaning-ko{font-size:.95rem;font-weight:600;color:var(--ink);line-height:1.45;flex:1}
.card-back .ex-en{font-size:.76rem;color:#374151;font-style:italic;line-height:1.5;margin-top:.5rem;border-left:3px solid var(--accent);padding-left:.6rem}
.card-back .ex-ko{font-size:.73rem;color:#4b5563;line-height:1.45;margin-top:.35rem;padding-left:.9rem}
.card-back .learn-btn{margin-top:.6rem;align-self:flex-end;background:var(--accent);color:#fff;border:none;border-radius:20px;padding:.28rem .8rem;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.card-back .learn-btn:hover{background:var(--accent2)}

/* Learned */
.card-wrap.learned .card-front{background:linear-gradient(135deg,#ecfdf5 0%,#d1fae5 100%)}
.card-wrap.learned .card-front .word{color:var(--accent2)}
.card-wrap.learned .card-back .learn-btn{background:#6b7280}

/* Hidden */
.card-wrap.hidden-card{display:none}

/* Reset */
#reset-btn{display:block;margin:0 auto 2rem;background:transparent;border:1.5px solid var(--border);border-radius:30px;padding:.4rem 1.2rem;font-size:.8rem;font-weight:600;color:var(--ink2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
#reset-btn:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:380px){:root{--card-w:90vw;--card-h:200px}}
</style>
</head>

   ko:'Neodymium Iron Boron — 네오디뮴-철-보론 영구 자석 (세계에서 가장 강력한 영구 자석)',

   koEx:'NdFeB 자석은 전 세계 EV 모터와 풍력 터빈 발전기를 구동한다.'},
  {id:32,cat:'biz',word:'BEV',pron:'',hint:'비즈니스 전용',diff:1,
   ko:'Battery Electric Vehicle — 배터리 전기차 (순수 전기차)',

  {id:34,cat:'biz',word:'kt',pron:'',hint:'비즈니스 전용',diff:1,
   ko:'kiloton — 킬로톤 (1,000톤 단위; 광물·소재 산업 표준 계량 단위)',

const LEARNED = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));
let currentCat = 'all';

function diffDots(d){
  return Array.from({length:3},(_,i)=>`<span class="dot${i<d?' filled':''}"></span>`).join('');
}
function catClass(c){return{phrasal:'cat-phrasal',idiom:'cat-idiom',colloc:'cat-colloc',vocab:'cat-vocab',biz:'cat-biz'}[c]||'';}

function buildGrid(){
  const grid = document.getElementById('card-grid');
  grid.innerHTML='';
  cards.forEach(c=>{
    const wrap=document.createElement('div');
    wrap.className='card-wrap'+(LEARNED.has(c.id)?' learned':'');
    wrap.id='card-'+c.id;
    if(currentCat!=='all'&&c.cat!==currentCat) wrap.classList.add('hidden-card');
    wrap.innerHTML=`
<div class="card-inner">
  <div class="card-face card-front">
    <span class="cat-tag ${catClass(c.cat)}">${c.hint}</span>
    <div class="word">${c.word}</div>
    ${c.pron?`<div class="pron">${c.pron}</div>`:''}
    <div class="dots">${diffDots(c.diff)}</div>
    <div style="margin-top:.4rem;font-size:.7rem;color:#9ca3af">클릭하여 뒤집기</div>
  </div>
  <div class="card-face card-back">
    <div class="meaning-ko">${c.ko}</div>
    <div class="ex-en">${c.en}</div>
    <div class="ex-ko">${c.koEx}</div>
    <button class="learn-btn" data-id="${c.id}">${LEARNED.has(c.id)?'✓ 완료':'✓ 학습완료'}</button>
  </div>
</div>`;
    wrap.addEventListener('click',e=>{
      if(e.target.classList.contains('learn-btn'))return;
      wrap.classList.toggle('flipped');
    });
    grid.appendChild(wrap);
  });
  document.querySelectorAll('.learn-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=+btn.dataset.id;
      const wrap=document.getElementById('card-'+id);
      if(LEARNED.has(id)){LEARNED.delete(id);wrap.classList.remove('learned');btn.textContent='✓ 학습완료';}
      else{LEARNED.add(id);wrap.classList.add('learned');btn.textContent='✓ 완료';}
      save();updateProgress();
    });
  });
  updateProgress();
}

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify([...LEARNED]));}
function updateProgress(){
  const done=LEARNED.size;
  document.getElementById('progress-bar').style.width=(done/35*100)+'%';
  document.getElementById('progress-label').textContent=done+' / 35 learned';
}

document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentCat=chip.dataset.cat;
    document.querySelectorAll('.card-wrap').forEach(w=>{
      const id=+w.id.replace('card-','');
      const card=cards.find(c=>c.id===id);
      if(currentCat==='all'||card.cat===currentCat) w.classList.remove('hidden-card');
      else w.classList.add('hidden-card');
    });
  });
});

document.getElementById('reset-btn').addEventListener('click',()=>{
  LEARNED.clear();save();buildGrid();
});

buildGrid();
</script>
</body>
</html>
