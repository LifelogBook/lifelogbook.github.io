<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vocabulary – NA Automotive Resilience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a2c42;--ink2:#2e4a6b;
  --accent:#e07b00;--accent2:#c46f00;
  --sky:#fffbf0;--bg:#fefcf8;--border:#f0c070;
  --r:14px;--shadow:0 4px 24px rgba(26,44,66,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:linear-gradient(135deg,#1a2c42 0%,#2e4a6b 55%,#e07b00 100%);color:#fff;padding:2.2rem 1.5rem 1.8rem;text-align:center}
header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.5rem,4vw,2.4rem);margin-bottom:.4rem}
header p{font-size:.92rem;opacity:.85}
.badge{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:.25rem .9rem;font-size:.78rem;margin-bottom:.7rem;letter-spacing:.04em}
.controls{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;padding:1.2rem 1rem .6rem;max-width:860px;margin:0 auto}
.controls button{border:2px solid var(--border);background:#fff;color:var(--ink2);border-radius:30px;padding:.38rem .95rem;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .18s}
.controls button.active,.controls button:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.stats{text-align:center;font-size:.8rem;color:var(--ink2);padding:.2rem 0 .8rem;opacity:.75}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.1rem;padding:0 1rem 2rem;max-width:1100px;margin:0 auto}
.card{perspective:900px;cursor:pointer;height:210px}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--r);padding:1.1rem 1.15rem;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}
.front{background:#fff;border:2px solid var(--border)}
.back{background:var(--sky);border:2px solid var(--accent);transform:rotateY(180deg)}
.tag{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.18rem .55rem;border-radius:10px;color:#fff;width:fit-content}
.tag-phrasal{background:#e07b00;color:#1a2c42}
.tag-idiom{background:#7c3aed}
.tag-colloc{background:#1a2c42}
.tag-vocab{background:#c0392b}
.tag-biz{background:#2c6e49}
.word{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--ink);line-height:1.2;margin:.35rem 0 .1rem}
.pron{font-size:.78rem;color:var(--ink2);font-style:italic;margin-bottom:.2rem}
.ko{font-size:.88rem;color:var(--ink2);font-weight:500}
.diff{display:flex;gap:3px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--accent)}
.back .word{font-size:1.1rem;color:var(--ink)}
.nuance{font-size:.82rem;color:#374151;line-height:1.55;flex:1;margin:.35rem 0 .2rem;overflow:hidden}
.learned-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.35rem .8rem;font-size:.75rem;font-weight:700;cursor:pointer;align-self:flex-end;transition:background .2s}
.learned-btn.done{background:#10b981;color:#fff}
.card.learned .front{border-color:#10b981;background:#f0fff8}
</style>
</head>

<header>

  <p>The North American Automotive Industry — Vocabulary</p>

<script>
const STORE_KEY='na_auto_resilience_learned';
const learned=new Set(JSON.parse(localStorage.getItem(STORE_KEY)||'[]'));
const cards=[
  {id:'pv1',type:'phrasal',word:'free up',ko:'(묶여있던 자원·자금·시간을) 확보하다, 여유 있게 하다',pron:'',nuance:'기존에 한 용도로 점유되어 있던 자원을 해방시켜 다른 목적으로 쓸 수 있게 하는 것. "free up capital" = 다른 사업에 묶여 있던 자금을 확보하다. "free up capacity" = 생산 여유분을 만들다. "free up time" = 시간 여유를 확보하다. 자동화·아웃소싱·구조조정의 기대 효과를 설명할 때 자주 등장.',diff:1,ex:'Sharing common platforms <b>freed up capital</b> for OEMs to focus on differentiation opportunities higher in the stack.'},
  {id:'pv2',type:'phrasal',word:'shore up',ko:'취약한 부분을 보강·떠받치다',pron:'',nuance:'무너지려는 건물이나 절벽을 버팀목(shore/prop)으로 받치는 이미지. 이미 약해진 부분이나 위험에 처한 구조를 안정화하는 것. "shore up supply chains" = 불안정한 공급망을 강화하다. "shore up the balance sheet" = 재무 상태를 보강하다. 문제가 이미 발생했거나 임박했다는 긴박감을 내포한다.',diff:1,ex:'Strategic partnerships can strengthen the value chain, manage risk, and <b>shore up</b> supply chains.'},
  {id:'pv3',type:'phrasal',word:'layer on top of',ko:'기반 위에 덧씌우다, 적층하다',pron:'',nuance:'케이크에 층을 얹듯 기존 기반 위에 새로운 가치를 추가하는 이미지. 소프트웨어에서는 하위 공유 플랫폼 위에 독점적 기능을 올리는 아키텍처 방식. "layer proprietary IP on top of shared platforms" = 공유 플랫폼 위에 독점 IP를 추가로 얹다. 기반을 공유하되 차별화는 위 계층에서 실현한다는 전략 논리.',diff:2,ex:'OEMs can codevelop foundational technologies, then <b>layer</b> proprietary IP and user experience <b>on top of</b> shared platforms.'},
  {id:'pv4',type:'phrasal',word:'default to',ko:'특별한 선택 없이 ~로 돌아가다, 관성적으로 ~을 택하다',pron:'',nuance:'컴퓨터에서 설정하지 않으면 자동으로 적용되는 기본값(default)에서 유래. 의도적 선택이 아니라 습관·관성·편의에 의해 ~을 택하게 되는 것. 더 나은 대안이 있음에도 기존 방식을 고수하는 뉘앙스가 있다. "default to" 뒤에 오는 선택이 최선이 아닐 수 있다는 점을 암시.',diff:2,ex:'Rather than <b>defaulting to</b> fully bespoke BEV-native architectures, leading companies deploy modular systems.'},
  {id:'pv5',type:'phrasal',word:'move beyond',ko:'~를 뛰어넘어 나아가다, ~에서 벗어나 진화하다',pron:'',nuance:'단순한 이동이 아니라 기존의 한계나 현 상태를 극복하고 다음 단계로 진화하는 것. "move beyond stand-alone operations" = 독립적·폐쇄적 운영 방식에서 벗어나다. "move beyond pilot" = 시범 단계를 넘어 본격 실행으로 나아가다. 긍정적 진화의 뉘앙스를 담는다.',diff:1,ex:'OEMs can <b>move beyond</b> stand-alone operations focused on siloed automotive R&D and collaborate openly.'},
  {id:'pv6',type:'phrasal',word:'shift from / to',ko:'~에서 ~로 전환하다',pron:'',nuance:'단순한 변화(change)보다 더 의도적이고 전략적인 방향 전환을 뜻한다. "shift from pilot partnerships to consistent collaboration" = 시범적 파트너십에서 일관된 협업으로 전환하다. "paradigm shift" = 패러다임의 근본적 전환. 업계나 전략의 구조적 변화를 서술할 때 많이 쓰인다.',diff:1,ex:'North American OEMs can <b>shift from</b> pilot partnerships <b>to</b> consistent cross-sector collaboration.'},
  {id:'id1',type:'idiom',word:'stake in the game',ko:'판돈, 업계에서의 입지·역할·지분',pron:'',nuance:'카드 게임에서 판돈(stake)을 건 선수만이 이기거나 질 수 있다는 것에서 유래. "secure their stake in the game" = 업계에서의 입지와 역할을 지켜내다. Nassim Taleb의 "skin in the game"(직접 위험을 감수하며 참여하다)과도 연결. 주체가 해당 시장이나 경쟁에서 의미 있는 역할을 갖고 있음을 강조.',diff:2,ex:'As foreign brands gain a stronger foothold, North American brands must secure their <b>stake in the game</b>.'},
  {id:'id2',type:'idiom',word:'in the face of',ko:'~에 직면하여, ~에도 불구하고',pron:'',nuance:'거센 바람을 정면으로 마주하는 이미지. "in the face of adversity" = 역경에도 불구하고. 어려움이 있지만 능동적으로 대응하겠다는 결의를 담는 경우가 많다. "in spite of"보다 직면의 강도가 강하며, "despite"보다 더 포멀하고 문어체적인 느낌.',diff:1,ex:'<b>In the face of</b> these challenges, North American companies must take steps to reenforce their partnerships.'},
  {id:'id3',type:'idiom',word:'no shortage of',ko:'~이 넘쳐날 만큼 많은, 부족함이 없는',pron:'',nuance:'표면적으로는 "부족함이 없다"지만 실제 맥락에서는 "너무 많아서 문제"라는 역설적 함의를 가질 때가 많다. "no shortage of challenges" = 도전이 넘쳐날 정도로 많다. "a shortage of" = ~이 부족하다. 완곡하게 어려운 현실을 인정하면서도 기회를 강조할 때 사용.',diff:1,ex:'North American OEMs face <b>no shortage of</b> challenges, but within these headwinds lies a rare opportunity.'},
  {id:'id4',type:'idiom',word:'higher in the stack',ko:'(기술) 스택의 상위 계층에서; 고부가가치 영역에서',pron:'',nuance:'IT에서 소프트웨어 아키텍처를 계층(stack)으로 표현하는 것에서 유래. "higher in the stack" = 하드웨어나 기반 기술보다 소프트웨어·UX·서비스 등 더 고부가가치 영역. "full-stack" = 하드웨어부터 소프트웨어까지 전 계층. OEM 전략의 무게중심이 하드웨어에서 소프트웨어·서비스로 이동한다는 흐름을 포착.',diff:2,ex:'Sharing common platforms freed up capital to focus on differentiation opportunities <b>higher in the stack</b>.'},
  {id:'id5',type:'idiom',word:'siloed',ko:'사일로화된, 칸막이에 갇혀 고립된',pron:'',nuance:'농장의 낟알 저장 탑(silo)에서 유래. 조직이나 데이터가 서로 연결되지 않고 각자의 칸막이 안에 고립되어 있는 상태. "siloed R&D" = 부서 간 공유 없이 각자 따로 R&D를 진행하는 것. "break down silos" = 칸막이를 허물어 소통과 협업을 늘리다. 현대 조직의 핵심 병폐로 자주 언급.',diff:1,ex:'OEMs can move beyond stand-alone operations deeply focused on <b>siloed</b> automotive R&D.'},
  {id:'id6',type:'idiom',word:'at scale',ko:'충분한 규모로, 대규모로',pron:'',nuance:'소규모 실험이나 파일럿을 넘어 실제 시장에서 의미 있는 규모의 영향을 미치는 것. "reach meaningful scale" = 시장에서 유의미한 규모에 도달하다. "deploy at scale" = 대규모로 배포하다. "scale" 자체가 동사로도 쓰인다: "scale a business" = 사업을 확장하다.',diff:1,ex:'As tech-native disruptors including Tesla and Rivian reached meaningful scale, they exerted growing pressure.'},
  {id:'cl1',type:'colloc',word:'open-source ecosystem',ko:'오픈소스 생태계 — 공개 코드를 기반으로 협력하는 기업·개발자 네트워크',pron:'',nuance:'소프트웨어 소스코드를 공개해 누구나 사용·수정·배포할 수 있는 개발 철학. Linux, Kubernetes, TensorFlow가 대표적 예시. 자동차 업계에 이 모델을 적용하면 공통 플랫폼을 공동 개발하고 각사는 차별화된 부분에 집중할 수 있다. 협업이 경쟁 우위를 훼손하는 것이 아니라 오히려 강화한다는 역설이 핵심.',diff:2,ex:'The technology industry\'s <b>open-source ecosystem</b> shows how competitors can collaborate to accelerate innovation.'},
  {id:'cl2',type:'colloc',word:'dual-sourcing',ko:'이중 소싱 — 동일 부품을 두 공급업체에서 조달하는 리스크 분산 전략',pron:'',nuance:'단일 공급업체 의존(single-sourcing) 대비 공급 리스크를 분산하는 전략. 비용은 더 들지만 하나에 문제가 생겼을 때 대안이 있다. 2021년 반도체 부족 사태처럼 공급망 위기 시 dual-sourcing이 있는 기업은 상대적으로 타격이 적다. 표준화가 되면 bespoke 부품의 dual-sourcing 비용을 절감할 수 있다.',diff:2,ex:'Standardizing specs enables OEMs to pivot suppliers without the full cost burden of <b>dual-sourcing</b> bespoke parts.'},
  {id:'cl3',type:'colloc',word:'vendor lock-in',ko:'특정 공급업체·기술에 종속되어 교체가 어려운 상태',pron:'',nuance:'특정 공급업체의 독점적 규격을 사용하면 나중에 교체할 때 막대한 전환 비용(switching cost)이 발생하는 것. IT에서는 특정 클라우드나 소프트웨어에 종속되는 것. O-RAN처럼 표준화를 통해 vendor lock-in을 줄이면 총 소유 비용(TCO)을 낮추고 협상력(bargaining power)을 높일 수 있다.',diff:2,ex:'The O-RAN ALLIANCE minimized <b>vendor lock-in</b>, lowering total cost of ownership by about 25 percent.'},
  {id:'cl4',type:'colloc',word:'predictive analytics',ko:'예측 분석 — 데이터와 통계 모델로 미래 결과를 예측하는 분석 기법',pron:'',nuance:'"descriptive analytics(현황 파악)" → "predictive analytics(미래 예측)" → "prescriptive analytics(최적 처방)" 순으로 분석 성숙도가 높아진다. 공급망에서는 수요·공급 불일치와 공급업체 리스크를 사전에 감지하는 데 활용. 머신러닝 기반 예측 모델이 핵심 도구.',diff:1,ex:'Digital supply chain intelligence uses <b>predictive analytics</b> to link consumer needs with real-time manufacturing.'},
  {id:'cl5',type:'colloc',word:'early-warning system',ko:'조기경보 시스템 — 위험 발생 전 신호를 포착하는 데이터 기반 시스템',pron:'',nuance:'원래는 군사·기상 용어. 비즈니스에서는 공급망 위기, 재무 리스크, 운영 이상 등을 사전에 감지하는 시스템. 유럽 OEM의 조기경보 시스템은 9개 데이터 소스를 통합해 공급업체 파산 등 재무 리스크를 5~10% 줄였다. "canary in the coal mine"(탄광의 카나리아)과 비슷한 맥락.',diff:1,ex:'A European OEM deployed an <b>early-warning system</b> ingesting 9 data sources, reducing supply risk by 5–10%.'},
  {id:'cl6',type:'colloc',word:'nondifferentiating content',ko:'소비자 차별화 가치를 창출하지 않는 부품·콘텐츠',pron:'',nuance:'소비자 구매 결정에 영향을 미치지 않는 차량 구성 요소. 액슬, 와이어링 하니스, 브레이크 시스템 등이 여기에 해당. 이러한 부품을 표준화하면 복수 OEM 간 공통 사양을 써서 규모의 경제를 실현할 수 있다. 반대: "differentiating content" = 바디 디자인, e-파워트레인, 인포테인먼트.',diff:2,ex:'Axles, harnesses, and power electronics are <b>nondifferentiating content</b>—prime candidates for standardization.'},
  {id:'cl7',type:'colloc',word:'plant utilization',ko:'공장 가동률 — 생산 가능 용량 대비 실제 사용 비율',pron:'',nuance:'"capacity utilization"과 동의어. 자동차 공장의 손익분기점(break-even threshold)은 통상 70% 가동률이다. 이 아래에서는 고정비를 회수하지 못해 수익성이 악화된다. 모델 전환이나 수요 감소 시 가동률이 크게 떨어진다. "maximize plant utilization" = 공장 가동률을 극대화하다.',diff:1,ex:'In North America, <b>plant utilization</b> is closely tied to profitability, yet many plants run below the 70% break-even threshold.'},
  {id:'vo1',type:'vocab',word:'modularize',ko:'모듈화하다 — 복잡한 시스템을 독립적으로 교체 가능한 단위로 설계하다',pron:'[ˈmɒdjʊləraɪz]',nuance:'module(부품·단위) + -ize(동사화). 자동차에서 "modular production system" = 여러 파워트레인·모델에 공통으로 쓸 수 있도록 생산 시스템을 구성하는 것. LEGO 블록처럼 독립 모듈들을 조합해 다양한 결과물을 만드는 개념. 재구성 유연성과 규모의 경제를 동시에 달성할 수 있다.',diff:1,ex:'Leading companies deploy <b>modularized</b> production systems that support multiple powertrains while preserving performance.'},
  {id:'vo2',type:'vocab',word:'gigacasting',ko:'기가캐스팅 — 수백 개 부품을 단일 대형 알루미늄 주조로 대체하는 제조 기법',pron:'[ˈɡɪɡəˌkɑːstɪŋ]',nuance:'giga(거대) + casting(주조). Tesla가 최초로 도입한 혁신적 제조 방식으로 차체 후방부를 기존 70여 개 부품 대신 1~2개 주조품으로 만든다. 조립 공정·용접 수를 극적으로 줄여 공간, 비용, 무게 모두 절감. Tesla의 언박스드(unboxed) 제조 개념의 핵심 기술로, 최종 조립 스테이션을 60개에서 36개로 줄였다.',diff:2,ex:'Tesla\'s "unboxed" concept uses <b>gigacasting</b> and structural batteries, cutting assembly stations by ~40%.'},
  {id:'vo3',type:'vocab',word:'proprietary',ko:'독점적인, 특정 소유주에게 귀속된',pron:'[prəˈpraɪətəri]',nuance:'property(소유권)에서 유래. "proprietary technology" = 특정 기업만이 소유·사용하는 기술. 공개된(open-source) 기술의 반대 개념. "proprietary IP" = 독점 지식재산권. 공유 플랫폼 위에 proprietary 레이어를 얹어 차별화한다는 것이 이 기사의 핵심 전략. "go proprietary" = 독점 방식을 선택하다.',diff:1,ex:'OEMs can layer <b>proprietary</b> IP, design, and user experience on top of shared open platforms.'},
  {id:'vo4',type:'vocab',word:'bespoke',ko:'맞춤 제작된, 특정 고객·용도를 위해 주문 제작된',pron:'[bɪˈspoʊk]',nuance:'영국 양복 거리(Savile Row)에서 고객 맞춤 양복을 주문하는 전통에서 유래한 고급 표현. 비즈니스·기술 맥락에서 표준 솔루션이 아닌 특정 고객을 위해 맞춤 제작된 것. "bespoke parts" = 특정 OEM 전용으로 설계된 부품. 표준화(standardization)의 반대 개념.',diff:2,ex:'Standardizing specs lets OEMs switch suppliers without the cost of dual-sourcing <b>bespoke</b> parts.'},
  {id:'vo5',type:'vocab',word:'resilience',ko:'회복력, 탄력성 — 충격 후 원상 복구하거나 더 강해지는 능력',pron:'[rɪˈzɪliəns]',nuance:'Latin resilire(튀어오르다)에서 유래. 비즈니스에서는 지정학적 리스크·공급망 붕괴·경기침체 등의 충격이 발생해도 운영을 유지하고 빠르게 회복하는 능력. 단순한 버티기가 아니라 충격 후 더 강해지는(antifragile) 개념까지 포함. 이 기사 제목의 핵심 개념.',diff:1,ex:'To build <b>resilience</b>, companies can better anticipate risks while designing operations with flexibility in mind.'},
  {id:'vo6',type:'vocab',word:'interchangeability',ko:'호환성, 상호교환 가능성',pron:'[ˌɪntərˌtʃeɪndʒəˈbɪlɪti]',nuance:'서로 다른 제조사의 부품이 교체·대체 가능한 정도. 부품이 표준화되면 interchangeability가 높아져 공급업체를 쉽게 교체하고 이중소싱 비용도 줄어든다. O-RAN ALLIANCE가 통신 장비의 interchangeability를 높인 것이 자동차 업계의 롤모델로 제시된다.',diff:2,ex:'Common specifications enable greater <b>interchangeability</b> across vehicle platforms and suppliers.'},
  {id:'vo7',type:'vocab',word:'wiring harness',ko:'와이어링 하니스 — 차량 전기 배선 묶음',pron:'[ˈwaɪərɪŋ ˈhɑːrnɪs]',nuance:'마구(harness)가 말의 힘을 모아 제어하듯 차량의 수백 개 전선을 하나의 묶음으로 정리한 부품. 현대 차량에는 수 킬로미터에 달하는 배선이 들어간다. SDV 시대에는 E/E 아키텍처 중앙화로 하니스 복잡도를 줄이는 것이 핵심 과제. 조립 자동화가 어려운 노동집약적 공정이기도 하다.',diff:2,ex:'Axles, <b>wiring harnesses</b>, and power electronics create little consumer value—ideal for standardization.'},
  {id:'vo8',type:'vocab',word:'heterogeneous',ko:'이질적인, 다양하고 균일하지 않은',pron:'[ˌhetərəˈdʒiːniəs]',nuance:'hetero(다름) + geneous(출신이 같은) = 서로 다른 요소들로 이루어진. "heterogeneous demand" = 지역·인구통계별로 크게 다른 수요. 반대: "homogeneous" = 균일한. 북미의 소비자 수요가 도시/농촌, 세대, 지역별로 매우 이질적이라는 것이 optionality의 필요성을 만드는 핵심 이유.',diff:2,ex:'Consumer demand in North America is largely <b>heterogeneous</b>, driven by regional and demographic differences.'},
  {id:'vo9',type:'vocab',word:'retooling',ko:'(공장) 설비 교체, 생산 라인 전환 공사',pron:'[ˌriːˈtuːlɪŋ]',nuance:'생산하는 차종·모델을 바꿀 때 공장의 금형·지그·생산 설비 등을 교체하는 것. 자동차 공장의 모델 교체는 2억~4억 달러 비용과 9~15개월 소요. ICE에서 EV로 전환할 때도 대규모 retooling이 필요하다. 유연한 생산 라인은 retooling 빈도와 비용을 줄이는 것이 목표.',diff:1,ex:'Low utilization leaves little buffer for model changeovers, which involve costly <b>retooling</b> of $200M–$400M.'},
  {id:'vo10',type:'vocab',word:'orchestration',ko:'(복잡한 시스템·자원의) 통합 조율, 오케스트레이션',pron:'[ˌɔːrkɪˈstreɪʃən]',nuance:'오케스트라 지휘자가 여러 악기를 하나의 화음으로 만드는 것처럼 다양한 IT 시스템·서비스·프로세스를 통합적으로 자동화·관리하는 것. 클라우드에서 Kubernetes가 대표적 orchestration 도구. "network orchestration" = 네트워크 자원을 지능적으로 관리·조율하는 것.',diff:3,ex:'O-RAN fostered focused innovation in differentiating domains, including network intelligence and <b>orchestration</b>.'},
  {id:'bz1',type:'biz',word:'O-RAN',ko:'Open Radio Access Network — 개방형 무선 접속망',pron:'[oʊ ræn]',nuance:'2018년 이동통신사들이 결성한 표준화 연합. 기존에는 통신사가 특정 벤더(Ericsson, Nokia 등)의 독점 장비에 묶여 있었으나, O-RAN은 서로 다른 벤더의 장비가 함께 작동하는 개방형 표준을 정의했다. 총 소유 비용 25% 절감. 자동차 업계 표준화의 롤모델로 이 기사에서 언급.',diff:3,ex:'The <b>O-RAN</b> ALLIANCE standardized telecom interfaces, minimizing vendor lock-in and cutting TCO by ~25%.'},
  {id:'bz2',type:'biz',word:'E/E architecture',ko:'Electrical/Electronic Architecture — 차량 전기·전자 아키텍처',pron:'[iː iː ˈɑːrkɪtektʃər]',nuance:'차량 내 모든 전기·전자 시스템의 구조 설계. 과거에는 기능별 ECU(전자제어유닛)가 분산되어 있었으나, SDV 시대에는 "centralized zonal E/E" = 구역별로 통합된 중앙화 구조로 전환 중. 하니스 복잡도를 줄이고 소프트웨어 업데이트와 새 기능 추가를 쉽게 하는 것이 목표.',diff:3,ex:'Electronic modules such as centralized zonal <b>E/E</b> architecture are prime candidates for standardization.'},
  {id:'bz3',type:'biz',word:'HVAC',ko:'Heating, Ventilation, and Air Conditioning — 냉난방 공조 시스템',pron:'[eɪtʃ viː eɪ siː]',nuance:'차량·건물의 온도·공기질을 조절하는 시스템. 자동차에서는 냉난방 컴프레서, 팬, 덕트 등을 포함한다. 소비자가 HVAC 성능을 인식하기는 하지만 브랜드 선택에 미치는 영향이 적어 비차별화 부품으로 분류되어 표준화 대상. AC compressor는 대표적 공통화 후보.',diff:1,ex:'<b>HVAC</b> components like AC compressors create little differentiation and are strong candidates for shared specs.'},
  {id:'bz4',type:'biz',word:'capex',ko:'Capital Expenditure — 자본적 지출 (설비·장비 등 장기 자산에 대한 투자)',pron:'[ˈkeɪpɛks]',nuance:'opex(운영비)와 대비되는 개념. 공장·설비·금형·R&D 플랫폼처럼 장기간 사용될 자산에 대한 일회성 투자. "one-off capex" = 특정 사안에만 발생하는 자본 지출. 모듈화 생산 시스템 도입 시 R&D 플랫폼 개발 비용 등 capex를 20% 절감할 수 있다고 기사에서 언급.',diff:1,ex:'Modularized production can reduce one-off <b>capex</b> such as R&D platform development costs by 20 percent.'},
  {id:'bz5',type:'biz',word:'tier-one supplier',ko:'1차 공급업체 — OEM에 직접 완성 부품을 납품하는 최상위 공급업체',pron:'',nuance:'자동차 공급망은 OEM → Tier 1 → Tier 2 → Tier 3 구조. Tier-one supplier는 OEM에 직접 완성된 시스템이나 모듈(브레이크 시스템, 좌석 등)을 납품하는 업체. Tier 2는 Tier 1에, Tier 3는 Tier 2에 납품. Bosch, Continental, Denso 등이 대표적 Tier-one supplier.',diff:1,ex:'A <b>tier-one supplier</b> leveraged machine learning to boost forecast accuracy by ten percentage points.'},
  {id:'bz6',type:'biz',word:'cross-selling',ko:'교차 판매 — 기존 고객에게 연관 상품을 추가 판매하는 전략',pron:'',nuance:'기존 구매 고객에게 연관된 다른 제품이나 서비스를 추가로 판매하는 것. "upselling"(동일 제품의 고급 버전 판매)과 구별. 중국 OEM이 가전 브랜드와 소매 매장을 공동 출시하여 cross-selling을 촉진한 것이 대표적 예시. 소비자 생애 가치(CLV)를 높이는 핵심 전략 중 하나.',diff:1,ex:'One Chinese OEM colaunched retail stores with an appliance brand to drive <b>cross-selling</b> opportunities.'}
];

let current='all';
function render(list){
  const g=document.getElementById('grid');
  g.innerHTML='';
  const total=list.length;
  const done=list.filter(c=>learned.has(c.id)).length;
  document.getElementById('stats').textContent=`${total} cards · ${done} learned`;
  list.forEach(c=>{
    const isL=learned.has(c.id);
    const dots=[1,2,3].map(i=>`<span class="dot${i<=c.diff?' on':''}"></span>`).join('');
    const card=document.createElement('div');
    card.className='card'+(isL?' learned':'');
    card.dataset.id=c.id;
    card.dataset.type=c.type;
    card.innerHTML=`<div class="card-inner">
      <div class="front">
        <div><span class="tag tag-${c.type}">${c.type}</span>
        <div class="word">${c.word}</div>
        ${c.pron?`<div class="pron">${c.pron}</div>`:''}
        <div class="ko">${c.ko}</div></div>
        <div class="diff">${dots}</div>
      </div>
      <div class="back">
        <div><div class="word">${c.word}</div>
        <div class="nuance">${c.nuance}</div>
        ${c.ex?`<div class="nuance" style="font-style:italic;color:#555;margin-top:.2rem">${c.ex}</div>`:''}
        </div>
        <button class="learned-btn${isL?' done':''}" onclick="toggleLearned(event,'${c.id}')">${isL?'✓ Learned':'Mark learned'}</button>
      </div>
    </div>`;
    card.addEventListener('click',e=>{if(!e.target.classList.contains('learned-btn'))card.classList.toggle('flipped')});
    g.appendChild(card);
  });
}
function filter(type,btn){
  current=type;
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(type==='all'?cards:cards.filter(c=>c.type===type));
}
function toggleLearned(e,id){
  e.stopPropagation();
  if(learned.has(id))learned.delete(id);else learned.add(id);
  localStorage.setItem(STORE_KEY,JSON.stringify([...learned]));
  render(current==='all'?cards:cards.filter(c=>c.type===current));
}
render(cards);
</script>
