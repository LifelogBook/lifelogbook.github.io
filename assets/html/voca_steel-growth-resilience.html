<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strengthening the Future: Steel — 어휘 카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f2238;
    --ink2: #1a3550;
    --accent: #c2410c;
    --accent2: #ea580c;
    --sky: #fdba74;
    --bg: #fff7ed;
    --border: #fed7aa;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(15,34,56,0.13);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, #0f2238 0%, #1a4060 45%, #7c2d12 100%);
    color: #fff;
    padding: 28px 24px 22px;
    text-align: center;
  }
  header .badge {
    display: inline-block;
    background: rgba(253,186,116,0.18);
    border: 1px solid rgba(253,186,116,0.35);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
    color: var(--sky);
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  header p { font-size: 0.82rem; opacity: 0.75; }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 16px 0;
    justify-content: center;
  }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--ink2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .progress-bar-wrap {
    margin: 14px 16px 0;
    background: var(--border);
    border-radius: 8px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 8px;
    transition: width 0.4s;
  }
  .progress-label {
    text-align: center;
    font-size: 0.75rem;
    color: var(--accent);
    margin: 6px 0 0;
    font-weight: 600;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 16px;
  }
  .card-wrap { perspective: 900px; }
  .card {
    position: relative;
    width: 100%;
    height: 200px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.48s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card-front {
    background: #fff;
    border: 1.5px solid var(--border);
  }
  .card-back {
    background: var(--ink);
    color: #fff;
    transform: rotateY(180deg);
  }
  .card.learned .card-front {
    background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
    border-color: var(--accent);
  }
  .card-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 10px;
    padding: 2px 9px;
    margin-bottom: 10px;
    width: fit-content;
  }
  .tag-phrasal { background: #ffedd5; color: #c2410c; }
  .tag-idiom   { background: #fee2d5; color: #9a3412; }
  .tag-colloc  { background: #dbeafe; color: #1d4ed8; }
  .tag-vocab   { background: #ede9fe; color: #7c3aed; }
  .tag-biz     { background: #d1fae5; color: #065f46; }
  .card-word {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .card-pron { font-size: 0.78rem; color: #64748b; margin-bottom: 6px; }
  .card-hint { font-size: 0.8rem; color: #94a3b8; font-style: italic; }
  .card-back .def-ko {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--sky);
  }
  .card-back .def-en { font-size: 0.82rem; opacity: 0.82; line-height: 1.5; }
  .card-back .example {
    margin-top: 10px;
    font-size: 0.76rem;
    opacity: 0.65;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 8px;
    font-style: italic;
    line-height: 1.5;
  }
  .learned-badge {
    position: absolute;
    top: 10px; right: 12px;
    font-size: 1.1rem;
    display: none;
  }
  .card.learned .learned-badge { display: block; }
  .diff-dots {
    position: absolute;
    bottom: 12px; right: 14px;
    display: flex; gap: 3px;
  }
  .diff-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
  }
  .diff-dot.on { background: var(--accent); }
  .learn-btn {
    position: absolute;
    bottom: 10px; left: 14px;
    background: none;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 11px;
    font-size: 0.7rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
  }
  .learn-btn:hover { background: var(--accent); color: #fff; }
  .card.learned .learn-btn {
    background: var(--accent);
    color: #fff;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <div class="badge">McKinsey &amp; Company · December 2025</div>
  <h1>Strengthening the Future: Steel for Growth and Resilience</h1>
  <p>35개 핵심 표현 · 플래시카드로 학습하기</p>
</header>

<div class="controls">
  <button class="filter-btn active" data-filter="all">전체 35</button>
  <button class="filter-btn" data-filter="phrasal">Phrasal Verb 6</button>
  <button class="filter-btn" data-filter="idiom">Idiom 6</button>
  <button class="filter-btn" data-filter="colloc">Collocation 7</button>
  <button class="filter-btn" data-filter="vocab">고급단어 10</button>
  <button class="filter-btn" data-filter="biz">비즈니스 6</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>
<div class="progress-label" id="plabel">0 / 35 학습 완료</div>

<div class="grid" id="grid"></div>

<script>
const STORAGE_KEY = 'steel_growth_resilience_learned';
const learned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

const cards = [
  // ── Phrasal Verb ──
  {

    ko: '규모를 키우다; 확장하다',

  {
    id: 'pv2', type: 'phrasal', word: 'pivot toward',
    pron: '', hint: 'change direction...',
    ko: '~쪽으로 방향 전환하다; 전략적으로 전환하다',
    en: 'To strategically shift focus or direction toward a new area or approach.',
    ex: '"As Indian steelmakers pivot toward lower-carbon production routes…"',
    diff: 2
  },
  {
    id: 'pv3', type: 'phrasal', word: 'lock in',
    pron: '', hint: 'commit to, trap in...',
    ko: '고착화하다; (특정 방식에) 묶어두다',
    en: 'To commit to a particular course that is difficult or costly to reverse later.',

    diff: 2
  },
  {
    id: 'pv4', type: 'phrasal', word: 'phase out',
    pron: '', hint: 'gradual elimination...',
    ko: '단계적으로 폐지하다; 점진적으로 없애다',

    ex: '"…the push for decarbonization, including coal phase-out commitments."',
    diff: 1
  },
  {
    id: 'pv5', type: 'phrasal', word: 'tap into',
    pron: '', hint: 'access resources...',
    ko: '활용하다; ~을 이용하다',

    diff: 2
  },
  {
    id: 'pv6', type: 'phrasal', word: 'build on',

    ko: '~을 기반으로 발전시키다; 강점을 살리다',
    en: 'To use existing strengths, work, or foundations as a base for further development.',
    ex: '"…draw on global best practices, build on strengths, and bolster important areas."',
    diff: 1
  },

  // ── Idiom / 비유 ──
  {
    id: 'id1', type: 'idiom', word: 'at an inflection point',
    pron: '', hint: 'turning point...',
    ko: '변곡점에 있다; 결정적 전환의 순간',
    en: 'At a critical moment when significant change is about to occur or is necessary.',
    ex: '"The global steel industry stands at an inflection point as shifting patterns… converge."',
    diff: 2
  },
  {
    id: 'id2', type: 'idiom', word: 'headwinds',
    pron: '', hint: 'challenges, obstacles...',
    ko: '역풍; 불리한 여건, 장애물',
    en: 'Conditions or forces that make progress difficult; unfavorable circumstances.',
    ex: '"Steel\'s perennial role… faces increased challenges from chronic overcapacity… headwinds."',
    diff: 2
  },
  {
    id: 'id3', type: 'idiom', word: 'tailwinds',
    pron: '', hint: 'favorable conditions...',
    ko: '순풍; 유리한 여건, 성장 동력',
    en: 'Conditions or forces that support and accelerate progress; favorable circumstances.',
    ex: '"Backed by resilient domestic demand… and favorable policy tailwinds, India\'s trajectory…"',
    diff: 2
  },
  {
    id: 'id4', type: 'idiom', word: 'road map',
    pron: '', hint: 'strategic plan...',
    ko: '로드맵; 단계별 전략 계획',
    en: 'A detailed plan or strategy outlining steps to achieve a long-term goal.',
    ex: '"…a more well-defined transition road map [is needed] for India\'s low-carbon steel."',
    diff: 1
  },
  {
    id: 'id5', type: 'idiom', word: 'lock-in risk',
    pron: '', hint: 'stranded asset danger...',
    ko: '고착화 위험; 나중에 되돌리기 어려운 투자 위험',
    en: 'The danger of committing capital to assets that may become stranded or uneconomic.',
    ex: '"…most BF-BOF additions could increase lock-in risks for carbon-intensive assets."',
    diff: 3
  },
  {
    id: 'id6', type: 'idiom', word: 'carbon overhang',
    pron: '', hint: 'excess carbon-intensive capacity...',
    ko: '탄소 과잉 부담; 탄소 집약적 설비의 구조적 과잉',

  // ── Collocation ──
  {
    id: 'co1', type: 'colloc', word: 'overcapacity',
    pron: '/ˌoʊvəkəˈpæsɪti/', hint: 'excess production capacity...',
    ko: '과잉 생산능력; 공급 과잉',

    diff: 2
  },
  {

    pron: '/diːˌkɑːbənaɪˈzeɪʃən/', hint: 'reducing carbon emissions...',
    ko: '탈탄소화; 이산화탄소 배출 감축',
    en: 'The process of reducing carbon dioxide emissions, especially from energy and industry.',
    ex: '"The pace of decarbonization is affected by execution delays and investment gaps."',
    diff: 2
  },
  {
    id: 'co3', type: 'colloc', word: 'blast furnace',
    pron: '/ˈblæst ˌfɜːrnɪs/', hint: 'iron smelting equipment...',
    ko: '고로; 용광로 (철광석 제련 설비)',
    en: 'A tall furnace in which iron ore is smelted using coke and hot air to produce pig iron.',
    ex: '"…most growth expected to come from the blast furnace–basic oxygen furnace route."',
    diff: 1
  },
  {
    id: 'co4', type: 'colloc', word: 'trade measures',
    pron: '', hint: 'tariffs, quotas, duties...',
    ko: '무역 조치; 관세·수입 규제 등 통상 정책 수단',
    en: 'Policy tools including tariffs, quotas, and duties used to regulate trade flows.',
    ex: '"Trade measures in major steel markets have doubled since 2020."',
    diff: 2
  },
  {
    id: 'co5', type: 'colloc', word: 'value-added products',
    pron: '', hint: 'high-margin specialized goods...',

    diff: 2
  },
  {

    pron: '', hint: 'robust sourcing strategy...',
    ko: '공급망 회복력; 원자재 조달의 안정성·탄력성',
    en: 'The ability of a supply chain to absorb disruptions and maintain reliable sourcing.',
    ex: '"How can steelmakers build a resilient and cost-efficient supply chain?"',
    diff: 2
  },
  {
    id: 'co7', type: 'colloc', word: 'carbon intensity',
    pron: '', hint: 'CO₂ per ton of steel...',
    ko: '탄소 집약도; 철강 1톤당 CO₂ 배출량',
    en: 'The amount of carbon dioxide emitted per unit of output, typically per ton of steel.',
    ex: '"…making the sector one of the most emissions-intensive worldwide."',
    diff: 2
  },

  // ── 고급단어 ──
  {
    id: 'vc1', type: 'vocab', word: 'resilience',
    pron: '/rɪˈzɪliəns/', hint: 'ability to recover...',
    ko: '회복력; 탄력성',
    en: 'The capacity to recover quickly from difficulties or adapt to adverse conditions.',
    ex: '"Steel for growth and resilience" — the ability to bounce back from global shocks.',
    diff: 1
  },
  {
    id: 'vc2', type: 'vocab', word: 'recalibrate',
    pron: '/ˌriːˈkælɪbreɪt/', hint: 'readjust strategy...',
    ko: '재조정하다; 전략을 재설정하다',
    en: 'To reassess and adjust a strategy, plan, or system in light of new information.',
    ex: '"…a time when the steel market demands strategic recalibration."',
    diff: 3
  },
  {
    id: 'vc3', type: 'vocab', word: 'protectionist',
    pron: '/prəˈtekʃənɪst/', hint: 'trade barriers advocate...',
    ko: '보호무역주의적; 자국 산업 보호를 위한',
    en: 'Relating to policies that restrict imports to protect domestic industries.',
    ex: '"Steel\'s role… faces increased challenges from… protectionist policies."',
    diff: 2
  },
  {
    id: 'vc4', type: 'vocab', word: 'beneficiation',
    pron: '/ˌbenɪfɪˌsɪˈeɪʃən/', hint: 'ore processing...',
    ko: '선광; 광석 정제·처리 공정',
    en: 'The process of treating raw ore to improve its quality before further processing.',
    ex: '"…medium- to low-grade ore, requiring energy-intensive beneficiation and blending."',
    diff: 3
  },
  {
    id: 'vc5', type: 'vocab', word: 'concessional',
    pron: '/kənˈseʃənl/', hint: 'preferential financing...',
    ko: '양허적; 우대 조건의 (저금리 등 특혜 금융)',
    en: 'Offering favorable terms, especially below-market interest rates, for financing.',
    ex: '"Tap into… concessional finance… to offset decarbonization capital expenditures."',
    diff: 3
  },
  {
    id: 'vc6', type: 'vocab', word: 'seaborne',
    pron: '/ˈsiːbɔːrn/', hint: 'ocean freight...',
    ko: '해상 운송의; 바다로 수송되는',
    en: 'Transported or carried by sea; relating to ocean-going trade routes.',
    ex: '"India could lead the demand for seaborne met coal, growing to 120–130 Mt by 2035."',
    diff: 2
  },
  {
    id: 'vc7', type: 'vocab', word: 'nascent',
    pron: '/ˈneɪsənt/', hint: 'just beginning...',
    ko: '초기 단계의; 신생의, 막 발전하기 시작하는',
    en: 'Just beginning to develop or exist; in an early stage of formation.',
    ex: '"…supporting ecosystems that are still nascent [for green hydrogen in India]."',
    diff: 2
  },
  {
    id: 'vc8', type: 'vocab', word: 'brownfield',
    pron: '/ˈbraʊnfiːld/', hint: 'existing site expansion...',
    ko: '기존 부지 (확장); 기존 공장 설비를 활용한 증설',
    en: 'An existing industrial site used for expansion, contrasted with a new greenfield site.',
    ex: '"The expansion will primarily be through brownfield projects and BF-BOF route."',
    diff: 2
  },
  {

    en: 'The process of forming iron ore fines into small balls (pellets) for use in furnaces.',
    ex: '"…promotion of beneficiation and pelletization [of iron ore in India]."',

  },
  {

    en: 'To convert something into a source of revenue or financial gain.',
    ex: '"…allowing efficient producers to monetize surplus credits [under carbon trading]."',
    diff: 2
  },

  // ── 비즈니스 전용 ──
  {
    id: 'bz1', type: 'biz', word: 'BF-BOF',

  },
  {

    pron: '', hint: 'EU carbon border tax...',
    ko: 'CBAM: 탄소국경조정제도 (Carbon Border Adjustment Mechanism)',
    en: 'An EU policy requiring importers to pay for the carbon content of products like steel, leveling the playing field with domestic producers.',

    diff: 3
  },
  {
    id: 'bz5', type: 'biz', word: 'PLI',
    pron: '', hint: 'India incentive scheme...',
    ko: 'PLI: 생산연계 인센티브 (Production-Linked Incentive)',

    ex: '"In the long run, several low-emission technologies, such as CCUS… are being explored globally."',

function dots(n) {
  return [1,2,3].map(i => `<span class="diff-dot${i<=n?' on':''}"></span>`).join('');
}

function render(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach(c => {
    const hide = filter !== 'all' && c.type !== filter;
    const isLearned = learned.has(c.id);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (hide ? ' hidden' : '');
    wrap.innerHTML = `
      <div class="card${isLearned?' learned':''}" id="card-${c.id}" onclick="flip('${c.id}',event)">
        <div class="card-face card-front">
          <span class="card-tag tag-${c.type}">${tagLabel(c.type)}</span>
          <div class="card-word">${c.word}</div>
          ${c.pron ? `<div class="card-pron">${c.pron}</div>` : ''}
          <div class="card-hint">${c.hint}</div>
          <span class="learned-badge">✓</span>
          <div class="diff-dots">${dots(c.diff)}</div>
          <button class="learn-btn" onclick="toggleLearn('${c.id}',event)">${isLearned?'학습 완료':'학습하기'}</button>
        </div>
        <div class="card-face card-back">
          <div class="def-ko">${c.ko}</div>
          <div class="def-en">${c.en}</div>
          ${c.ex ? `<div class="example">${c.ex}</div>` : ''}
        </div>
      </div>`;
    grid.appendChild(wrap);
  });
  updateProgress();
}

function tagLabel(t) {
  return {phrasal:'Phrasal Verb',idiom:'Idiom',colloc:'Collocation',vocab:'고급단어',biz:'비즈니스'}[t]||t;
}

function flip(id, e) {
  if (e.target.classList.contains('learn-btn')) return;
  document.getElementById('card-'+id).classList.toggle('flipped');
}

function toggleLearn(id, e) {
  e.stopPropagation();
  const card = document.getElementById('card-'+id);
  const btn = card.querySelector('.learn-btn');
  if (learned.has(id)) {
    learned.delete(id);
    card.classList.remove('learned');
    btn.textContent = '학습하기';
  } else {
    learned.add(id);
    card.classList.add('learned');
    btn.textContent = '학습 완료';
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
  updateProgress();
}

function updateProgress() {
  const total = cards.length;
  const done = learned.size;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = `${done} / ${total} 학습 완료`;
}

let current = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    current = btn.dataset.filter;
    render(current);
  });
});

render('all');
</script>
</body>
</html>
