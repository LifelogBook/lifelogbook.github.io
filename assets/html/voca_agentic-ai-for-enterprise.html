<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-agent AI for Enterprise — Vocab Cards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a0a2e;
    --ink2: #2d1a4f;
    --accent: #7c3aed;
    --accent2: #6d28d9;
    --sky: #ede9fe;
    --bg: #f5f3ff;
    --border: #c4b5fd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1a4f 50%, #4c1d95 100%);
    color: #fff;
    text-align: center;
    padding: 2rem 1rem 1.5rem;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 1.7rem; margin-bottom: .4rem; }
  .badge {
    display: inline-block;
    border: 1.5px solid #c4b5fd;
    border-radius: 20px;
    padding: .25rem .9rem;
    font-size: .75rem;
    letter-spacing: .08em;
    color: #ddd6fe;
    text-transform: uppercase;
  }

  .progress-bar-wrap { background: #ddd6fe; height: 6px; border-radius: 3px; margin: 1rem 1.2rem .3rem; }
  .progress-bar { height: 6px; background: var(--accent); border-radius: 3px; transition: width .4s; width: 0%; }
  .progress-label { text-align: right; font-size: .75rem; color: var(--border); padding: 0 1.2rem .8rem; }

  .filters {
    display: flex; flex-wrap: wrap; gap: .5rem;
    padding: .8rem 1rem;
    background: #fff;
    border-bottom: 1px solid var(--border);
    justify-content: center;
  }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: #fff;
    border-radius: 20px;
    padding: .3rem .9rem;
    font-size: .78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    font-weight: 500;
    color: var(--ink2);
    transition: all .2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    padding: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card-wrap { perspective: 800px; height: 200px; cursor: pointer; }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .5s ease;
  }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    padding: 1rem;
    border: 1.5px solid var(--border);
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .card-front { background: #fff; }
  .card-back {
    background: var(--sky);
    transform: rotateY(180deg);
  }

  .card-wrap.learned .card-front,
  .card-wrap.learned .card-back {
    background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
    border-color: var(--accent);
  }

  .tag {
    display: inline-block;
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: .15rem .5rem;
    border-radius: 4px;
    color: #fff;
  }
  .dots { display: flex; gap: 3px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
  }
  .dot.filled { background: var(--accent); }

  .word {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
    text-align: center;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pron {
    font-size: .72rem;
    color: #888;
    text-align: center;
    margin-top: .2rem;
  }

  .ko-word {
    font-size: .95rem;
    font-weight: 600;
    color: var(--ink2);
    margin-bottom: .3rem;
  }
  .nuance {
    font-size: .75rem;
    color: #555;
    line-height: 1.5;
  }

  .check-circle {
    position: absolute;
    top: .6rem; right: .7rem;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem;
    color: transparent;
    transition: all .2s;
  }
  .card-wrap.learned .check-circle {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
</style>
</head>
<body>

<header>
  <h1>Multi-agent AI for Enterprise</h1>
  <div class="badge">Capgemini · 2025</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="bar"></div></div>
  <div class="progress-label" id="plabel">0 / 35 learned</div>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="filter('all',this)">ALL (35)</button>
  <button class="filter-btn" onclick="filter('phrasal',this)">PHRASAL (6)</button>
  <button class="filter-btn" onclick="filter('idiom',this)">IDIOM (6)</button>
  <button class="filter-btn" onclick="filter('colloc',this)">COLLOC (7)</button>
  <button class="filter-btn" onclick="filter('vocab',this)">고급단어 (10)</button>
  <button class="filter-btn" onclick="filter('biz',this)">비즈니스 (6)</button>
</div>

<div id="grid"></div>

<script>
const STORAGE_KEY = 'agentic_ai_enterprise_learned';
const learned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

const TAG_COLORS = {
  phrasal: '#7c3aed',
  idiom:   '#9b1c2e',
  colloc:  '#0891b2',
  vocab:   '#065f46',
  biz:     '#b45309'
};

const cards = [
  /* ── PHRASAL (6) ── */
  { id:'pv1', cat:'phrasal', word:'rush to', ko:'앞다투어 ~하다; 서둘러 달려들다', nuance:'rush=돌진 + to=목적 → "companies rushed to create" 너도나도 경쟁적으로 뛰어들다. 선점 심리가 만드는 과열 행동을 표현.', diff:1 },
  { id:'pv2', cat:'phrasal', word:'take ownership', ko:'주도적으로 책임지다; 떠맡아 처리하다', nuance:'ownership=소유권 → 문제를 내 것처럼 책임지다. "agent can take ownership of a client issue" — AI 에이전트가 고객 문제를 스스로 해결한다는 뜻.', diff:2 },
  { id:'pv3', cat:'phrasal', word:'scale up', ko:'규모를 확대하다; 더 큰 단위로 키우다', nuance:'scale=규모 + up=위로 → 소규모 파일럿을 전사 규모로 확장. 스타트업에서 엔터프라이즈로, 파일럿에서 프로덕션으로.', diff:1 },
  { id:'pv4', cat:'phrasal', word:'narrow down', ko:'범위를 좁히다; 후보를 추려내다', nuance:'narrow=좁다 + down=아래로 → 넓은 가능성에서 핵심만 남기다. 에이전트가 수많은 옵션을 평가해 최적 해결책을 선택하는 과정.', diff:2 },
  { id:'pv5', cat:'phrasal', word:'hand off', ko:'인계하다; 다음 담당자에게 넘기다', nuance:'hand=손 + off=분리 → 손에서 손으로 넘기는 릴레이 이미지. 챗봇이 복잡한 이슈를 AI 에이전트에게, 에이전트가 인간에게 넘기는 워크플로우.', diff:2 },
  { id:'pv6', cat:'phrasal', word:'phase in', ko:'단계적으로 도입하다', nuance:'phase=단계 + in=안으로 → 한꺼번에가 아니라 단계별로 집어넣다. RPA→Agentic AI→Gen AI 순서로 단계적으로 자동화를 확장하는 전략.', diff:2 },

  /* ── IDIOM (6) ── */
  { id:'id1', cat:'idiom', word:'solution in search of a problem', ko:'문제도 없는데 만든 해결책; 실용 없는 도입', nuance:'"a solution in search of a problem" — 해결책이 먼저 나오고 문제를 찾아 헤매는 본말전도 상황. Agentic AI를 무조건 도입하는 것의 함정을 경고할 때 사용.', diff:3 },
  { id:'id2', cat:'idiom', word:'in short', ko:'한마디로; 요컨대; 간략히 말하면', nuance:'in=안에 + short=짧은 → 긴 말을 짧게 압축해서. "In short, because it will soon be in every business function" — 명확한 결론을 끌어낼 때 사용하는 고급 전환어.', diff:1 },
  { id:'id3', cat:'idiom', word:'akin to', ko:'~와 유사한; ~와 다를 바 없는', nuance:'akin=친족(kin)과 같은 → 본질적으로 비슷한 종류. "akin to creating a solution in search of a problem" — similar to보다 격식체이고 강조력이 강함.', diff:2 },
  { id:'id4', cat:'idiom', word:'in the loop', ko:'정보 공유 체계 안에; 의사결정 고리 안에', nuance:'loop=순환 고리 → 정보·결정이 순환하는 흐름 안에 포함된 상태. "human in the loop" = AI가 행동하기 전 인간이 개입하는 거버넌스 구조.', diff:2 },
  { id:'id5', cat:'idiom', word:'left to them', ko:'그들의 재량에 맡겨진; 알아서 결정하도록', nuance:'left=남겨진 + to them=그들에게 → 상위에서 지시하지 않고 에이전트 스스로 판단하게 두다. "How they reach them is largely left to them" — 에이전트 자율성의 핵심.', diff:2 },
  { id:'id6', cat:'idiom', word:'a step ahead', ko:'한발 앞서 있는; 남보다 먼저 나아간', nuance:'step=발걸음 + ahead=앞에 → 경쟁자보다 한 걸음 앞에 있다. "sectors already a step ahead" — 먼저 도입해 선점 효과를 누리는 산업들을 묘사.', diff:1 },

  /* ── COLLOC (7) ── */
  { id:'co1', cat:'colloc', word:'retrieval-augmented generation', ko:'검색 증강 생성 (RAG); LLM이 외부 DB를 검색해 더 정확한 답을 생성하는 방식', nuance:'LLM의 환각(hallucination)을 줄이는 핵심 기술. 단순 LLM이 시냅스 기억에 의존한다면, RAG는 실시간으로 외부 지식을 참조한다.', diff:3 },
  { id:'co2', cat:'colloc', word:'robotic process automation', ko:'로봇 프로세스 자동화 (RPA); 규칙 기반 반복 업무를 소프트웨어 봇이 자동화', nuance:'Agentic AI의 전신. 입력·처리가 고정된 작업에 적합. 입력 변수가 생기면 RPA는 실패하고 그때 Agentic AI가 필요해진다.', diff:2 },
  { id:'co3', cat:'colloc', word:'natural language processing', ko:'자연어 처리 (NLP); 컴퓨터가 인간 언어를 이해·생성하는 기술', nuance:'AI 에이전트가 사람과 자연스럽게 소통할 수 있게 하는 핵심 기반. NLP 없이는 에이전트와 인간의 인터랙션이 불가능하다.', diff:2 },
  { id:'co4', cat:'colloc', word:'multi-agent system', ko:'멀티 에이전트 시스템; 각자 전문 역할을 맡은 여러 AI 에이전트가 협력하는 구조', nuance:'단일 LLM과의 핵심 차이: 분산 협업으로 더 복잡한 작업 처리 가능. 보험 청구 사례처럼 검증·평가·지불을 각 에이전트가 분담.', diff:2 },
  { id:'co5', cat:'colloc', word:'proof-of-concept', ko:'개념 증명 (PoC); 아이디어가 실제로 작동하는지 소규모로 먼저 검증하는 단계', nuance:'전사 도입 전 리스크를 줄이는 단계. "defined and tested in the proof-of-concept stage" — 실패 포인트를 미리 파악하는 것이 목적.', diff:2 },
  { id:'co6', cat:'colloc', word:'feedback loop', ko:'피드백 루프; 출력 결과가 다시 입력으로 들어가 지속적으로 개선되는 순환 구조', nuance:'AI 에이전트의 데이터 최적화 핵심 메커니즘. 에이전트가 행동하고 → 결과를 받고 → 다음 행동을 개선하는 학습 사이클.', diff:1 },
  { id:'co7', cat:'colloc', word:'change management', ko:'변화 관리; 조직이 새로운 기술·프로세스 도입 시 사람과 문화를 이끄는 과정', nuance:'기술 도입보다 사람의 저항을 관리하는 것이 더 어렵다. AI 에이전트 도입의 실패 원인 1위는 기술이 아니라 변화 관리 부재.', diff:2 },

  /* ── VOCAB (10) ── */
  { id:'vc1', cat:'vocab', word:'autonomous', pron:'/ɔːˈtɒnəməs/', ko:'자율적인; 스스로 결정하고 행동하는', nuance:'auto(스스로) + nomos(법/규칙) → 자기 규칙으로 움직이는. 에이전트의 첫 번째 특성. reactive(반응적)와 반대 개념.', diff:2 },
  { id:'vc2', cat:'vocab', word:'orchestration', pron:'/ˌɔːkɪˈstreɪʃən/', ko:'조율; 여러 에이전트를 총지휘하는 것', nuance:'orchestra(오케스트라) → 지휘자가 여러 악기를 조화롭게 이끌듯. 멀티 에이전트 시스템에서 누가 어떤 에이전트를 언제 실행할지 결정하는 메커니즘.', diff:2 },
  { id:'vc3', cat:'vocab', word:'governance', pron:'/ˈɡʌvənəns/', ko:'거버넌스; 통제·관리 체계', nuance:'govern(통치하다) + -ance → 규칙·책임·감독의 전체 프레임워크. AI 에이전트에서는 언제 인간이 개입하고 무엇을 로그하며 실패 시 어떻게 대응하는지의 체계.', diff:2 },
  { id:'vc4', cat:'vocab', word:'guardrail', pron:'/ˈɡɑːrdreɪl/', ko:'가드레일; 안전장치; 일탈을 막는 경계 규칙', nuance:'guard(보호) + rail(레일) → 도로 가드레일처럼 AI가 위험 구역으로 벗어나지 못하게. 에이전트가 편향, 오류, 윤리 위반 없이 작동하도록 설정하는 제한.', diff:1 },
  { id:'vc5', cat:'vocab', word:'decentralized', pron:'/ˌdiːˈsentrəlaɪzd/', ko:'분산된; 중앙 통제 없이 각자 자율적으로 움직이는', nuance:'de(반대) + central(중앙) → 중앙화의 반대. 각 에이전트가 독립적으로 자신의 역할을 수행하는 구조. 조직의 기존 계층 구조와 충돌할 수 있음.', diff:2 },
  { id:'vc6', cat:'vocab', word:'augment', pron:'/ɔːɡˈment/', ko:'증강하다; 인간 능력을 AI로 보완·강화하다', nuance:'augere(라틴어: 늘리다) → 대체가 아니라 인간의 능력을 더 크게 만드는 것. "augment human workers with AI assistants" — replace가 아닌 augment.', diff:2 },
  { id:'vc7', cat:'vocab', word:'iteratively', pron:'/ˈɪtərətɪvli/', ko:'반복적으로; 단계적으로 개선하며', nuance:'iterate(반복하다) → 한 번에 완성하지 않고 조금씩 개선하는 방식. "LLMs are improving iteratively" — 매 버전이 이전보다 나아지는 점진적 발전 과정.', diff:2 },
  { id:'vc8', cat:'vocab', word:'disruptive', pron:'/dɪsˈrʌptɪv/', ko:'혼란을 야기하는; 기존 질서를 뒤흔드는', nuance:'disrupt(방해하다) → integrating AI can be "complex, disruptive, and destabilizing". 긍정·부정 양면 의미 모두 가능. 혁신적이지만 기존 운영을 불안정하게 할 수 있음.', diff:2 },
  { id:'vc9', cat:'vocab', word:'fragmentation', pron:'/ˌfræɡmənˈteɪʃən/', ko:'단편화; 데이터가 여러 곳에 흩어진 상태', nuance:'fragment(조각) → 80%의 조직이 데이터의 50% 이상을 하이브리드·멀티클라우드에 분산 저장. AI 에이전트가 효과적으로 작동하려면 이 단편화를 해결해야 함.', diff:2 },
  { id:'vc10', cat:'vocab', word:'proactive', pron:'/ˌproʊˈæktɪv/', ko:'선제적인; 지시 없이 먼저 행동하는', nuance:'pro(앞서) + active(행동하는) → 반응하는(reactive)의 반대. 에이전트의 핵심 특성: "Proactive, initiating action independently without user prompts."', diff:1 },

  /* ── BIZ (6) ── */
  { id:'bz1', cat:'biz', word:'LLM', ko:'대규모 언어 모델 (Large Language Model); AI 에이전트의 주요 인터페이스. GPT·Claude·Gemini 등', nuance:'방대한 텍스트 데이터로 훈련된 기반 모델. 패턴 인식을 통해 추론·의사결정·소통 능력을 갖춤. 에이전트의 "뇌" 역할.', diff:1 },
  { id:'bz2', cat:'biz', word:'RPA', ko:'로봇 프로세스 자동화 (Robotic Process Automation); 고정 입력·고정 처리 반복 작업 자동화', nuance:'Agentic AI의 전신. 변수 없는 규칙 기반 작업에 최적. 인간이 클릭하는 것을 그대로 따라하는 수준의 자동화.', diff:1 },
  { id:'bz3', cat:'biz', word:'RAG', ko:'검색 증강 생성 (Retrieval-Augmented Generation); 외부 DB 검색으로 LLM 정확도 향상', nuance:'LLM 단독보다 훨씬 최신·정확한 답변 가능. 기업 내부 문서·정책을 연결해 도메인 특화 에이전트를 만드는 핵심 기술.', diff:2 },
  { id:'bz4', cat:'biz', word:'hyper-automation', ko:'초자동화; RPA를 넘어 AI로 가변 입력·가변 처리 작업까지 자동화하는 고도화된 자동화', nuance:'Capgemini 프레임워크의 Level 2. RPA로 커버 못하는 복잡한 판단·예외 처리를 Agentic AI로 자동화. 진정한 자동화의 다음 단계.', diff:2 },
  { id:'bz5', cat:'biz', word:'GDPR', ko:'유럽 일반 데이터 보호 규정 (General Data Protection Regulation); AI 에이전트 컴플라이언스 핵심', nuance:'에이전트가 고객 데이터를 처리할 때 반드시 준수해야 하는 EU 규정. 위반 시 전 세계 연간 매출의 4% 또는 2천만 유로 중 더 큰 금액의 과징금.', diff:2 },
  { id:'bz6', cat:'biz', word:'EU AI Act', ko:'EU 인공지능법; AI 시스템의 리스크 등급별 규제 프레임워크. 에이전트 거버넌스 필수 준수', nuance:'Unacceptable/High/Limited/Minimal 4등급 리스크 체계. 고위험 AI 에이전트는 투명성·인간 감독·데이터 거버넌스 요건을 충족해야 함.', diff:2 },
];

function renderDots(diff) {
  return [1,2,3].map(i => `<div class="dot${i<=diff?' filled':''}"></div>`).join('');
}

function render(filtered) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  filtered.forEach(c => {
    const isLearned = learned.has(c.id);
    const div = document.createElement('div');
    div.className = 'card-wrap' + (isLearned ? ' learned' : '');
    div.dataset.id = c.id;
    div.dataset.cat = c.cat;
    div.innerHTML = `
      <div class="card-inner">
        <div class="card-front">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="tag" style="background:${TAG_COLORS[c.cat]}">${c.cat.toUpperCase()}</span>
            <div class="dots">${renderDots(c.diff)}</div>
          </div>
          <div>
            <div class="word">${c.word}</div>
            ${c.pron ? `<div class="pron">${c.pron}</div>` : ''}
          </div>
          <div style="font-size:.7rem;color:#aaa;text-align:center">탭하여 뒤집기</div>
          <div class="check-circle">✓</div>
        </div>
        <div class="card-back">
          <div>
            <div class="ko-word">${c.ko}</div>
            <div class="nuance">${c.nuance}</div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
            <div class="dots">${renderDots(c.diff)}</div>
            <button onclick="toggleLearned(event,'${c.id}')" style="font-size:.7rem;padding:.2rem .6rem;border-radius:10px;border:1px solid var(--accent);background:${isLearned?'var(--accent)':'#fff'};color:${isLearned?'#fff':'var(--accent)'};cursor:pointer;font-family:'DM Sans',sans-serif">
              ${isLearned ? '✓ 완료' : '완료'}
            </button>
          </div>
          <div class="check-circle">✓</div>
        </div>
      </div>`;
    div.addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON') return;
      this.classList.toggle('flipped');
    });
    grid.appendChild(div);
  });
}

function toggleLearned(e, id) {
  e.stopPropagation();
  if (learned.has(id)) learned.delete(id);
  else learned.add(id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
  updateProgress();
  const wrap = document.querySelector(`.card-wrap[data-id="${id}"]`);
  if (wrap) {
    wrap.classList.toggle('learned', learned.has(id));
    const btn = wrap.querySelector('button');
    if (btn) {
      btn.textContent = learned.has(id) ? '✓ 완료' : '완료';
      btn.style.background = learned.has(id) ? 'var(--accent)' : '#fff';
      btn.style.color = learned.has(id) ? '#fff' : 'var(--accent)';
    }
  }
}

function updateProgress() {
  const total = cards.length;
  const done = cards.filter(c => learned.has(c.id)).length;
  const pct = total ? (done/total*100) : 0;
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('plabel').textContent = `${done} / ${total} learned`;
}

let currentFilter = 'all';
function filter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(cat === 'all' ? cards : cards.filter(c => c.cat === cat));
}

render(cards);
updateProgress();
</script>
</body>
</html>
