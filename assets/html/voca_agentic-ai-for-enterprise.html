<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic AI for Enterprise — Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0c1f3d;--ink2:#1e3a5f;--accent:#0ea5e9;--accent2:#0284c7;
  --sky:#f0f9ff;--bg:#f8fcff;--border:#38bdf8;
  --phrasal:#0ea5e9;--idiom:#7c3aed;--colloc:#1e3a5f;--vocab:#f59e0b;--biz:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
header{background:linear-gradient(135deg,#0c1f3d 0%,#1e3a5f 50%,#0ea5e9 100%);padding:28px 24px 24px;text-align:center;}
header h1{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;margin-bottom:6px;}
header p{font-size:.82rem;color:rgba(255,255,255,.75);letter-spacing:.04em;}
.badge{display:inline-block;margin-top:10px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:.72rem;padding:3px 12px;border-radius:20px;letter-spacing:.06em;}
.controls{display:flex;flex-wrap:wrap;gap:8px;padding:18px 16px 10px;justify-content:center;}
.filter-btn{border:none;border-radius:20px;padding:6px 16px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;background:#e2e8f0;color:#475569;}
.filter-btn.active,.filter-btn:hover{color:#fff;}
.filter-btn[data-cat="all"].active{background:var(--accent);}
.filter-btn[data-cat="phrasal"].active{background:var(--phrasal);}
.filter-btn[data-cat="idiom"].active{background:var(--idiom);}
.filter-btn[data-cat="colloc"].active{background:var(--colloc);}
.filter-btn[data-cat="vocab"].active{background:var(--vocab);}
.filter-btn[data-cat="biz"].active{background:var(--biz);}
.stats{text-align:center;font-size:.78rem;color:#64748b;padding:0 16px 12px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:8px 16px 32px;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:14px;cursor:pointer;perspective:800px;height:200px;transition:opacity .3s;}
.card.hidden{display:none;}
.card.learned{opacity:.45;}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s;}
.card.flipped .card-inner{transform:rotateY(180deg);}
.front,.back{position:absolute;inset:0;border-radius:13px;padding:18px 16px;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.front{background:#fff;}
.back{background:var(--sky);transform:rotateY(180deg);}
.cat-tag{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 9px;border-radius:10px;color:#fff;margin-bottom:8px;}
.cat-tag.phrasal{background:var(--phrasal);}
.cat-tag.idiom{background:var(--idiom);}
.cat-tag.colloc{background:var(--colloc);}
.cat-tag.vocab{background:var(--vocab);}
.cat-tag.biz{background:var(--biz);}
.word{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--ink);line-height:1.3;}
.pron{font-size:.75rem;color:var(--accent2);margin-top:3px;font-style:italic;}
.diff{display:flex;gap:3px;margin-top:auto;}
.dot{width:7px;height:7px;border-radius:50%;background:#e2e8f0;}
.dot.on{background:var(--accent);}
.ko{font-size:.95rem;font-weight:600;color:var(--ink);margin-bottom:6px;}
.nuance{font-size:.75rem;color:#475569;line-height:1.55;flex:1;overflow-y:auto;}
.learn-btn{margin-top:10px;border:none;background:var(--accent);color:#fff;font-size:.72rem;padding:4px 12px;border-radius:10px;cursor:pointer;align-self:flex-end;}
.learn-btn:hover{background:var(--accent2);}
.reset-wrap{text-align:center;padding-bottom:24px;}
.reset-btn{border:1.5px solid var(--border);background:#fff;color:var(--ink2);padding:8px 24px;border-radius:20px;cursor:pointer;font-size:.82rem;}
.reset-btn:hover{background:var(--sky);}
</style>
</head>
<body>
<header>
  <h1>Agentic AI for Enterprise</h1>
  <p>Multi-agent AI — 21st century automation revolution</p>
  <span class="badge">Capgemini · 2025</span>
</header>
<div class="controls">
  <button class="filter-btn active" data-cat="all">All <span id="cnt-all"></span></button>
  <button class="filter-btn" data-cat="phrasal">Phrasal <span id="cnt-phrasal"></span></button>
  <button class="filter-btn" data-cat="idiom">Idiom <span id="cnt-idiom"></span></button>
  <button class="filter-btn" data-cat="colloc">Colloc <span id="cnt-colloc"></span></button>
  <button class="filter-btn" data-cat="vocab">Vocab <span id="cnt-vocab"></span></button>
  <button class="filter-btn" data-cat="biz">Biz <span id="cnt-biz"></span></button>
</div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>
<div class="reset-wrap"><button class="reset-btn" onclick="resetAll()">Reset learned</button></div>
<script>
const LSKEY = 'agentic_ai_enterprise_learned';
const cards = [
  {id:'pv1',cat:'phrasal',word:'take off',ko:'급성장하다, 폭발적으로 퍼지다',nuance:'"generative AI took off as a popular phenomenon" — 비행기가 이륙하는 순간처럼 갑자기 빠르게 성장하거나 유행이 시작되는 이미지. 비슷한 표현: blow up, go viral',diff:1},
  {id:'pv2',cat:'phrasal',word:'rush to',ko:'앞다퉈 ~하다, 서둘러 뛰어들다',nuance:'"companies have rushed to create their own versions" — rush(돌진하다)+to(방향). 경쟁에 뒤처질까 봐 조급하게 움직이는 집단적 행동. 부정적 뉘앙스(섣부름)를 내포하기도 함',diff:1},
  {id:'pv3',cat:'phrasal',word:'map out',ko:'체계적으로 정리하다, 단계를 그려내다',nuance:'"map the processes" — 지도(map)를 그리듯 복잡한 과정을 시각화·구조화하는 이미지. plan out보다 더 세밀한 분해·시각화 뉘앙스. map out a strategy, map out a workflow',diff:2},
  {id:'pv4',cat:'phrasal',word:'scale up',ko:'규모를 키우다, 확대하다',nuance:'작은 성공을 더 큰 규모로 복제하는 과정. scale down(축소)의 반대. "as expertise in adoption spreads" 맥락에서 확장 이미지. 스타트업·기술 업계에서 필수 표현',diff:2},
  {id:'pv5',cat:'phrasal',word:'build in',ko:'(기능·규칙을) 내장하다, 처음부터 포함시키다',nuance:'"setting boundaries with guardrails built in" — 나중에 덧붙이는 게 아니라 설계 단계에서 처음부터 포함시키는 것. built-in safeguards, built-in compliance처럼 형용사로도 자주 사용',diff:2},
  {id:'pv6',cat:'phrasal',word:'hand off',ko:'(업무를) 넘기다, 인계하다',nuance:'릴레이 선수가 바통을 건네는 이미지 → 책임·작업을 다음 담당자에게 매끄럽게 이양. "chatbot would escalate the issue to a human representative" 맥락. hand over보다 더 의도된 이양 뉘앙스',diff:2},
  {id:'id1',cat:'idiom',word:'solution in search of a problem',ko:'문제 없는 해결책, 불필요한 기술 도입',nuance:'"leaping into agentic AI is akin to creating a solution in search of a problem" — 보통은 문제 먼저, 해결책 나중인데 순서가 역전된 상황. 실제 필요 없는 곳에 기술을 억지로 적용하는 실수를 꼬집는 표현',diff:3},
  {id:'id2',cat:'idiom',word:'proof of concept',ko:'개념 증명, 실현 가능성 검증',nuance:'"defined and tested in the proof-of-concept stage" — 아이디어가 실제로 작동하는지 소규모로 먼저 검증하는 단계. PoC로 약칭. 투자 결정 전 리스크를 줄이는 기업 관행',diff:2},
  {id:'id3',cat:'idiom',word:'feedback loop',ko:'피드백 루프, 결과가 다시 입력에 영향을 미치는 순환',nuance:'"ongoing improvement using feedback loops" — 출력(output)이 다시 입력(input)으로 돌아와 시스템을 지속적으로 개선하는 순환 구조. 긍정적(virtuous cycle)·부정적(vicious cycle) 두 방향 모두 존재',diff:2},

  {id:'id5',cat:'idiom',word:'a step ahead',ko:'한발 앞서다, 선도하다',nuance:'"sectors already a step ahead" — 경쟁자보다 딱 한 걸음 먼저 움직인 상태. 완전히 멀리 앞서있다기보다 지금 당장 우위에 있다는 뉘앙스. stay a step ahead(계속 앞서다)로도 자주 활용',diff:1},
  {id:'id6',cat:'idiom',word:'human-in-the-loop',ko:'인간 감독 포함 루프, 인간 개입 설계',nuance:'"agents are monitored while trusted to act independently, with selective use of human oversight" — AI가 완전 자율로 작동하지 않고 특정 지점에서 인간이 확인·승인하는 설계 원칙. AI 안전성의 핵심 개념',diff:3},

  {id:'co3',cat:'colloc',word:'retrieval-augmented generation',ko:'검색 증강 생성 (RAG)',nuance:'retrieval(검색)+augmented(증강)+generation(생성). LLM이 외부 DB를 실시간 검색해 더 정확하고 최신 정보를 반영한 답변 생성. 환각(hallucination)을 줄이는 핵심 기법',diff:3},

  {id:'co5',cat:'colloc',word:'large language model',ko:'대형 언어 모델 (LLM)',nuance:'방대한 텍스트 데이터로 학습된 기반 모델(foundation model). 패턴 인식으로 지식을 인코딩해 AI 에이전트의 추론·의사결정·소통 능력을 제공. AI 에이전트의 핵심 두뇌',diff:1},

  {id:'v10',cat:'vocab',word:'predefined',pron:'[ˌpriːdɪˈfaɪnd]',ko:'사전에 정의된, 미리 설정된',nuance:'pre(미리)+defined(정의된). "autonomously perform tasks to meet predetermined goals" — AI 에이전트는 인간이 사전에 설정한 목표 범위 내에서만 자율적으로 작동함을 강조',diff:1},
  {id:'b1',cat:'biz',word:'RPA',ko:'로봇 프로세스 자동화',nuance:'Robotic Process Automation. 규칙 기반 반복 디지털 업무를 소프트웨어 로봇이 처리. 에이전틱 AI의 전신. 정해진 입력·처리 방식에 강하지만 가변 상황 판단 불가. 에이전틱 AI로 보완',diff:1},
  {id:'b2',cat:'biz',word:'LLM',ko:'대형 언어 모델',nuance:'Large Language Model. GPT·Claude·Gemini 등. 방대한 텍스트로 학습해 언어 이해·생성. AI 에이전트의 핵심 두뇌 역할. 패턴 인식으로 지식을 인코딩해 추론·의사결정 지원',diff:1},
  {id:'b3',cat:'biz',word:'RAG',ko:'검색 증강 생성',nuance:'Retrieval-Augmented Generation. LLM이 외부 DB를 실시간 검색해 최신·정확 정보를 반영한 답변 생성. 환각(hallucination) 감소 효과. 단독 LLM보다 신뢰성 높은 출력 가능',diff:2},
  {id:'b4',cat:'biz',word:'NLP',ko:'자연어 처리',nuance:'Natural Language Processing. 컴퓨터가 인간 언어를 이해·해석·생성하는 AI 기술 분야. "making human-AI interactions more natural and efficient" — 에이전트의 소통 능력 기반 기술',diff:1},
  {id:'b5',cat:'biz',word:'SKU',ko:'재고 관리 단위',nuance:'Stock-Keeping Unit. 개별 상품을 식별하는 고유 코드. 리테일·공급망 관리의 기본 단위. "trigger stock replenishment using SKU codes" — AI 에이전트가 SKU별 재고를 모니터링해 자동 발주',diff:2},
  {id:'b6',cat:'biz',word:'GDPR',ko:'EU 일반 개인정보보호법',nuance:'General Data Protection Regulation. EU의 핵심 개인정보 보호 규정(2018년 시행). AI 에이전트 시스템도 반드시 준수 필요. 위반 시 전 세계 매출의 최대 4% 과징금 부과 가능',diff:2}
];

const learned = new Set(JSON.parse(localStorage.getItem(LSKEY)||'[]'));
let activeCat = 'all';

function dots(n){return [1,2,3].map(i=>'<span class="dot'+(i<=n?' on':'')+'"></span>').join('');}

function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const cats = ['phrasal','idiom','colloc','vocab','biz'];
  cats.forEach(c=>{
    const cnt = cards.filter(x=>x.cat===c).length;
    document.getElementById('cnt-'+c).textContent = '('+cnt+')';
  });
  document.getElementById('cnt-all').textContent = '('+cards.length+')';
  let shown = 0;
  cards.forEach(c=>{
    const hide = activeCat!=='all' && c.cat!==activeCat;
    const isLearned = learned.has(c.id);
    const div = document.createElement('div');
    div.className = 'card'+(hide?' hidden':'')+(isLearned?' learned':'');
    div.dataset.id = c.id;
    div.innerHTML = '<div class="card-inner">'
      +'<div class="front"><div><span class="cat-tag '+c.cat+'">'+c.cat+'</span>'
      +'<div class="word">'+c.word+'</div>'+(c.pron?'<div class="pron">'+c.pron+'</div>':'')+'</div>'
      +'<div class="diff">'+dots(c.diff)+'</div></div>'
      +'<div class="back"><div class="ko">'+c.ko+'</div>'
      +'<div class="nuance">'+c.nuance+'</div>'
      +'<button class="learn-btn" onclick="toggleLearn(event,\''+c.id+'\')">'+(isLearned?'✓ 완료':'학습 완료')+'</button>'
      +'</div></div>';
    div.addEventListener('click',function(e){if(!e.target.classList.contains('learn-btn'))this.classList.toggle('flipped');});
    grid.appendChild(div);
    if(!hide) shown++;
  });
  const learnedShown = cards.filter(c=>(activeCat==='all'||c.cat===activeCat)&&learned.has(c.id)).length;
  document.getElementById('stats').textContent = shown+'개 표시 중 · '+learnedShown+'개 학습 완료';
}

function toggleLearn(e,id){
  e.stopPropagation();
  if(learned.has(id)) learned.delete(id); else learned.add(id);
  localStorage.setItem(LSKEY,JSON.stringify([...learned]));
  render();
}

function resetAll(){
  learned.clear();
  localStorage.removeItem(LSKEY);
  render();
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    activeCat = this.dataset.cat;
    render();
  });
});

render();
</script>
</body>
</html>
