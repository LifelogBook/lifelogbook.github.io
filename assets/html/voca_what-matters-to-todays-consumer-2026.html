<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What matters to today's consumer 2026 — Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1040;
    --ink2: #312e81;
    --accent: #f97316;
    --accent2: #ea580c;
    --sky: #fff7ed;
    --bg: #fffcf7;
    --border: #fed7aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--ink); }

  header {
    background: linear-gradient(135deg, #1a1040 0%, #312e81 50%, #ea580c 100%);
    color: #fff;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.4rem, 4vw, 2rem); margin-bottom: .5rem; }
  .badge {
    display: inline-block;
    border: 1.5px solid rgba(255,255,255,.5);
    border-radius: 20px;
    padding: .25rem .9rem;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .progress-wrap { max-width: 700px; margin: 0 auto 1rem; padding: 0 1rem; }
  .progress-bar-bg { background: rgba(255,255,255,.2); border-radius: 4px; height: 6px; }
  .progress-bar { background: var(--accent); height: 6px; border-radius: 4px; transition: width .4s; width: 0%; }
  .progress-label { font-size: .8rem; text-align: right; margin-top: .3rem; color: rgba(255,255,255,.85); }

  .filters { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; padding: 1rem 1rem .5rem; }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--ink);
    padding: .35rem .9rem;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .filter-btn:hover:not(.active) { background: var(--sky); }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    padding: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card-wrap { perspective: 900px; }
  .card {
    position: relative;
    height: 220px;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    padding: 1.1rem 1.2rem;
    display: flex; flex-direction: column;
    border: 1.5px solid var(--border);
  }
  .front { background: #fff; }
  .back { background: var(--sky); transform: rotateY(180deg); justify-content: space-between; }

  .card.learned .front { background: linear-gradient(135deg, #fff7ed 0%, #fed7aa 100%); }

  .tag {
    display: inline-block;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: .2rem .55rem;
    border-radius: 10px;
    color: #fff;
    margin-bottom: .6rem;
    width: fit-content;
  }
  .tag-phrasal  { background: #f97316; }
  .tag-idiom    { background: #7c3aed; }
  .tag-colloc   { background: #1a1040; }
  .tag-vocab    { background: #0ea5e9; }
  .tag-biz      { background: #dc2626; }

  .word { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: var(--ink); line-height: 1.2; margin-bottom: .3rem; }
  .pron { font-size: .75rem; color: #666; margin-bottom: .4rem; }
  .dots { display: flex; gap: 3px; margin-top: auto; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .25; }
  .dot.on { opacity: 1; }

  .ko { font-size: .95rem; font-weight: 600; color: var(--ink); margin-bottom: .4rem; line-height: 1.4; }
  .nuance { font-size: .78rem; color: #444; line-height: 1.5; flex: 1; }
  .check-btn {
    align-self: flex-end;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: .75rem;
    font-weight: 600;
    padding: .3rem .75rem;
    border-radius: 10px;
    cursor: pointer;
    transition: background .2s;
    margin-top: .5rem;
  }
  .check-btn:hover { background: var(--accent2); }
  .check-btn.done { background: #9ca3af; }

  .learned-badge {
    position: absolute;
    top: .6rem; right: .6rem;
    font-size: .7rem;
    background: var(--accent);
    color: #fff;
    padding: .15rem .45rem;
    border-radius: 8px;
    font-weight: 700;
    display: none;
  }
  .card.learned .learned-badge { display: block; }
</style>
</head>
<body>

<header>
  <div class="badge">Capgemini Research Institute · 2026</div>
  <h1>What matters to today's consumer 2026</h1>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="pbar"></div></div>
    <div class="progress-label" id="plabel">0 / 35 learned</div>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-cat="all">ALL (35)</button>
  <button class="filter-btn" data-cat="phrasal">PHRASAL (6)</button>
  <button class="filter-btn" data-cat="idiom">IDIOM (6)</button>
  <button class="filter-btn" data-cat="colloc">COLLOC (7)</button>
  <button class="filter-btn" data-cat="vocab">고급단어 (10)</button>
  <button class="filter-btn" data-cat="biz">비즈니스 (6)</button>
</div>

<div id="grid"></div>

<script>
const STORAGE_KEY = 'what_matters_consumer_2026_learned';
const learned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

const cards = [
  // ── PHRASAL (6) ──
  {id:'pv1', cat:'phrasal', word:'trade down', pron:'', ko:'저렴한 대안으로 전환하다', nuance:'trade = 교환 + down = 낮은 등급으로 → 익숙하던 브랜드·품질을 포기하고 더 저렴한 선택으로 이동. "Consumers actively compare prices and trade down to private labels." 인플레이션 피로(inflation fatigue) 속 핵심 소비 행동. 반대: trade up.', diff:2},
  {id:'pv2', cat:'phrasal', word:'opt out', pron:'', ko:'(동의·구독 등을) 거부하다, 탈퇴하다', nuance:'opt = 선택하다 + out = 밖으로 → 기본 설정이나 프로그램에서 빠져나오는 것. "76% want the ability to set strict boundaries before a digital assistant acts — and the ability to opt out." 개인정보 보호와 AI 거버넌스에서 핵심 소비자 권리 표현.', diff:2},
  {id:'pv3', cat:'phrasal', word:'cash in on', pron:'', ko:'~을 기회로 이용해 이익을 얻다', nuance:'cash = 현금 + in on = ~에 참여 → 유리한 상황을 포착해 수익을 취하는 것. "Brands that cash in on indulgence trends position small pleasures as attainable self-care." 소비자 감정 트렌드를 비즈니스로 연결하는 전략적 표현.', diff:2},
  {id:'pv4', cat:'phrasal', word:'lock in', pron:'', ko:'(고객·가격을) 확보하다, 고정시키다', nuance:'lock = 잠그다 + in = 안으로 → 고객이 떠나기 어렵도록 묶어두는 것. "CPR organizations should treat assistants as a loyalty surface — lock in frequency and share of wallet." 구독·정기 주문 등으로 재구매를 자동화하는 전략.', diff:2},
  {id:'pv5', cat:'phrasal', word:'switch out', pron:'', ko:'(제품·브랜드를) 교체하다', nuance:'switch = 전환 + out = 밖으로 바꾸어 → 현재 쓰던 것을 다른 것으로 대체. "consumers are increasingly willing to switch out brands for fairer pricing." switch brands보다 구체적으로 제품 교체를 강조할 때 사용. 전환 행동(switching behavior)의 구어적 표현.', diff:1},
  {id:'pv6', cat:'phrasal', word:'act on', pron:'', ko:'~에 따라 행동하다, 실행에 옮기다', nuance:'act = 행동하다 + on = ~을 근거로 → 정보·신호를 받아 실제로 조치를 취하는 것. "Brands must act on consumer signals in real time." 단순 인식에서 그치지 않고 데이터·피드백을 실제 행동으로 연결하는 뉘앙스. 리테일 AI 맥락에서 자주 등장.', diff:1},

  // ── IDIOM (6) ──
  {id:'id1', cat:'idiom', word:'shrinkflation', pron:'[ʃrɪŋkˌfleɪʃən]', ko:'슈링크플레이션 (크기는 줄고 가격은 그대로)', nuance:'shrink(줄다) + inflation(물가상승)의 합성어. 제품 용량·크기를 슬그머니 줄이면서 가격은 유지해 실질적 가격 인상 효과를 내는 관행. 64%가 불공정 관행으로 인식. 66%는 가격을 투명하게 올리는 편이 낫다고 답했다. 보고서 핵심 키워드.', diff:2},
  {id:'id2', cat:'idiom', word:'deal hierarchy', pron:'', ko:'프로모션 선호 순위 체계', nuance:'deal = 할인 거래 + hierarchy = 위계질서 → 소비자가 어떤 프로모션 유형을 얼마나 선호하는지의 순위 구조. 1위: money-off(75%) → 2위: % off(74%) → 3위: BOGOF(73%) → 4위: 개인화 쿠폰(72%). 소비자가 단순하고 즉각적인 절약을 가장 선호함을 보여주는 개념.', diff:3},
  {id:'id3', cat:'idiom', word:'intentional indulgence', pron:'', ko:'의도적 자기 보상 (절약 속의 소소한 사치)', nuance:'intentional = 의도적인 + indulgence = 탐닉·자기 허용 → 절약을 유지하면서도 계획적으로 소소한 쾌락을 허용하는 행동. "54% making fewer impulse purchases — a modest rebound of intentional indulgence alongside persistent deal-seeking." 충동구매 감소와 함께 나타나는 새로운 소비 패턴.', diff:3},
  {id:'id4', cat:'idiom', word:'smart downshifting', pron:'', ko:'스마트 다운시프팅 (고급·저가 교차 쇼핑)', nuance:'downshift = 기어를 낮추다 → 전 카테고리를 절약하는 게 아니라 카테고리별로 의도적으로 수준을 낮추거나 유지하는 전략. "We are entering an era of smart downshifting, where shoppers mix high and low choices across categories." 하이브리드 소비 마인드셋의 핵심 표현.', diff:3},
  {id:'id5', cat:'idiom', word:'emotional buffer', pron:'', ko:'감정적 완충제 (소소한 소비로 재정 스트레스 해소)', nuance:'buffer = 완충기 → 큰 재정적 압박을 소소한 소비로 심리적으로 상쇄하는 기능. "Indulgence is the new emotional buffer — seven in ten shoppers say small treats help manage financial stress." 소비재·식음료 기업이 프리미엄 스낵, 음료 등을 이 감정적 기능을 중심으로 포지셔닝하는 배경.', diff:2},
  {id:'id6', cat:'idiom', word:'phygital parity', pron:'', ko:'피지털 동등성 (온·오프라인 경험의 일관성)', nuance:'physical + digital = phygital + parity = 동등성. 매장과 디지털 채널에서 가격·경험·서비스 수준이 일관되어야 함. "Phygital parity is achieved when technology seamlessly enhances human interaction." 52%가 더 나은 데이터 보호 정책을 위해 리테일러를 바꾸겠다고 응답한 배경이기도 함.', diff:3},

  // ── COLLOC (7) ──
  {id:'co1', cat:'colloc', word:'private label', pron:'', ko:'자체 브랜드, PB(Private Brand) 상품', nuance:'private = 사적인 + label = 상표 → 제조사 브랜드가 아닌 유통업체가 직접 브랜드를 붙인 상품. "Amazon unified grocery private labels under new brand with 1,000+ items under $5." 인플레 피로 속 44%(Oct 2025)가 구매 → 65%(2024)에서 하락. 성능 중요 카테고리에서는 77%가 PB 기피.', diff:1},
  {id:'co2', cat:'colloc', word:'anticipatory commerce', pron:'', ko:'예측형 커머스 (과거 행동 기반 자동 주문 제안)', nuance:'anticipatory = 예측하는 + commerce = 상거래 → AI가 과거 구매 패턴·맥락 신호를 분석해 자동 재주문·추천을 제공하는 쇼핑 모델. Amazon의 Subscribe & Save가 대표 사례. 성공 조건 두 가지: 정확성(accuracy)과 통제권(consumer control).', diff:3},
  {id:'co3', cat:'colloc', word:'social commerce', pron:'', ko:'소셜 커머스 (SNS 플랫폼 기반 직접 구매)', nuance:'social = 소셜 미디어 + commerce = 상거래 → Instagram·YouTube·TikTok 등 SNS에서 검색→발견→구매가 한 플랫폼 안에서 완결되는 형태. 35%(Oct 2025) 구매 경험. 인도 66%로 최고, 프랑스 11%로 최저. Instagram·YouTube가 가장 선호 플랫폼.', diff:1},
  {id:'co4', cat:'colloc', word:'hyper-personalization', pron:'', ko:'초개인화 (실시간 맥락 기반 1:1 맞춤화)', nuance:'hyper = 극도로 + personalization = 개인화 → 이름이나 지역 정도의 일반 개인화를 넘어, AI가 실시간 행동·위치·취향·상황에 따라 콘텐츠·추천·가격을 1:1로 맞추는 것. 63%가 원하지만 69%는 개인정보 오남용을 우려. Privacy paradox의 핵심.', diff:2},
  {id:'co5', cat:'colloc', word:'dynamic pricing', pron:'', ko:'동적 가격 책정 (수요·시간에 따른 실시간 가격 변동)', nuance:'dynamic = 변화하는 + pricing = 가격 설정 → 수요, 시간대, 경쟁사 가격, 재고 상황 등에 따라 실시간으로 가격이 달라지는 방식. 33%만 공정하다고 인식 (vs. 45%가 불공정). Zara·Coca-Cola가 AI 기반 dynamic pricing 적용 중.', diff:2},
  {id:'co6', cat:'colloc', word:'synthetic influencer', pron:'', ko:'합성(가상) 인플루언서 (AI 생성 가상 인물)', nuance:'synthetic = 합성의 + influencer = 인플루언서 → AI로 생성된 가상의 인물이 SNS에서 제품을 홍보하는 것. 66%가 존재를 인지하지만 52%는 신뢰하지 않음. 67%는 브랜드가 AI 생성 광고임을 명시해야 한다고 응답. EU AI Act·중국 2025법이 공시 의무화.', diff:2},
  {id:'co7', cat:'colloc', word:'consumer-grade AI', pron:'', ko:'소비자용 AI (일상 쇼핑에 직접 맞닿은 AI)', nuance:'consumer-grade = 소비자 수준의 + AI → 연구·기업용이 아닌 일반 소비자가 쇼핑 중 직접 경험하는 AI. 챗봇·가상 어시스턴트·AI 추천 엔진 등. "Consumer-grade AI significantly transforms the shopper journey from discovery to post-sale engagement." Amazon Rufus가 250M+ 고객에게 서비스.', diff:2},

  // ── VOCAB (10) ──
  {id:'v1', cat:'vocab', word:'discerning', pron:'[dɪˈsɜːrnɪŋ]', ko:'안목 있는, 까다로운', nuance:'discern(식별하다, 분간하다)의 현재분사. 품질·가치를 세밀하게 구별하는 능력을 가진. "Customers have money to spend, but they are more discerning." — Jason Coan, Reliance Trends. 단순 가격 민감도가 아닌 품질·공정성을 함께 따지는 현대 소비자를 묘사하는 핵심 형용사.', diff:2},
  {id:'v2', cat:'vocab', word:'frugality', pron:'[fruːˈɡæləti]', ko:'검소함, 절약 정신', nuance:'라틴어 frugalitas(검소함)에서 유래. 불필요한 지출을 삼가는 태도. "Indulgence is no longer at odds with frugality — it has become an essential emotional release within financially disciplined lifestyles." 절약과 자기 보상이 공존하는 현대 소비자의 이중성을 포착하는 단어.', diff:2},
  {id:'v3', cat:'vocab', word:'efficacy', pron:'[ˈefɪkəsi]', ko:'효능, 효과', nuance:'라틴어 efficax(효과적인)에서 유래. 실제로 원하는 결과를 낼 수 있는 능력. "Affordability cannot come at the expense of efficacy." — Edwin Taborda, L\'Oreal. 저렴한 대안이라도 기능(efficacy)을 희생해서는 안 된다는 소비자 요구. effectiveness보다 기술적·의학적 뉘앙스가 강함.', diff:2},
  {id:'v4', cat:'vocab', word:'scrutinize', pron:'[ˈskruːtɪnaɪz]', ko:'면밀히 조사하다, 꼼꼼히 살피다', nuance:'라틴어 scrutari(쓰레기를 뒤지다, 면밀히 검색하다)에서 유래. 단순 확인이 아닌 비판적·세밀한 검토. "Consumers are paying attention to the origin and qualities of ingredients — they actively compare products and scrutinize ingredient lists." 성분·출처·윤리성까지 따지는 현대 소비자 행동.', diff:2},

function renderCards(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? cards : cards.filter(c => c.cat === filter);
  filtered.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    const isLearned = learned.has(c.id);
    wrap.innerHTML = `
      <div class="card${isLearned ? ' learned' : ''}" id="card-${c.id}">
        <div class="card-face front">
          <span class="tag tag-${c.cat}">${c.cat.toUpperCase()}</span>
          <div class="word">${c.word}</div>
          ${c.pron ? `<div class="pron">${c.pron}</div>` : ''}
          <div class="dots">
            <div class="dot${c.diff>=1?' on':''}"></div>
            <div class="dot${c.diff>=2?' on':''}"></div>
            <div class="dot${c.diff>=3?' on':''}"></div>
          </div>
          <div class="learned-badge">✓ learned</div>
        </div>
        <div class="card-face back">
          <div>
            <div class="ko">${c.ko}</div>
            <div class="nuance">${c.nuance}</div>
          </div>
          <button class="check-btn${isLearned ? ' done' : ''}" data-id="${c.id}">
            ${isLearned ? '✓ learned' : 'Mark as learned'}
          </button>
        </div>
      </div>`;
    wrap.querySelector('.card').addEventListener('click', e => {
      if (e.target.classList.contains('check-btn')) return;
      e.currentTarget.classList.toggle('flipped');
    });
    wrap.querySelector('.check-btn').addEventListener('click', e => {
      e.stopPropagation();
      const id = e.target.dataset.id;
      if (learned.has(id)) { learned.delete(id); } else { learned.add(id); }
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
      renderCards(filter);
      updateProgress();
    });
    grid.appendChild(wrap);
  });
}

function updateProgress() {
  const total = 35;
  const count = learned.size;
  const pct = Math.round(count / total * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = `${count} / ${total} learned`;
}

let currentFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.cat;
    renderCards(currentFilter);
  });
});

renderCards('all');
updateProgress();
</script>
