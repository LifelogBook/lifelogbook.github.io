<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary — How the Best CEOs Are Meeting the AI Moment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0c1a2e;
    --ink2: #1e3a5f;
    --accent: #b8860b;
    --accent2: #8b6700;
    --sky: #fef9e7;
    --bg: #fffef8;
    --border: #f0d988;
    --card-bg: #ffffff;
    --card-back: #0c1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0c1a2e 0%, #1e3a5f 50%, #8b6700 100%);
    color: #fff;
    padding: 28px 24px 22px;
    text-align: center;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.1rem, 3.5vw, 1.45rem);
    letter-spacing: .01em;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .badge {
    display: inline-block;
    border: 1.5px solid #f0d988;
    color: #f0d988;
    border-radius: 20px;
    padding: 3px 14px;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .controls { padding: 16px 16px 0; max-width: 900px; margin: 0 auto; }

  .progress-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #fbbf24); transition: width .4s; }
  .progress-label { font-size: .78rem; color: var(--ink2); text-align: right; margin-bottom: 12px; font-weight: 500; }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--ink2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: .04em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    padding: 0 16px 32px;
    max-width: 900px;
    margin: 0 auto;
  }

  .card-wrap { perspective: 900px; }
  .card {
    position: relative;
    width: 100%;
    padding-top: 100%;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
  }
  .card-front { background: var(--card-bg); border: 1.5px solid var(--border); }
  .card-back { background: var(--card-back); border: 1.5px solid #1e3a5f; transform: rotateY(180deg); color: #fef9e7; }
  .card-wrap.learned .card-front {
    background: linear-gradient(135deg, #fffef8 0%, #fef9e7 100%);
    border-color: var(--accent);
    opacity: .75;
  }

  .tag {
    font-size: .62rem; font-weight: 700; letter-spacing: .09em;
    text-transform: uppercase; border-radius: 10px;
    padding: 2px 9px; margin-bottom: 10px; color: #fff;
  }
  .tag-phrasal  { background: #b8860b; }
  .tag-idiom    { background: #8b0000; }
  .tag-colloc   { background: #1d4ed8; }
  .tag-vocab    { background: #7c3aed; }
  .tag-biz      { background: #065f46; }

  .word { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--ink); margin-bottom: 6px; line-height: 1.25; }
  .pron { font-size: .72rem; color: #6b8ab0; margin-bottom: 4px; }
  .dots { display: flex; gap: 4px; margin-top: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .dot.on { background: var(--accent); }

  .back-ko { font-size: .9rem; font-weight: 600; color: #fef9e7; margin-bottom: 8px; line-height: 1.4; }
  .back-nuance { font-size: .71rem; color: #f0d988; line-height: 1.5; }
  .back-example { font-size: .67rem; color: #fbbf24; margin-top: 6px; font-style: italic; line-height: 1.4; }

  .learned-check {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: .7rem; color: transparent;
    transition: all .2s; z-index: 10;
  }
  .card-wrap.learned .learned-check { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>
</head>
<body>

<header>
  <h1>How the Best CEOs Are Meeting the AI Moment</h1>
  <div class="badge">McKinsey &amp; Company · January 2026</div>
</header>

<div class="controls">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="bar" style="width:0%"></div></div>
  <div class="progress-label"><span id="learned-count">0</span> / 35 learned</div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">ALL (35)</button>
    <button class="filter-btn" data-filter="phrasal">PHRASAL (6)</button>
    <button class="filter-btn" data-filter="idiom">IDIOM (6)</button>
    <button class="filter-btn" data-filter="colloc">COLLOC (7)</button>
    <button class="filter-btn" data-filter="vocab">고급단어 (10)</button>
    <button class="filter-btn" data-filter="biz">비즈니스 (6)</button>
  </div>
</div>

<div id="grid"></div>

<script>

// ── render & logic ──
const learnedSet = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let activeFilter = 'all';

function dots(n){ return [1,2,3].map(i=>`<span class="dot${i<=n?' on':''}"></span>`).join(''); }

function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const visible = activeFilter === 'all' ? cards : cards.filter(c => c.cat === activeFilter);
  visible.forEach(c => {
    const learned = learnedSet.has(c.id);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (learned ? ' learned' : '');
    wrap.dataset.id = c.id;
    wrap.innerHTML = `
      <div class="card">
        <div class="card-face card-front">
          <button class="learned-check" title="학습 완료">✓</button>
          <span class="tag tag-${c.cat}">${{phrasal:'Phrasal',idiom:'Idiom',colloc:'Colloc',vocab:'Vocab',biz:'Biz'}[c.cat]}</span>
          <div class="word">${c.word}</div>
          ${c.pron ? `<div class="pron">${c.pron}</div>` : ''}
          <div class="dots">${dots(c.diff)}</div>
        </div>
        <div class="card-face card-back">
          <div class="back-ko">${c.ko}</div>
          <div class="back-nuance">${c.nuance}</div>
          ${c.example ? `<div class="back-example">${c.example}</div>` : ''}
        </div>
      </div>`;
    wrap.querySelector('.card').addEventListener('click', e => {
      if(e.target.closest('.learned-check')) return;
      wrap.querySelector('.card').classList.toggle('flipped');
    });
    wrap.querySelector('.learned-check').addEventListener('click', e => {
      e.stopPropagation();
      if(learnedSet.has(c.id)) learnedSet.delete(c.id);
      else learnedSet.add(c.id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...learnedSet]));
      render(); updateProgress();
    });
    grid.appendChild(wrap);
  });
}

function updateProgress(){
  const n = learnedSet.size;
  document.getElementById('learned-count').textContent = n;
  document.getElementById('bar').style.width = (n/35*100) + '%';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render(); updateProgress();
</script>
