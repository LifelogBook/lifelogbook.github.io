<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vocabulary – Consumer Trends 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a2463;--ink2:#1b5e96;
  --accent:#00c8e0;--accent2:#009ab0;
  --sky:#f0fbff;--bg:#f5fdff;--border:#7fdbe8;
  --r:14px;--shadow:0 4px 24px rgba(10,36,99,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:linear-gradient(135deg,#0a2463 0%,#1b5e96 50%,#00c8e0 100%);color:#fff;padding:2.2rem 1.5rem 1.8rem;text-align:center}
header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.5rem,4vw,2.4rem);margin-bottom:.4rem}
header p{font-size:.92rem;opacity:.85}
.badge{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:.25rem .9rem;font-size:.78rem;margin-bottom:.7rem;letter-spacing:.04em}
.controls{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;padding:1.2rem 1rem .6rem;max-width:860px;margin:0 auto}
.controls button{border:2px solid var(--border);background:#fff;color:var(--ink2);border-radius:30px;padding:.38rem .95rem;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .18s}
.controls button.active,.controls button:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.stats{text-align:center;font-size:.8rem;color:var(--ink2);padding:.2rem 0 .8rem;opacity:.75}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.1rem;padding:0 1rem 2rem;max-width:1100px;margin:0 auto}
.card{perspective:900px;cursor:pointer;height:210px}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--r);padding:1.1rem 1.15rem;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}
.front{background:#fff;border:2px solid var(--border)}
.back{background:var(--sky);border:2px solid var(--accent);transform:rotateY(180deg)}
.tag{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.18rem .55rem;border-radius:10px;color:#fff;width:fit-content}
.tag-phrasal{background:#00c8e0}
.tag-idiom{background:#7c3aed}
.tag-colloc{background:#1b5e96}
.tag-vocab{background:#f59e0b}
.tag-biz{background:#dc2626}
.word{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--ink);line-height:1.2;margin:.35rem 0 .1rem}
.pron{font-size:.78rem;color:var(--ink2);font-style:italic;margin-bottom:.2rem}
.ko{font-size:.88rem;color:var(--ink2);font-weight:500}
.diff{display:flex;gap:3px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--accent)}
.back .word{font-size:1.1rem;color:var(--ink)}
.nuance{font-size:.82rem;color:#374151;line-height:1.55;flex:1;margin:.35rem 0 .2rem;overflow:hidden}
.learned-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.35rem .8rem;font-size:.75rem;font-weight:700;cursor:pointer;align-self:flex-end;transition:background .2s}
.learned-btn.done{background:#10b981}
.card.learned .front{border-color:#10b981;background:#f0fff8}
</style>
</head>
<body>
<header>
  <div class="badge">Capgemini Research Institute · 2026</div>
  <h1>Consumer Trends 2026</h1>
  <p>What matters to today's consumer — AI, Value &amp; Loyalty</p>
</header>
<div class="controls">
  <button class="active" onclick="filter('all',this)">All (35)</button>
  <button onclick="filter('phrasal',this)">Phrasal (6)</button>
  <button onclick="filter('idiom',this)">Idiom (6)</button>
  <button onclick="filter('colloc',this)">Colloc (7)</button>
  <button onclick="filter('vocab',this)">Vocab (10)</button>
  <button onclick="filter('biz',this)">Biz (6)</button>
</div>
<div class="stats" id="stats"></div>
<div id="grid"></div>
<script>

  {id:'pv2',type:'phrasal',word:'trade up',ko:'프리미엄으로 전환하다, 업그레이드하다',pron:'',nuance:'"willing to trade up for trusted brands" — trade down의 반대. 신뢰·품질을 위해 더 비싼 것을 의도적으로 선택. "trade up to quality" 형태로 자주 쓰임',diff:2},
  {id:'pv3',type:'phrasal',word:'opt for',ko:'~을 선택하다, ~을 택하다',pron:'',nuance:'"consumers opt for cheaper alternatives" — 라틴어 optare(선택하다). 여러 옵션 중 의도적으로 하나를 고르는 것. choose보다 격식적이고 deliberate한 뉘앙스',diff:1},
  {id:'pv4',type:'phrasal',word:'switch to',ko:'~으로 전환하다, 갈아타다',pron:'',nuance:'"74% would switch to a competitor offering lower prices" — 기존 브랜드를 완전히 떠나 경쟁사로 이동하는 결정적 행동. switch brands도 동일 의미',diff:1},
  {id:'pv5',type:'phrasal',word:'tap into',ko:'(기회·감정을) 활용하다, 접근하다',pron:'',nuance:'"brands tap into the desire for indulgence" — 수도꼭지(tap)를 열어 이미 흐르는 물에 접근하는 이미지. 잠재된 욕구나 미개척 시장에 처음 접근할 때 사용',diff:2},
  {id:'pv6',type:'phrasal',word:'pull back from',ko:'~에서 물러나다, 지출을 줄이다',pron:'',nuance:'"consumers pull back from non-essentials" — 앞으로 나아가던 것이 뒤로 당겨지는 이미지. cut back on과 유사하지만 심리적 거리감·소극적 후퇴를 더 강조',diff:2},
  {id:'id1',type:'idiom',word:'inflation fatigue',ko:'인플레이션 피로감',pron:'',nuance:'지속적인 물가 상승으로 소비자가 심리·경제적으로 지쳐가는 현상. "inflation fatigue is driving a behavioral shift" — fatigue가 붙으면 만성적 누적 피로 상태. compassion fatigue, pandemic fatigue도 동일 구조',diff:2},
  {id:'id2',type:'idiom',word:'guilt-free joy',ko:'죄책감 없는 즐거움, 떳떳한 소소한 사치',pron:'',nuance:'"retailers respond to the desire for guilt-free joy" — 절약하면서도 소소한 소비를 정당화하는 심리. guilt-free는 소비자에게 허락(permission)의 감각을 부여하는 마케팅 언어',diff:2},
  {id:'id3',type:'idiom',word:'smart downshifting',ko:'스마트 다운시프팅, 전략적 소비 낮추기',pron:'',nuance:'"we are entering an era of smart downshifting" — downshift=기어를 낮추다. 무조건 절약이 아니라 카테고리별로 전략적으로 지출 수준을 낮추는 것. 하이·로우 믹싱이 핵심',diff:3},
  {id:'id4',type:'idiom',word:'human off-ramp',ko:'사람 연결 탈출구, 상담원 전환 경로',pron:'',nuance:'"chatbots should include a human off-ramp" — off-ramp는 고속도로 출구. AI·챗봇 흐름에서 실제 상담원으로 전환되는 경로. 자동화가 막힐 때 소비자가 빠져나갈 수 있는 안전 출구',diff:3},
  {id:'id5',type:'idiom',word:'phygital parity',ko:'피지털 동등성, 온·오프라인 경험 균형',pron:'',nuance:'"phygital parity is achieved when technology seamlessly enhances human interaction" — phygital=physical+digital 합성어. 디지털 편의와 오프라인 감성이 균등하게 조화를 이루는 이상적 쇼핑 환경',diff:3},

  {id:'co2',type:'colloc',word:'private label',ko:'PB상품, 자체 브랜드',pron:'',nuance:'유통업체가 직접 기획·판매하는 자체 브랜드. "preference for private labels dropped 21pp from 65% to 44%" — 가격 안정 후 품질 우려로 선호 급감. 전자·베이비 카테고리에서 특히 기피',diff:1},
  {id:'co3',type:'colloc',word:'deal hierarchy',ko:'프로모션 위계, 할인 선호 순위',pron:'',nuance:'소비자가 가장 효과적이라 느끼는 판촉 유형의 우선순위. "deal hierarchy is well defined: money-off(75%) > %off(74%) > BOGOF(73%)" — 직관적·단순할수록 순위 높음',diff:2},

  {id:'co5',type:'colloc',word:'clean label',ko:'클린 라벨',pron:'',nuance:'인공 첨가물·방부제·합성 성분이 없음을 강조하는 식품 라벨링 전략. "clean label ingredients matter to two-thirds of shoppers" — 성분표 직접 확인 트렌드와 연결. The Whole Truth Foods 대표 사례',diff:2},

  {id:'b6',type:'biz',word:'FMCG',ko:'일상 소비재 (Fast-Moving Consumer Goods)',pron:'',nuance:'저가·고빈도로 소비되는 식품·음료·생활용품·화장품. "pricing challenges for FMCG" — 마진 압박이 크고 가격 경쟁이 치열한 카테고리. 미국에서는 CPG(Consumer Packaged Goods)와 혼용',diff:2}

let current='all';
function filter(type,btn){
  current=type;
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function render(){
  const list=current==='all'?cards:cards.filter(c=>c.type===current);
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  list.forEach(c=>{
    const div=document.createElement('div');
    div.className='card'+(learned.has(c.id)?' learned':'');
    div.dataset.id=c.id;
    const dots=[1,2,3].map(i=>`<span class="dot${i<=c.diff?' on':''}"></span>`).join('');
    div.innerHTML=`
      <div class="card-inner">
        <div class="front">
          <div>
            <span class="tag tag-${c.type}">${c.type}</span>
            <div class="word">${c.word}</div>
            ${c.pron?`<div class="pron">${c.pron}</div>`:''}
            <div class="ko">${c.ko}</div>
          </div>
          <div class="diff">${dots}</div>
        </div>
        <div class="back">
          <div>
            <span class="tag tag-${c.type}">${c.type}</span>
            <div class="word">${c.word}</div>
            <div class="nuance">${c.nuance}</div>
          </div>
          <button class="learned-btn${learned.has(c.id)?' done':''}" onclick="markLearned('${c.id}',event)">${learned.has(c.id)?'✓ 학습완료':'학습완료'}</button>
        </div>
      </div>`;
    div.addEventListener('click',()=>div.classList.toggle('flipped'));
    grid.appendChild(div);
  });
  updateStats();
}
function markLearned(id,e){
  e.stopPropagation();
  learned.has(id)?learned.delete(id):learned.add(id);
  localStorage.setItem(STORE_KEY,JSON.stringify([...learned]));
  render();
}
function updateStats(){
  const list=current==='all'?cards:cards.filter(c=>c.type===current);
  const done=list.filter(c=>learned.has(c.id)).length;
  document.getElementById('stats').textContent=`${done} / ${list.length} 학습완료`;
}
render();
</script>
</body>
</html>
