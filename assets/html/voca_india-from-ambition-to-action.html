<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India: From Ambition to Action — 어휘 카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink2: #16213e;
    --accent: #d97706;
    --accent2: #b45309;
    --sky: #fef3c7;
    --bg: #fffbeb;
    --border: #fde68a;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(26,26,46,0.13);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #92400e 100%);
    color: #fff;
    padding: 28px 24px 22px;
    text-align: center;
  }
  header .badge {
    display: inline-block;
    background: rgba(254,243,199,0.18);
    border: 1px solid rgba(254,243,199,0.35);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
    color: var(--sky);
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  header p { font-size: 0.82rem; opacity: 0.75; }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 16px 0;
    justify-content: center;
  }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--ink2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .progress-bar-wrap {
    margin: 14px 16px 0;
    background: var(--border);
    border-radius: 8px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 8px;
    transition: width 0.4s;
  }
  .progress-label {
    text-align: center;
    font-size: 0.75rem;
    color: var(--accent);
    margin: 6px 0 0;
    font-weight: 600;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 16px;
  }
  .card-wrap { perspective: 900px; }
  .card {
    position: relative;
    width: 100%;
    height: 200px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.48s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card-front {
    background: #fff;
    border: 1.5px solid var(--border);
  }
  .card-back {
    background: var(--ink);
    color: #fff;
    transform: rotateY(180deg);
  }
  .card.learned .card-front {
    background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
    border-color: var(--accent);
  }
  .card-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 10px;
    padding: 2px 9px;
    margin-bottom: 10px;
    width: fit-content;
  }
  .tag-phrasal { background: #fef3c7; color: #d97706; }
  .tag-idiom   { background: #ffedd5; color: #92400e; }
  .tag-colloc  { background: #dbeafe; color: #1d4ed8; }
  .tag-vocab   { background: #ede9fe; color: #7c3aed; }
  .tag-biz     { background: #d1fae5; color: #065f46; }
  .card-word {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .card-pron { font-size: 0.78rem; color: #64748b; margin-bottom: 6px; }
  .card-hint { font-size: 0.8rem; color: #94a3b8; font-style: italic; }
  .card-back .def-ko {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--sky);
  }
  .card-back .def-en { font-size: 0.82rem; opacity: 0.82; line-height: 1.5; }
  .card-back .example {
    margin-top: 10px;
    font-size: 0.76rem;
    opacity: 0.65;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 8px;
    font-style: italic;
    line-height: 1.5;
  }
  .learned-badge {
    position: absolute;
    top: 10px; right: 12px;
    font-size: 1.1rem;
    display: none;
  }
  .card.learned .learned-badge { display: block; }
  .diff-dots {
    position: absolute;
    bottom: 12px; right: 14px;
    display: flex; gap: 3px;
  }
  .diff-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
  }
  .diff-dot.on { background: var(--accent); }
  .learn-btn {
    position: absolute;
    bottom: 10px; left: 14px;
    background: none;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 11px;
    font-size: 0.7rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
  }
  .learn-btn:hover { background: var(--accent); color: #fff; }
  .card.learned .learn-btn {
    background: var(--accent);
    color: #fff;
  }
  .hidden { display: none !important; }
</style>
</head>

<div class="controls">

function dots(n) {
  return [1,2,3].map(i => `<span class="diff-dot${i<=n?' on':''}"></span>`).join('');
}

function render(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach(c => {
    const hide = filter !== 'all' && c.type !== filter;
    const isLearned = learned.has(c.id);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (hide ? ' hidden' : '');
    wrap.innerHTML = `
      <div class="card${isLearned?' learned':''}" id="card-${c.id}" onclick="flip('${c.id}',event)">
        <div class="card-face card-front">
          <span class="card-tag tag-${c.type}">${tagLabel(c.type)}</span>
          <div class="card-word">${c.word}</div>
          ${c.pron ? `<div class="card-pron">${c.pron}</div>` : ''}
          <div class="card-hint">${c.hint}</div>
          <span class="learned-badge">✓</span>
          <div class="diff-dots">${dots(c.diff)}</div>
          <button class="learn-btn" onclick="toggleLearn('${c.id}',event)">${isLearned?'학습 완료':'학습하기'}</button>
        </div>
        <div class="card-face card-back">
          <div class="def-ko">${c.ko}</div>
          <div class="def-en">${c.en}</div>
          ${c.ex ? `<div class="example">${c.ex}</div>` : ''}
        </div>
      </div>`;
    grid.appendChild(wrap);
  });
  updateProgress();
}

function tagLabel(t) {
  return {phrasal:'Phrasal Verb',idiom:'Idiom',colloc:'Collocation',vocab:'고급단어',biz:'비즈니스'}[t]||t;
}

function flip(id, e) {
  if (e.target.classList.contains('learn-btn')) return;
  document.getElementById('card-'+id).classList.toggle('flipped');
}

function toggleLearn(id, e) {
  e.stopPropagation();
  const card = document.getElementById('card-'+id);
  const btn = card.querySelector('.learn-btn');
  if (learned.has(id)) {
    learned.delete(id);
    card.classList.remove('learned');
    btn.textContent = '학습하기';
  } else {
    learned.add(id);
    card.classList.add('learned');
    btn.textContent = '학습 완료';
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
  updateProgress();
}

function updateProgress() {
  const total = cards.length;
  const done = learned.size;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = `${done} / ${total} 학습 완료`;
}

let current = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    current = btn.dataset.filter;
    render(current);
  });
});

render('all');
</script>
</body>
</html>
