<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superagency in the Workplace — 어휘 카드</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1e0a3c;
    --ink2: #2d1057;
    --accent: #9333ea;
    --accent2: #a855f7;
    --sky: #d8b4fe;
    --bg: #faf5ff;
    --border: #e9d5ff;
    --card-bg: #ffffff;
    --shadow: rgba(147, 51, 234, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  .hero {
    background: linear-gradient(135deg, #1e0a3c 0%, #3b0764 45%, #6b21a8 100%);
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
    color: #fff;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #e9d5ff;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.3rem 0.9rem;
    border-radius: 20px;
    margin-bottom: 1rem;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    line-height: 1.25;
    margin-bottom: 0.5rem;
    color: #fff;
  }
  .hero-sub {
    font-size: 0.9rem;
    color: #d8b4fe;
    margin-bottom: 1.5rem;
  }
  .progress-wrap { max-width: 500px; margin: 0 auto; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: #d8b4fe;
    margin-bottom: 0.4rem;
  }
  .progress-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #a855f7, #d8b4fe);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    padding: 1.5rem 1rem 0.5rem;
    max-width: 900px;
    margin: 0 auto;
  }
  .filter-btn {
    padding: 0.4rem 1rem;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: #fff;
    color: var(--ink);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
    padding: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card-wrap {
    perspective: 1000px;
    height: 210px;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
    cursor: pointer;
  }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    padding: 1.1rem 1.2rem;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid var(--border);
  }
  .card-front {
    background: var(--card-bg);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card-back {
    background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow-y: auto;
  }
  .card-wrap.learned .card-front {
    background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .tag {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #fff;
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
    white-space: nowrap;
  }
  .tag-phrasal { background: #7c3aed; }
  .tag-idiom   { background: #5b21b6; }
  .tag-colloc  { background: #1e40af; }
  .tag-vocab   { background: #0e7490; }
  .tag-biz     { background: #065f46; }

  .dots { display: flex; gap: 3px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .dot.filled { background: var(--accent); }

  .card-word {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    color: var(--ink);
    line-height: 1.2;
    margin: 0.4rem 0 0.1rem;
  }
  .card-pron { font-size: 0.78rem; color: #9ca3af; font-style: italic; }
  .card-kr-hint { font-size: 0.8rem; color: #6b7280; }
  .card-hint { font-size: 0.72rem; color: #9333ea; text-align: right; opacity: 0.7; }

  .back-def {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 0.4rem;
    flex: 1;
  }
  .back-ex {
    font-size: 0.75rem;
    font-style: italic;
    color: #6d28d9;
    border-left: 2px solid var(--accent);
    padding-left: 0.6rem;
    margin-bottom: 0.3rem;
    line-height: 1.4;
  }
  .back-kr { font-size: 0.72rem; color: #6b7280; line-height: 1.4; }
  .back-actions { display: flex; justify-content: flex-end; margin-top: 0.5rem; }
  .btn-learned {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--accent);
    background: none;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: 0.25rem 0.7rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-learned:hover { background: var(--accent); color: #fff; }
  .card-wrap.learned .btn-learned { background: var(--accent); color: #fff; }

  .footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 0.75rem;
    color: #9ca3af;
  }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>

<div class="hero">
  <div class="hero-badge">McKinsey Global Institute · January 2025</div>
  <h1>Superagency in the Workplace</h1>

<div class="grid" id="grid"></div>

function getDots(diff) {
  let h = '<div class="dots">';
  for (let i = 1; i <= 3; i++) h += `<div class="dot${i <= diff ? ' filled' : ''}"></div>`;
  return h + '</div>';
}
const TAG_CLS   = {phrasal:'tag-phrasal', idiom:'tag-idiom', colloc:'tag-colloc', vocab:'tag-vocab', biz:'tag-biz'};
const TAG_LABEL = {phrasal:'Phrasal Verb', idiom:'Idiom·비유', colloc:'Collocation', vocab:'고급단어', biz:'비즈니스'};

function updateProgress() {
  const done = learned.size, total = cards.length;
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(done/total)*100}%`;
}

function renderCards(filter='all') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const list = filter === 'all' ? cards : cards.filter(c => c.cat === filter);
  list.forEach(card => {
    const isLearned = learned.has(card.id);
    const wrap = document.createElement('div');
    wrap.className = `card-wrap${isLearned ? ' learned flipped' : ''}`;
    wrap.dataset.id = card.id;
    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-front">
          <div class="card-top">
            <span class="tag ${TAG_CLS[card.cat]}">${TAG_LABEL[card.cat]}</span>
            ${getDots(card.diff)}
          </div>
          <div>
            <div class="card-word">${card.word}</div>
            ${card.pron ? `<div class="card-pron">${card.pron}</div>` : ''}
            <div class="card-kr-hint">${card.krHint}</div>
          </div>
          <div class="card-hint">탭하여 뒤집기 →</div>
        </div>
        <div class="card-back">
          <div class="back-def">${card.def}</div>
          <div class="back-ex">${card.ex}</div>
          <div class="back-kr">${card.kr}</div>
          <div class="back-actions">
            <button class="btn-learned" data-id="${card.id}">${isLearned ? '✓ 학습완료' : '학습완료'}</button>
          </div>
        </div>
      </div>`;
    wrap.addEventListener('click', function(e) {
      if (!e.target.classList.contains('btn-learned')) this.classList.toggle('flipped');
    });
    wrap.querySelector('.btn-learned').addEventListener('click', function(e) {
      e.stopPropagation();
      const id = this.dataset.id;
      if (learned.has(id)) {
        learned.delete(id);
        wrap.classList.remove('learned');
        this.textContent = '학습완료';
      } else {
        learned.add(id);
        wrap.classList.add('learned');
        this.textContent = '✓ 학습완료';
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
      updateProgress();
    });
    grid.appendChild(wrap);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderCards(this.dataset.filter);
  });
});
renderCards();
updateProgress();
</script>
