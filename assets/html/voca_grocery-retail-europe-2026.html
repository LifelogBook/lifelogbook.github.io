<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocab: The State of Grocery Retail Europe 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#071a0c;
  --surface:#0f2a18;
  --border:#1a3d23;
  --accent:#34d399;
  --accent2:#10b981;
  --text:#e2e8f0;
  --muted:#64748b;
  --front:#0f2a18;
  --back:#081a0f;
  --tag-ph:#7c3aed;
  --tag-id:#b45309;
  --tag-co:#166534;
  --tag-vo:#0e7490;
  --tag-bz:#9f1239;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:24px 16px 60px;}
h1{font-family:'DM Serif Display',serif;font-size:clamp(1.4rem,3vw,2rem);text-align:center;margin-bottom:4px;color:#f1f5f9;}
.badge{text-align:center;font-size:.72rem;color:var(--muted);margin-bottom:18px;letter-spacing:.04em;}
/* filters */
.filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:22px;}
.fbtn{border:1px solid var(--border);background:transparent;color:var(--muted);padding:5px 14px;border-radius:20px;cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;transition:all .2s;}
.fbtn.active,.fbtn:hover{color:#fff;border-color:var(--accent);background:rgba(52,211,153,.15);}
/* stats */
.stats{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:20px;}
.stats span{color:var(--accent);font-weight:600;}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-width:1100px;margin:0 auto;}
/* card */
.card-wrap{perspective:900px;height:230px;cursor:pointer;}
.card-wrap.hidden{display:none;}
.card-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.card-wrap.flipped .card-inner{transform:rotateY(180deg);}
.front,.back{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;-webkit-backface-visibility:hidden;padding:18px 20px;display:flex;flex-direction:column;gap:8px;}
.front{background:var(--front);border:1px solid var(--border);}
.back{background:var(--back);border:1px solid var(--border);transform:rotateY(180deg);overflow-y:auto;gap:6px;}
/* front content */
.tag{display:inline-block;font-size:.65rem;font-weight:600;letter-spacing:.07em;padding:2px 9px;border-radius:10px;width:fit-content;}
.tag-PHRASAL{background:rgba(124,58,237,.2);color:#c4b5fd;}
.tag-IDIOM{background:rgba(180,83,9,.2);color:#fcd34d;}
.tag-COLLOC{background:rgba(22,101,52,.2);color:#86efac;}
.tag-VOCAB{background:rgba(14,116,144,.2);color:#67e8f9;}
.tag-BIZ{background:rgba(159,18,57,.2);color:#fda4af;}
.word{font-family:'DM Serif Display',serif;font-size:1.45rem;color:#f8fafc;line-height:1.2;}
.pron{font-size:.78rem;color:var(--muted);font-style:italic;}
.ko{font-size:.88rem;color:#cbd5e1;line-height:1.5;}
.diff-row{display:flex;align-items:center;gap:4px;margin-top:auto;}
.dot{width:8px;height:8px;border-radius:50%;}
.dot.on{background:var(--accent);}
.dot.off{background:var(--border);}
.flip-hint{font-size:.65rem;color:var(--muted);margin-left:auto;}
/* back content */
.nuance{font-size:.78rem;color:#cbd5e1;line-height:1.65;}
.ex-label{font-size:.65rem;font-weight:600;letter-spacing:.06em;color:var(--accent);margin-top:4px;}
.ex{font-size:.77rem;color:#94a3b8;line-height:1.6;font-style:italic;}
/* learned btn */
.learned-btn{margin-top:auto;align-self:flex-end;border:none;border-radius:8px;padding:4px 12px;font-size:.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.learned-btn.done{background:rgba(52,211,153,.2);color:var(--accent);}
.learned-btn.undone{background:rgba(255,255,255,.06);color:var(--muted);}
/* progress bar */
.prog-wrap{max-width:420px;margin:0 auto 20px;display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s;}
.prog-text{font-size:.72rem;color:var(--muted);white-space:nowrap;}
</style>
</head>
<body>

<h1>The State of Grocery Retail Europe 2026</h1>
<div class="badge">McKinsey &amp; Company · EuroCommerce · Europanel · April 2026</div>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-text" id="progText">0 / 35 학습</div>
</div>

<div class="filters">
  <button class="fbtn active" data-f="ALL">ALL</button>
  <button class="fbtn" data-f="PHRASAL">PHRASAL</button>
  <button class="fbtn" data-f="IDIOM">IDIOM</button>
  <button class="fbtn" data-f="COLLOC">COLLOC</button>
  <button class="fbtn" data-f="VOCAB">VOCAB</button>
  <button class="fbtn" data-f="BIZ">BIZ</button>
</div>
<div class="stats">총 <span id="visCount">35</span>개 표시 중</div>

<div class="grid" id="grid"></div>

<script>
const STORE='grocery_retail_europe_learned';
let learned=new Set(JSON.parse(localStorage.getItem(STORE)||'[]'));

const cards=[
  /* ── PHRASAL ── */
  {id:'ph1',type:'PHRASAL',word:'eat into',pron:'[iːt ˈɪntə]',ko:'~을 잠식하다, 갉아먹다; (비용·경쟁이) 이익이나 점유율을 서서히 감소시키다',nuance:'Old English etan(먹다) + 방향 전치사 into. 침식의 생생한 생물학적 은유—산이 금속을 녹이듯 비용·경쟁이 이익을 서서히 녹인다. 단순 감소(reduce/decrease)와 달리 지속적이고 진행 중인 과정을 강조. erode(침식하다, 지질학적) vs eat into(먹어 들어가다, 더 능동적·생물학적)—eat into는 위협 주체의 공격성을 강조. 이미지: 🦠 세균이 치즈를 서서히 갉아먹듯, 비용이 이익 덩어리를 조금씩 잠식하는 장면.',diff:1,ex:'Rising labor costs and energy bills continue to <b>eat into</b> grocery retailers\' margins, which already average just 2 to 4 percent across the EU-11.',},
  {id:'ph2',type:'PHRASAL',word:'zero in on',pron:'[ˈzɪərəʊ ɪn ɒn]',ko:'~에 정확히 초점을 맞추다; (소비자 세그먼트·전략 우선순위를) 정밀하게 겨냥하다',nuance:'군사 포격(artillery)에서 유래—사격 범위를 좁혀가며 정확히 목표에 영점(zero)을 맞추는 조정 과정. 막연한 시장 공략이 아닌 특정 cohort를 정밀 식별하는 전략. focus on(넓게 집중) vs zero in on(점점 좁혀가며 정밀 조준)—zero in on은 점진적 정밀화의 과정. hone in on(감각으로 찾아가다)과 유사하나 zero in on은 데이터·수치 기반 정밀도를 강조. 이미지: 🎯 망원경 십자선이 과녁 정중앙으로 수렴하는 장면—분산에서 집중으로.',diff:1,ex:'Grocers that <b>zero in on</b> the millennial and higher-income shopper segment are gaining market share by offering premium private labels and differentiated fresh products.',},
  {id:'ph3',type:'PHRASAL',word:'hold up',pron:'[həʊld ʌp]',ko:'(예상과 달리) 버티다, 유지되다; 역풍 속에서도 수요·매출이 예상보다 견고하게 유지되다',nuance:'Old English healdan(유지하다) + up(위로). 중력에 맞서 물건을 위로 지탱하는 이미지—아래로 끌어당기는 힘이 있음에도 쓰러지지 않는 것. 경제 분석에서 "volumes holding up" = 인플레이션·소비 위축 압박에도 거래 수량이 예상보다 안정적임을 표현. hold on(어렵게 버티며 자리 지키기) vs hold up(환경 변화에도 성과가 버텨내기)—hold up은 성과 지속성의 놀라움을 내포. 이미지: 💪 천장을 떠받치는 기둥—무너질 것 같아도 여전히 버티고 있다.',diff:1,ex:'Despite inflation fatigue across the EU-11, volume growth in the discounter segment <b>held up</b> at positive territory in 2025, outperforming hypermarkets and supermarkets.',},
  {id:'ph4',type:'PHRASAL',word:'squeeze out',pron:'[skwiːz aʊt]',ko:'압박하여 (시장에서) 밀어내다; 원가 압박과 경쟁으로 중간 형태를 퇴출시키다',nuance:'물리적으로 짜서(squeeze) 밖으로(out) 밀어내는 이미지—손수건에서 물을 짜내듯. 유통 맥락에서는 \'중간 지대의 소멸\'—할인점과 온라인이 전통 슈퍼마켓을 양방향으로 압착해 퇴출. crowd out(자금·주의를 선점해 밀어내기) vs squeeze out(직접 압착으로 밀어내기)—squeeze out은 물리적·전략적 압착의 폭력성을 내포. 이미지: 🍋 양쪽에서 레몬을 쥐어짜 과즙을 완전히 뽑아내는 동작.',diff:1,ex:'Discounters and online channels are gradually <b>squeezing out</b> mid-market supermarket formats that can no longer compete on price or differentiate through quality and innovation.',},
  {id:'ph5',type:'PHRASAL',word:'lap up',pron:'[læp ʌp]',ko:'열렬히 받아들이다, 탐욕스럽게 즐기다; (소비자가) 새로운 트렌드·제품을 빠르게 흡수하다',nuance:'고양이가 혀로 우유를 핥아 마시는(lap) 장면—거부감 없이 빠르게, 즐겁게, 모두 흡수하는 것. "consumers lapping up premium private labels" = PB를 소비자들이 의심 없이 열렬히 받아들이고 있다는 뉘앙스. embrace(의식적으로 받아들이다) vs lap up(본능적·즉각적으로 흡수하다)—lap up은 더 탐욕적이고 즐거운 수용. 이미지: 🐱 그릇의 우유를 혀로 핥아 비우는 고양이—빠르고 완전한 흡수.',diff:2,ex:'European consumers are <b>lapping up</b> premium private label offerings—UK shoppers drove premium PL tiers to 9 percent annual growth—signaling that own brands can command aspirational positioning.',},
  {id:'ph6',type:'PHRASAL',word:'draw down',pron:'[drɔː daʊn]',ko:'(저축·잉여금·완충재를) 서서히 소진하다; 비축된 자원을 점진적으로 끌어내어 사용하다',nuance:'draw(끌어내다) + down(고갈로). 군사적으로 병력 철수(military drawdown), 금융적으로 대출 한도를 실제 인출하는 것. 식품 소매에서: 코로나 기간 쌓인 가계 저축이 인플레이션으로 소진되고 있는 구조. draw on(자원을 활용하다, 긍정적 뉘앙스)과 달리 draw down은 한정 자원의 점진적 소모를 강조. 이미지: 🛢️ 기름탱크 눈금이 서서히 내려가는 계기판—채울 수 없는 속도로 소비되는 저장량.',diff:2,ex:'European households are <b>drawing down</b> pandemic-era savings, pushing consumer confidence lower and intensifying pressure on grocers to demonstrate clear price-value alignment.',},

  /* ── IDIOM ── */
  {id:'id1',type:'IDIOM',word:'race to the bottom',pron:'[reɪs tə ðə ˈbɒtəm]',ko:'바닥을 향한 경쟁; 가격·품질·규제 기준을 서로 낮춰가며 경쟁하는 자기파괴적 싸움',nuance:'1933년 법학자 Louis Brandeis가 주(州) 기업법 완화 경쟁을 비판하며 처음 사용. 경제학에서: 과도한 가격 경쟁이 참여자 모두의 마진을 수익성 한계 이하로 끌어내리는 현상. 유럽 식료품에서 할인점 등장 이후 가격 전쟁이 전체 업계 EBIT를 잠식. race to the top(품질·혁신 상향) vs race to the bottom(가격·비용 하향). 이미지: 🏁 출발선이 지하실인 경주—이기는 사람이 가장 밑에 있다.',diff:1,ex:'Without private label innovation and AI differentiation, the CPG–retailer negotiation risks becoming a <b>race to the bottom</b> where margin destruction hurts both sides equally.',},
  {id:'id2',type:'IDIOM',word:'razor-thin margins',pron:'[ˈreɪzər θɪn ˈmɑːrdʒɪnz]',ko:'면도날처럼 얇은 마진; 식품 소매업의 극히 낮은 이익률(통상 2~5%)을 표현하는 관용 표현',nuance:'razor(면도날)의 두께—0.1mm 이하. 식료품 소매는 원자재·물류·인건비 이후 남는 이익이 전통적으로 2~5%대. 이 구조에서 1%포인트 변화는 전체 수익성의 20~50% 영향. 따라서 private label 확장, AI 비용 절감, retail media 수익화가 모두 생존 전략. paper-thin margins(더 일반적) vs razor-thin margins(날카로운 예리함과 위험 강조). 이미지: 🪒 면도날 옆모습—빛이 거의 통과하지 못할 만큼 얇은 단면.',diff:1,ex:'European grocers operate on <b>razor-thin margins</b> of 2 to 4 percent, making every cost optimization—from AI-powered replenishment to shrewder CPG negotiations—existential, not optional.',},
  {id:'id3',type:'IDIOM',word:'fly off the shelves',pron:'[flaɪ ɒf ðə ʃelvz]',ko:'날개 돋친 듯 팔리다; (제품이) 입고되자마자 빠르게 팔려 품절되다',nuance:'선반(shelf)에서 날아가버린다(fly off)—진열이 무의미할 만큼 빠른 판매 속도. FMCG(Fast-Moving Consumer Goods)의 개념 자체가 이 이미지. 현대적 분석: 어떤 제품이 "fly off the shelves"하는지 예측하는 것이 AI 수요 예측의 핵심 과제. sell well(잘 팔리다, 중립적) vs fly off the shelves(날개 돋친 듯, 극적 속도 강조). 이미지: 🛒💨 슈퍼마켓 진열대—손이 닿을 새도 없이 제품이 사라지는 장면.',diff:1,ex:'Retailers that invest in predictive AI inventory systems can ensure popular items don\'t go out of stock even when they <b>fly off the shelves</b> at peak demand.',},
  {id:'id4',type:'IDIOM',word:'zero-sum game',pron:'[ˈzɪərəʊ sʌm ɡeɪm]',ko:'제로섬 게임; 한쪽의 이익이 다른 쪽의 정확한 손실과 일치하여 총합이 0인 상황',nuance:'게임이론(Game Theory)의 핵심 개념. John von Neumann이 1944년 《게임이론과 경제 행동》에서 체계화. 원래는 수학적 정의—승자의 이득 = 패자의 손실, 합산 = 0. CPG-소매 관계에서: 한쪽이 더 나은 거래 조건을 얻으면 상대방은 정확히 그만큼 손해. positive-sum game(모두 이익, 파이를 키우는 협력) vs zero-sum game(파이 나눠 갖기). 이미지: ⚖️ 완벽히 균형잡힌 천칭—한쪽 올라가면 다른 쪽이 정확히 내려간다.',diff:1,ex:'Negotiations between CPGs and retailers have increasingly become a <b>zero-sum game</b> over margin, leaving both parties with lower overall value creation than in the past.',},
  {id:'id5',type:'IDIOM',word:'long game',pron:'[lɒŋ ɡeɪm]',ko:'장기전; 단기 성과보다 장기적 포지셔닝과 누적 우위에 집중하는 전략적 접근',nuance:'체스·크리켓·외교 등 장기 전략 게임에서 유래. 체스의 "endgame strategy"처럼 매 수가 즉각적 이익보다 수십 수 이후의 포지션을 겨냥. AI 투자 맥락: 단기 P&L 영향이 제한적이어도 데이터 축적·모델 학습·조직 역량이 쌓이면 3~5년 후 경쟁 우위로 발현. short game(즉각 결과 추구) vs long game(미래 포지션 누적). 이미지: ♟️ 지금 폰을 희생하더라도 5수 뒤의 킹을 겨냥하는 그랜드마스터.',diff:1,ex:'Early movers investing in agentic AI today are playing the <b>long game</b>: immediate EBIT impact may be modest, but learning advantages and operating model transformation will compound over time.',},
  {id:'id6',type:'IDIOM',word:'sweet spot',pron:'[swiːt spɒt]',ko:'스위트 스폿; 가격·품질·편의성 등 여러 요소가 최적으로 교차하는 이상적 지점',nuance:'야구·테니스에서 배트/라켓에서 가장 효율적으로 타격되는 점—최소 힘으로 최대 거리. 비유적으로: 두 개 이상의 트레이드오프에서 어느 쪽도 지나치게 희생하지 않는 최적 균형점. 식료품에서 "premium private label sweet spot" = 브랜드 대비 충분히 저렴하면서도 품질·이미지는 충분히 높은 가격대. optimal point(수학적) vs sweet spot(기분 좋은 최적 타격, 직관적 이미지). 이미지: 🎯 야구 배트 중간의 빨간 점—여기에 맞으면 공이 가장 멀리 날아간다.',diff:1,ex:'Premium private labels have found the <b>sweet spot</b> between aspirational quality and accessible price—growing 9 percent in the UK as consumers trade up without abandoning value consciousness.',},

  /* ── COLLOC ── */
  {id:'co1',type:'COLLOC',word:'private label',pron:'[ˈpraɪvɪt ˈleɪbəl]',ko:'자체 브랜드, PB(Private Brand); 제조업체 브랜드와 달리 소매업체가 직접 기획·판매하는 자체 상표 제품',nuance:'라틴 privatus(개인 소유) + label(표시). 브랜드가 제조사가 아닌 소매업체 이름. 역사: 19세기 영국 Great Atlantic & Pacific Tea Company가 최초 도입. EU-11에서 2025년 가치 점유율 40% 돌파—40년 전 10% 미만에서 급성장. 세대: economy(저가) → standard → premium free-from/organic → 이제 혁신 주도. manufacturer brand(national brand, NB) vs private label(own brand, OL)—premium PL은 NB의 시장까지 잠식. 이미지: 🏷️ 슈퍼마켓 로고가 찍힌 요거트 용기—포장 뒤에는 A브랜드 공장에서 나왔을 수도 있다.',diff:1,ex:'<b>Private labels</b> now account for 40 percent of grocery value across the EU-11, and in food categories, they are responsible for 70 percent of all new product launches and varieties.',},
  {id:'co2',type:'COLLOC',word:'retail media',pron:'[ˈriːteɪl ˈmiːdiə]',ko:'리테일 미디어; 소매업체가 자사 온·오프라인 플랫폼에서 CPG 등 브랜드에 광고 공간을 판매하는 고마진 수익 모델',nuance:'Amazon이 2012년부터 체계화하여 2022년 $37B 광고 매출로 구글·메타에 버금가는 규모로 성장. 소매업체 입장: first-party 쇼핑 데이터를 활용한 고정밀 타겟팅 광고. 광고주(CPG) 입장: 구매 시점에 가장 가까운 장소에서 광고. McKinsey는 이를 "가장 확장 가능한 adjacency"로 지목. display advertising(일반 디지털 광고) vs retail media(구매 데이터 기반, 판매 전환과 직접 연결). 이미지: 📺 슈퍼마켓 디지털 선반 광고—쇼핑 행동 데이터가 광고를 정조준한다.',diff:2,ex:'<b>Retail media</b> remains the most scalable adjacency opportunity for grocers, monetizing existing traffic and first-party data at structurally high margins with limited additional capital intensity.',},
  {id:'co3',type:'COLLOC',word:'basket size',pron:'[ˈbɑːskɪt saɪz]',ko:'장바구니 크기; 소비자가 한 번의 쇼핑에서 구매하는 평균 아이템 수 또는 금액',nuance:'물리적 장바구니(basket)의 용량에서 유래. 핵심 KPI: basket size × frequency = share of wallet. EU-11 2025: 장바구니 금액(basket size volume) –1.8%—인플레이션에도 구매 수량 자체는 줄고 있다는 신호. 두 차원: 수량(volume basket) vs 금액(value basket). 온라인에서 basket size는 오프라인보다 2~3배 크지만 주문 빈도가 낮음. average transaction value(ATV, 더 일반 소매용어) vs basket size(식품 소매 맥락의 표준 용어). 이미지: 🛒 두 개의 카트—가득 찬 것(big basket) vs 소량 구매(top-up basket).',diff:1,ex:'Grocers tracking <b>basket size</b> across formats find that online channels attract larger baskets but fewer trips, while convenience stores drive frequent, smaller top-up missions.',},
  {id:'co4',type:'COLLOC',word:'category management',pron:'[ˈkætɪɡəri ˈmænɪdʒmənt]',ko:'카테고리 관리; 소매업체가 특정 제품 군을 하나의 전략 단위로 관리해 최적 구색·가격·진열을 결정하는 방법론',nuance:'1980년대 P&G와 월마트의 협력에서 체계화. 핵심 원리: 제품을 개별 SKU가 아닌 소비자 니즈 중심의 \'카테고리\'(예: 아침식사, 건강간식)로 묶어 전체 최적화. CPG 관계에서 "joint category management"는 소매업체와 제조사가 데이터를 공유해 win-win 구색을 설계하는 협력 모델. assortment planning(상품 구색 계획, 더 좁음) vs category management(카테고리 전체의 전략적 접근—가격·프로모·진열 포함). 이미지: 🗺️ 슈퍼마켓 통로를 하나의 사업 단위로 바라보는 레고 블록 지도.',diff:2,ex:'To improve economics, grocers could engage CPGs in more disciplined <b>category management</b>, using shared data to optimize assortment and reduce promotional waste.',},
  {id:'co5',type:'COLLOC',word:'price gap',pron:'[praɪs ɡæp]',ko:'가격 격차; 자체 브랜드(PL)와 제조사 브랜드(NB) 사이의 가격 차이, 즉 브랜드 프리미엄의 크기',nuance:'gap(간격) + price(가격). Europanel 데이터: 빠르게 성장하는 브랜드의 PL 대비 가격 지수 175(2019) → 155(2023)로 축소. 핵심 역학: 가격 격차가 좁아지면 소비자는 브랜드로 돌아오고, 벌어지면 PL로 이탈. 브랜드의 생존 전략은 이 격차가 \'정당화될 만큼\' 충분한 기능적·감성적 가치를 제공하는 것. price premium(브랜드 우월성에 대한 추가 지불, 긍정적 프레이밍) vs price gap(소비자가 인식하는 차이, 중립/부정적). 이미지: 📏 두 제품 사이의 눈금자—격차가 좁아질수록 소비자의 브랜드 이탈 유혹이 커진다.',diff:2,ex:'Brands that allowed the <b>price gap</b> with private labels to widen lost significant market share, while those that narrowed it through innovation and value communication gained ground.',},
  {id:'co6',type:'COLLOC',word:'value share',pron:'[ˈvæljuː ʃeər]',ko:'가치 점유율; 금액(매출액) 기준으로 측정한 시장 점유율 (수량 기준 볼륨 점유율과 구분)',nuance:'share(점유율) + value(금액). 두 가지 점유율: volume share(거래 수량/단위 기준) vs value share(판매 금액 기준). 프리미엄 제품은 volume share < value share, 할인 제품은 volume share > value share. EU-11 PL 가치 점유율 40%: 수량으로는 50%에 가까울 수 있음. 전략적 함의: value share를 높이려면 프리미엄화가 효과적. market share(일반적 개념) vs value share(금액 측정의 특정성). 이미지: 💰🍰 케이크 조각 크기가 아니라 케이크 가격의 몇 %를 차지하는가—더 비싼 조각이 더 작아도 value share는 클 수 있다.',diff:2,ex:'Private labels reached a 40 percent <b>value share</b> across the EU-11 in 2025, with Spain and the Netherlands experiencing particularly strong uplifts, driven by higher average prices and range expansion.',},
  {id:'co7',type:'COLLOC',word:'assortment',pron:'[əˈsɔːrtmənt]',ko:'구색, 어소트먼트; 소매업체가 제공하는 제품 종류의 넓이와 깊이—어떤 카테고리를 몇 개의 SKU로 구성하는가',nuance:'French assortir(어울리게 배열하다). 두 차원: breadth(카테고리 수, 가로) × depth(카테고리당 SKU 수, 세로). 할인점(discounter)은 좁고 얕음(<4,000 SKU)—단순화가 강점. 슈퍼마켓은 넓고 깊음(10,000+ SKU). CPG 관계에서 "diversity of assortment offered"가 PL 성장 드라이버로 명시. selection(소비자 관점, 선택할 수 있는 것들) vs assortment(소매업체 관점, 전략적으로 설계한 구색). 이미지: 🎨 팔레트—색깔(카테고리) 수와 각 색깔의 농도(SKU 깊이)로 구성된 제품 구색.',diff:2,ex:'Private label growth is no longer driven by price alone but by the diversity of <b>assortment</b> offered—budget, premium, free-from, organic, and local options across every major category.',},

  {id:'vo1',type:'VOCAB',word:'discounter',pron:'[dɪsˈkaʊntər]',ko:'할인 전문 소매업체; ALDI·Lidl·Biedronka처럼 제한적 SKU, 고효율 운영, 낮은 가격을 핵심 모델로 삼는 식품 소매 형태',nuance:'discount(할인) + -er(행위자). 1946년 Karl Albrecht(ALDI Nord 창업자)가 전쟁 직후 독일에서 극도의 단순화 모델 창안: 카테고리당 1~2개 SKU, 종이박스 진열, 팔레트 판매. \'하드 디스카운터(hard discounter)\'와 \'소프트 디스카운터(soft discounter)\' 구분. EU-11 2025 성장률 5.0%—슈퍼마켓(2.9%)·하이퍼마켓(1.1%)을 압도. hypermarket(대형, 다품목, 고서비스) vs supermarket(중형, 중품목) vs discounter(소/대형, 소품목, 저가). 이미지: 🟡 노란 ALDI 봉투—극도의 단순함으로 최저가를 달성하는 독일식 효율.',diff:1,ex:'<b>Discounters</b> grew revenues by 5.0 percent across the EU-11 in 2025, nearly double the rate of supermarkets, as price-sensitive European consumers shifted baskets toward the hard-discount channel.',},
  {id:'vo2',type:'VOCAB',word:'hypermarket',pron:'[ˈhaɪpəmɑːrkɪt]',ko:'하이퍼마켓; 식품과 비식품(의류·가전·가구)을 함께 판매하는 대형(2,500m² 이상) 단일 지붕 소매 형태. 카르푸·오샹이 대표',nuance:'Greek hyper(초월하다) + market. 1963년 프랑스 카르푸(Carrefour)가 최초 도입. "한 지붕 아래 모든 것(everything under one roof)" 철학. 문제: 2025년 EU-11 하이퍼마켓 성장률 1.1%, 공간도 –0.2% 감소. 온라인 채널과 할인점의 협공으로 가장 심한 포맷 쇠퇴. supermarket(2,500m² 이하, 주로 식품) vs hypermarket(2,500m² 이상, 식품+비식품). 이미지: 🏟️ 비행기 격납고 크기의 매장—거대하지만 지금은 시대에 맞지 않는 공룡.',diff:1,ex:'The <b>hypermarket</b> format continues to lose ground across the EU-11, declining in both revenue growth and floor space as online channels absorb non-food categories and discounters capture everyday missions.',},
  {id:'vo3',type:'VOCAB',word:'foodservice',pron:'[ˈfuːdˌsɜːrvɪs]',ko:'푸드서비스, 외식 서비스업; 식당·카페·학교·병원·배달 등 집 밖에서 음식을 준비·판매하는 전체 채널',nuance:'food(음식) + service(서비스). out-of-home(OOH) eating의 산업적 명칭. EU-11 2025 성장률 4.3%—현대 식료품 소매(3.6%)를 앞지름. 밀레니얼·Z세대의 "food-to-go" 소비 증가가 드라이버. 슈퍼마켓의 즉석식품(ready-to-eat) 섹션, 카페테리아, 온라인 배달 모두 포함. food retail(식품 소매, 집에서 조리) vs foodservice(집 밖에서 소비 또는 배달). 이미지: 🍜 식당 주방에서 포장 용기에 담기는 음식—소비자가 집에 가져가거나 바로 먹는 것.',diff:1,ex:'<b>Foodservice</b> outpaced modern grocery retail growth at 4.3 percent across the EU-11 in 2025, as younger consumers increasingly choose ready-to-eat and food-to-go formats over home cooking.',},
  {id:'vo4',type:'VOCAB',word:'replenishment',pron:'[rɪˈplenɪʃmənt]',ko:'재고 보충, 리플레니시먼트; 판매된 재고를 적시에 재주문·재입고하는 공급망의 핵심 프로세스',nuance:'Latin re-(다시) + plenus(가득한). 소매 운영의 생명선—진열대가 비면 판매 기회 손실(out-of-stock). 두 모델: push replenishment(예측 기반 사전 보충) vs pull replenishment(판매 데이터 기반 실시간 보충). AI 에이전트가 가장 먼저 자동화하는 영역—재주문 임계치 모니터링, 공급업체 발주, 배송 지연 예외처리. reorder(재주문, 더 단순) vs replenishment(프로세스 전체의 전략적 개념). 이미지: 🔁 컨베이어 벨트에서 빈 선반으로 자동 보충되는 제품들—끊임없는 순환.',diff:2,ex:'Several grocers are already experiencing early benefits from agentic AI in automated negotiations, category performance management, and <b>replenishment</b>—solving exceptions in ordering and managing supplier delivery delays.',},
  {id:'vo5',type:'VOCAB',word:'substitution',pron:'[ˌsʌbstɪˈtjuːʃən]',ko:'대체; 소비자가 선호 제품 대신 더 저렴하거나 가용한 대안으로 전환하는 행동 (채널·브랜드·형태 대체 모두 포함)',nuance:'Latin sub-(아래에) + statuere(두다). \'아래에 대신 놓는 것\'. 경제학에서 substitution effect: 가격 상승 시 소비자가 대체재로 전환하는 현상. 소매에서 세 가지 유형: ① brand substitution (NB→PL), ② format substitution (슈퍼마켓→할인점), ③ category substitution (레스토랑→즉석식품). McKinsey: "substitution effectiveness"가 온라인 채널 개선의 핵심 지표. trade-down(고가→저가로 내려가는 대체) vs substitution(대체 자체, 방향 불문). 이미지: 🔄 선반에서 A를 들고 B를 집는 손—의사결정의 순간.',diff:2,ex:'Understanding <b>substitution</b> patterns—when shoppers switch from national brands to private labels or from supermarkets to discounters—is now critical input for both assortment design and CPG partnership strategy.',},
  {id:'vo6',type:'VOCAB',word:'penetration',pron:'[ˌpenɪˈtreɪʃən]',ko:'침투율; 특정 제품·채널·서비스를 사용하는 가구 또는 소비자의 비율 (vs. 구매 빈도나 구매량과 구분)',nuance:'Latin penetrare(안으로 들어가다). 마케팅 지표: 전체 잠재 소비자 중 실제 구매 경험이 있는 비율. Byron Sharp의 "How Brands Grow"(2010)에서 브랜드 성장의 핵심은 heavy user 확보가 아닌 penetration 확대임을 입증. AI 침투: EU 소비자 12%가 식료품 AI 도구 경험—Gen Z(30%) vs baby boomers(5%). penetration(얼마나 많은 사람이 사용하나) vs frequency(얼마나 자주) vs basket size(얼마나 많이). 이미지: 🌊 파도가 해안선을 따라 얼마나 깊숙이 들어오는가—파도의 넓이 × 깊이.',diff:2,ex:'While 12 percent of consumers have tried AI tools for grocery shopping, overall <b>penetration</b> remains low among older demographics, with baby boomers at just 5 percent compared to 30 percent of Gen Z.',},
  {id:'vo7',type:'VOCAB',word:'footfall',pron:'[ˈfʊtfɔːl]',ko:'방문객 수, 유동 인구; 매장을 방문하는 고객의 수. 오프라인 소매 성과의 핵심 선행 지표',nuance:'foot(발) + fall(떨어지다, 발 딛다). 발자국이 바닥에 떨어지는 수 = 방문자 수. 영국 소매업 용어가 글로벌 업계 표준으로 정착. footfall counter: 매장 입구 센서로 일일 방문자 수 측정. 전략적 함의: footfall × conversion rate × average basket = 매출. 온라인 전환 압박 속 오프라인 footfall 유지는 소매업체의 핵심 과제. traffic(미국식, 더 광의) vs footfall(영국식, 오프라인 물리적 방문에 특화). 이미지: 👣 매장 입구 바닥의 발자국들—하루에 얼마나 많은 발이 밟고 지나갔는가.',diff:2,ex:'As online channels take share from physical stores, retailers are investing in fresh, foodservice, and health propositions to protect <b>footfall</b> and convert store visits into larger basket transactions.',},
  {id:'vo8',type:'VOCAB',word:'agentic commerce',pron:'[eɪˈdʒentɪk ˈkɒmɜːrs]',ko:'에이전트형 커머스; AI 에이전트가 소비자 대신 자율적으로 검색·비교·구매를 실행하는 새로운 쇼핑 패러다임',nuance:'agent(대리인, 자율적 행위자) + commerce(상거래). 2024~2025년 AI 에이전트 확산과 함께 등장. 소비자의 \'쇼핑 행위\'가 인간의 개별 결정에서 AI의 자율 실행으로 이전. By 2030: 전 세계 B2C 리테일 소비의 $3T~$5T가 AI 에이전트에 의해 실행될 전망(McKinsey). 소매업체 전략 전환 요구: "clean data becomes the digital equivalent of shelf space." e-commerce(인간이 마우스 클릭) vs agentic commerce(AI가 대신 결정·주문). 이미지: 🤖🛒 스마트폰 AI가 냉장고를 스캔하고 자동으로 장보기 목록을 주문하는 장면.',diff:3,ex:'<b>Agentic commerce</b> gives grocers strategic choices to make: control the consumer interface directly, or participate in third-party agent ecosystems—trading proprietary data advantage for broader reach.',},
  {id:'vo9',type:'VOCAB',word:'deflation',pron:'[dɪˈfleɪʃən]',ko:'디플레이션, 가격 하락; 식료품 맥락에서 가격 상승 추세가 꺾이거나 실질 성장이 인플레이션에 가려지는 현상',nuance:'Latin de-(아래로) + flare(불다). 풍선에서 바람이 빠지듯 가격·경기가 하강. 거시경제적 deflation(전반적 물가 하락)과 달리, 식료품에서는 food price deflation이 특정 카테고리에서 발생. EU-11 2025 "grocery retail deflated value growth" +0.5%: 인플레이션 조정 후 실질 성장이 거의 0에 가까움. 위험성: 매출 성장이 실질 판매 확대 없이 가격 인상에 의존했다면, 가격 안정화 국면에서 성장률이 급락. inflation(가격 상승) vs deflation(가격 하락/안정화). 이미지: 🎈 바람 빠지는 풍선—고물가 시대가 지나며 가격 모멘텀이 꺼지는 국면.',diff:2,ex:'Food price <b>deflation</b> in categories like fresh produce poses a structural challenge for grocers whose recent revenue growth was partly driven by passing supplier cost increases on to consumers.',},

  {id:'bz1',type:'BIZ',word:'CPG',pron:'[siː piː dʒiː]',ko:'Consumer Packaged Goods; 소비자용 포장 제품 제조업체. 네슬레·유니레버·P&G처럼 식음료·생활용품을 대량 생산해 소매채널을 통해 판매하는 기업',nuance:'Consumer(소비자) + Packaged(포장된) + Goods(제품). 미국식 표현; 유럽에서는 FMCG(Fast-Moving Consumer Goods)를 더 일반적으로 사용. 공통점: 높은 생산량, 빠른 회전, 표준화된 포장, 강력한 브랜드. 소매업체와의 관계: 입점 협상(listing fee), 판촉 협력(joint promotional planning), 공간 배분(shelf space). 2020년대 도전: 사모 PL 성장 + 소규모 DTC(Direct-to-Consumer) 브랜드의 양면 협공. CPG manufacturer(제조사) vs private label(소매업체 자체 생산). 이미지: 🏭 대형 공장에서 컨베이어 벨트를 따라 쏟아지는 똑같은 포장의 제품들.',diff:1,ex:'Large <b>CPGs</b> are losing market share both to private labels on price and to smaller brands on functionality and innovation, compressing their margins and weakening negotiating leverage with retailers.',},
  {id:'bz2',type:'BIZ',word:'EU-11',pron:'[iː juː ɪˈlevən]',ko:'유럽 11개국 표본; 이 McKinsey 보고서에서 사용하는 유럽 식품 소매 분석의 기준 국가군 (벨기에·체코·프랑스·독일·이탈리아·네덜란드·폴란드·포르투갈·스페인·스웨덴·영국)',nuance:'EU-11은 이 보고서 특유의 약칭. 영국(Brexit 이후 EU 비회원국)을 포함하는 실용적 유럽 소비 시장 정의. Europanel·Eurostat·GfK 데이터로 구성. 보고서의 모든 "European average" 수치는 이 11개국을 총 식품 소매 매출로 가중 평균한 값. EU-27(전체 EU 회원국) vs EU-11(식품 소매 데이터 가용 주요 시장). 이미지: 🗺️ 유럽 지도에 11개 나라가 색칠된 분석 프레임—연구의 경계선.',diff:1,ex:'Across the <b>EU-11</b>, grocery retail value grew 3.4 percent in 2025, led by Central and Eastern European markets such as Poland and Czech Republic while Germany and France lagged behind.',},
  {id:'bz3',type:'BIZ',word:'NielsenIQ',pron:'[ˈniːlsən aɪ kjuː]',ko:'닐슨IQ; 글로벌 소비재 데이터 분석 기업. 신제품 출시·유통 점유율·소비자 패널 등 FMCG/CPG 산업의 핵심 데이터 소스',nuance:'Arthur C. Nielsen이 1923년 미국에서 창업. 100년 역사의 마케팅 리서치 선구자. 2021년 Advent International에 매각 후 \'NielsenIQ\'로 리브랜딩(IQ = Intelligence). 전 세계 90개국 데이터 커버리지, 소매 판매 + 소비자 패널 + 디지털 쇼핑 통합. 본 보고서 Exhibit 11(신제품 출시 비중) 데이터 제공. IRI(동종 경쟁사, 2023년 합병) vs NielsenIQ(글로벌 리더). 이미지: 📊 바코드 스캐너가 전 세계 매장에서 동시에 수집하는 실시간 판매 데이터—닐슨의 글로벌 신경망.',diff:2,ex:'According to <b>NielsenIQ</b> data, private labels account for 44 percent of all new product launches in Western Europe and as high as 70 percent in the food grocery category.',},
  {id:'bz4',type:'BIZ',word:'HICP',pron:'[eɪtʃ aɪ siː piː]',ko:'Harmonized Index of Consumer Prices; 유럽 조화 소비자 물가 지수. EU 회원국 간 인플레이션을 비교 가능하게 표준화한 Eurostat 공식 지표',nuance:'Harmonized(조화된, 비교 가능하게 표준화) + Index of Consumer Prices. ECB(유럽중앙은행)의 통화 정책 기준 지표—목표 인플레이션 2% 근방 유지. 각 국가 CPI(Consumer Price Index)와 달리 방법론을 통일해 국가 간 직접 비교 가능. 이 보고서에서 "deflated value growth" 계산에 사용—명목 성장에서 HICP를 빼면 실질 성장. CPI(국가별, 방법론 상이) vs HICP(EU 표준화, 국가 간 비교 가능). 이미지: 🇪🇺📈 유럽 지도 위 통일된 눈금자—27개국을 하나의 잣대로 재는 인플레이션 측정기.',diff:3,ex:'Grocery retail deflated value growth, calculated by adjusting for <b>HICP</b>, came in at just 0.5 percent across the EU-11, revealing that much of the headline revenue growth was price-driven rather than volume-driven.',},
  {id:'bz5',type:'BIZ',word:'EuroCommerce',pron:'[ˌjʊərəʊˈkɒmɜːrs]',ko:'유로커머스; 유럽 소매·도매 업계를 대표하는 브뤼셀 소재 무역 협회. 36개국 5.4백만 개 소매·도매 기업 대변',nuance:'Euro(유럽) + Commerce(상업). 1993년 설립, EU 기관(유럽 의회·집행위원회)에 유통업계 이익 대변. 회원사: Carrefour, Ahold Delhaize, Lidl, Rewe 등 유럽 주요 소매업체. 본 보고서의 공동 발행 파트너—McKinsey(분석) + EuroCommerce(업계 관점) + Europanel(데이터). CIES(글로벌 식품 소매 단체) vs EuroCommerce(유럽 소매·도매 포괄, 더 광범위). 이미지: 🏛️ 브뤼셀 EU 본부 건물 옆 소매업계 대표단—유럽 정책 입안에 업계 목소리를 전달하는 창구.',diff:2,ex:'This report is jointly published by McKinsey and <b>EuroCommerce</b>, the trade association representing 5.4 million retail and wholesale companies across 36 European countries.',},
  {id:'bz6',type:'BIZ',word:'Europanel',pron:'[ˌjʊərəʊˈpænəl]',ko:'유로패널; 유럽 전역의 소비자 구매 행동을 추적하는 크로스-국가 패널 데이터 서비스. GfK·Kantar가 공동 운영',nuance:'Euro(유럽) + panel(소비자 패널). GfK(독일)와 Kantar(영국)가 공동으로 운영하는 유럽 최대 소비자 패널. 12개국 이상, 수만 가구가 스캐너로 모든 구매를 기록. 본 보고서의 핵심 데이터 소스—PL 가치 점유율, 바스켓 크기, 브랜드 가격 프리미엄 모두 Europanel 데이터. IRI Liquid Data(소매 POS 데이터 기반) vs Europanel(소비자 패널 = 가구별 구매 행동 기반). 이미지: 🏠📱 수만 가구가 집에서 구매한 식품 바코드를 스캔하는 장면—집 안에서 관찰되는 유럽 소비 지도.',diff:2,ex:'<b>Europanel</b> data reveals that the private label price gap with national brands narrowed for the fastest-growing brands between 2019 and 2023, confirming that price competitiveness drives share recovery.',},

let currentFilter='ALL';

function renderCards(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const visible=cards.filter(c=>currentFilter==='ALL'||c.type===currentFilter);
  document.getElementById('visCount').textContent=visible.length;
  visible.forEach(c=>{
    const isLearned=learned.has(c.id);
    const dots=[1,2,3].map(i=>`<div class="dot ${i<=c.diff?'on':'off'}"></div>`).join('');
    const wrap=document.createElement('div');
    wrap.className='card-wrap'+(isLearned?' learned':'');
    wrap.dataset.id=c.id;
    wrap.innerHTML=`
      <div class="card-inner">
        <div class="front">
          <span class="tag tag-${c.type}">${c.type}</span>
          <div class="word">${c.word}</div>
          <div class="pron">${c.pron}</div>
          <div class="ko">${c.ko}</div>
          <div class="diff-row">${dots}<span class="flip-hint">탭하여 뒤집기 →</span></div>
        </div>
        <div class="back">
          <div class="nuance">${c.nuance}</div>
          <div class="ex-label">EXAMPLE</div>
          <div class="ex">${c.ex}</div>
          <button class="learned-btn ${isLearned?'done':'undone'}" data-id="${c.id}">
            ${isLearned?'✓ 학습 완료':'학습 완료로 표시'}
          </button>
        </div>
      </div>`;
    wrap.addEventListener('click',e=>{
      if(e.target.classList.contains('learned-btn'))return;
      wrap.classList.toggle('flipped');
    });
    wrap.querySelector('.learned-btn').addEventListener('click',e=>{
      e.stopPropagation();
      const id=e.target.dataset.id;
      if(learned.has(id)){learned.delete(id);}else{learned.add(id);}
      localStorage.setItem(STORE,JSON.stringify([...learned]));
      renderCards();
      updateProgress();
    });
    grid.appendChild(wrap);
  });
  updateProgress();
}

function updateProgress(){
  const total=cards.length;
  const done=learned.size;
  const pct=Math.round(done/total*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progText').textContent=`${done} / ${total} 학습`;
}

document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.f;
    renderCards();
  });
});

renderCards();
</script>
