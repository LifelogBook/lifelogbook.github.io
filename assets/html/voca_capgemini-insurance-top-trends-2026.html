  .progress-text {

    -webkit-backface-visibility: hidden;
    overflow: hidden;

    tags: ['Salesforce', 'customer data', 'pipeline management'],
  },
  {
    id: 35, cat: 'biz', catLabel: '비즈니스 전용', diff: 2,
    word: 'SCS',
    pron: '/es siː es/',
    ko: 'Severe Convective Storms — 심각한 대류 폭풍 (토네이도·우박·강풍·번개 등)',
    ex: '"41% of global insured catastrophe losses in 2024 were caused by Severe Convective Storms (SCS) peril."',
    nuance: '기상 현상에서 대기 불안정으로 발생하는 폭풍우. 허리케인·지진과 달리 예측이 어렵고 여러 지역에 동시 발생. 2020년대 들어 보험 업계에서 최대 cat 리스크로 부상.',
    origin: 'Severe(심각한) + Convective(대류의) + Storms(폭풍). 기상학·재보험 용어.',
    tags: ['cat event', 'secondary peril', 'NatCat', 'hail storm'],
  },
];

/* ─── RENDER ─── */
function renderCards(filter = 'all') {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? cards : cards.filter(c => c.cat === filter);
  filtered.forEach(c => {
    const isLearned = learnedSet.has(c.id);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (isLearned ? ' learned' : '');
    wrap.dataset.id = c.id;
    wrap.dataset.cat = c.cat;

    const catClass = `cat-${c.cat}`;
    const dots = [1,2,3].map(d =>
      `<div class="dot${d <= c.diff ? ' filled' : ''}"></div>`
    ).join('');

    wrap.innerHTML = `
      <div class="card${isLearned ? ' flipped' : ''}" id="card${c.id}">
        <div class="face front" onclick="flipCard(${c.id})">
          <span class="learned-badge">✓ 학습완료</span>
          <div class="front-top">
            <span class="cat-badge ${catClass}">${c.catLabel}</span>
            <div class="dots">${dots}</div>
          </div>
          <div class="word">${c.word}</div>
          ${c.pron ? `<div class="pronunciation">${c.pron}</div>` : ''}
          <div class="meaning-ko">${c.ko}</div>
          <div class="example">${c.ex}</div>
          <div class="flip-hint">탭하여 뒤집기 →</div>
        </div>
        <div class="face back" onclick="flipCard(${c.id})">
          <div class="back-word">${c.word}</div>
          <div class="back-section-label">뉘앙스 & 용법</div>
          <div class="back-content">${c.nuance}</div>
          <div class="back-section-label">어원 / 비교</div>
          <div class="back-content">${c.origin}</div>
          <div style="margin-top:4px">
            ${c.tags.map(t => `<span class="back-tag">${t}</span>`).join('')}
          </div>
          <button class="learn-btn${isLearned ? ' done' : ''}" onclick="event.stopPropagation();toggleLearn(${c.id})">
            ${isLearned ? '✓ 학습완료' : '학습완료 체크'}
          </button>
        </div>
      </div>
    `;
    grid.appendChild(wrap);
  });
  updateProgress();
}

function flipCard(id) {
  document.getElementById('card' + id).classList.toggle('flipped');
}

function toggleLearn(id) {
  if (learnedSet.has(id)) {
    learnedSet.delete(id);
  } else {
    learnedSet.add(id);
  }
  localStorage.setItem('ins26_learned', JSON.stringify([...learnedSet]));
  const btn = document.querySelector(`[data-id="${id}"] .learn-btn`);
  const wrap = document.querySelector(`[data-id="${id}"]`);
  if (btn) {
    btn.textContent = learnedSet.has(id) ? '✓ 학습완료' : '학습완료 체크';
    btn.classList.toggle('done', learnedSet.has(id));
  }
  if (wrap) {
    wrap.classList.toggle('learned', learnedSet.has(id));
  }
  updateProgress();
}

function updateProgress() {
  const total = cards.length;
  const done = learnedSet.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} 학습완료`;
}

function filterCards(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCards(cat);
}

renderCards();
</script>
</body>
</html>
