<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary — Building Next-Horizon AI Experiences</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a1628;
    --ink2: #1a3a6b;
    --accent: #0055b3;
    --accent2: #003d8a;
    --sky: #e8f2ff;
    --bg: #f8fbff;
    --border: #c5dcf5;
    --card-bg: #ffffff;
    --card-back: #0a1628;
    --learned-bg1: #f8fbff;
    --learned-bg2: #e8f2ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 50%, #0055b3 100%);
    color: #fff;
    padding: 28px 24px 22px;
    text-align: center;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.15rem, 3.5vw, 1.5rem);
    letter-spacing: .01em;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .badge {
    display: inline-block;
    background: transparent;
    border: 1.5px solid #c5dcf5;
    color: #c5dcf5;
    border-radius: 20px;
    padding: 3px 14px;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .controls { padding: 16px 16px 0; max-width: 900px; margin: 0 auto; }

  .progress-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #0080ff); transition: width .4s; }
  .progress-label { font-size: .78rem; color: var(--ink2); text-align: right; margin-bottom: 12px; font-weight: 500; }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--ink2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: .04em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    padding: 0 16px 32px;
    max-width: 900px;
    margin: 0 auto;
  }

  .card-wrap { perspective: 900px; }
  .card {
    position: relative;
    width: 100%;
    padding-top: 100%;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
  }
  .card-front {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
  }
  .card-back {
    background: var(--card-back);
    border: 1.5px solid #1a3a6b;
    transform: rotateY(180deg);
    color: #e8f2ff;
  }
  .card-wrap.learned .card-front {
    background: linear-gradient(135deg, var(--learned-bg1) 0%, var(--learned-bg2) 100%);
    border-color: var(--accent);
    opacity: .75;
  }

  .tag {
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: .09em;
    text-transform: uppercase;
    border-radius: 10px;
    padding: 2px 9px;
    margin-bottom: 10px;
    color: #fff;
  }
  .tag-phrasal  { background: #0055b3; }
  .tag-idiom    { background: #7c3aed; }
  .tag-colloc   { background: #065f46; }
  .tag-vocab    { background: #b45309; }
  .tag-biz      { background: #9b1c2e; }

  .word {
    font-family: 'DM Serif Display', serif;
    font-size: 1.18rem;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.25;
  }
  .pron { font-size: .72rem; color: #6b8ab0; margin-bottom: 4px; }
  .dots { display: flex; gap: 4px; margin-top: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .dot.on { background: var(--accent); }

  /* Back face */
  .back-ko { font-size: .92rem; font-weight: 600; color: #e8f2ff; margin-bottom: 8px; line-height: 1.4; }
  .back-nuance { font-size: .72rem; color: #93b8de; line-height: 1.5; }
  .back-example { font-size: .68rem; color: #6b8ab0; margin-top: 6px; font-style: italic; line-height: 1.4; }
  .learned-check {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: .7rem; color: transparent;
    transition: all .2s;
    z-index: 10;
  }
  .card-wrap.learned .learned-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
</style>
</head>
<body>

<header>
  <h1>Building Next-Horizon AI Experiences</h1>
  <div class="badge">McKinsey &amp; Company · 2026</div>
</header>

<div class="controls">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="bar" style="width:0%"></div></div>
  <div class="progress-label"><span id="learned-count">0</span> / 35 learned</div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">ALL (35)</button>
    <button class="filter-btn" data-filter="phrasal">PHRASAL (6)</button>
    <button class="filter-btn" data-filter="idiom">IDIOM (6)</button>
    <button class="filter-btn" data-filter="colloc">COLLOC (7)</button>
    <button class="filter-btn" data-filter="vocab">고급단어 (10)</button>
    <button class="filter-btn" data-filter="biz">비즈니스 (6)</button>
  </div>
</div>

<div id="grid"></div>

const learnedSet = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let activeFilter = 'all';

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const visible = activeFilter === 'all' ? cards : cards.filter(c => c.cat === activeFilter);
  visible.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (learnedSet.has(c.id) ? ' learned' : '');
    wrap.dataset.id = c.id;

    const dots = [1,2,3].map(i => `<div class="dot${i<=c.diff?' on':''}"></div>`).join('');
    const pronHtml = c.pron ? `<div class="pron">${c.pron}</div>` : '';

    wrap.innerHTML = `
      <div class="card" id="card-${c.id}">
        <div class="card-face card-front">
          <button class="learned-check" title="학습 완료">✓</button>
          <span class="tag tag-${c.cat}">${c.cat==='vocab'?'고급단어':c.cat==='biz'?'비즈니스':c.cat.toUpperCase()}</span>
          <div class="word">${c.word}</div>
          ${pronHtml}
          <div class="dots">${dots}</div>
        </div>
        <div class="card-face card-back">
          <div class="back-ko">${c.ko}</div>
          <div class="back-nuance">${c.nuance}</div>
          <div class="back-example">${c.example}</div>
        </div>
      </div>`;

    wrap.querySelector('.card').addEventListener('click', e => {
      if (e.target.closest('.learned-check')) return;
      wrap.querySelector('.card').classList.toggle('flipped');
    });
    wrap.querySelector('.learned-check').addEventListener('click', e => {
      e.stopPropagation();
      toggleLearned(c.id, wrap);
    });

    grid.appendChild(wrap);
  });
  updateProgress();
}

function toggleLearned(id, wrap) {
  if (learnedSet.has(id)) { learnedSet.delete(id); wrap.classList.remove('learned'); }
  else { learnedSet.add(id); wrap.classList.add('learned'); }
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...learnedSet]));
  updateProgress();
}

function updateProgress() {
  const total = cards.length;
  const done = learnedSet.size;
  document.getElementById('learned-count').textContent = done;
  document.getElementById('bar').style.width = (done/total*100) + '%';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

renderCards();
</script>
