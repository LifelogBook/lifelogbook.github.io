    pron: '', hint: 'brand/character as economic asset...',
    ko: 'IP: 지식재산 (Intellectual Property); 브랜드·캐릭터·콘텐츠의 경제적 자산화',
    en: 'Intellectual property — creative works, brand characters, or innovations legally protected and monetized as business assets.',
    ex: '"Pop Mart\'s Monsters IP accounts for more than a third of its revenue; this IP can become a multiproduct growth engine rather than a marketing asset."',
    diff: 1
  },
  {
    id: 'bz6', type: 'biz', word: 'UPI',
    pron: '', hint: 'India real-time payment rail...',
    ko: 'UPI: 통합결제인터페이스 (Unified Payments Interface); 인도 실시간 디지털 결제 인프라',
    en: 'India\'s government-backed real-time payment system that enables instant fund transfers for hundreds of millions of users.',
    ex: '"India\'s Unified Payments Interface provides real-time payments for hundreds of millions of users."',
    diff: 2
  }
];

function dots(n) {
  return [1,2,3].map(i => `<span class="diff-dot${i<=n?' on':''}"></span>`).join('');
}

function render(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach(c => {
    const hide = filter !== 'all' && c.type !== filter;
    const isLearned = learned.has(c.id);
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (hide ? ' hidden' : '');
    wrap.innerHTML = `
      <div class="card${isLearned?' learned':''}" id="card-${c.id}" onclick="flip('${c.id}',event)">
        <div class="card-face card-front">
          <span class="card-tag tag-${c.type}">${tagLabel(c.type)}</span>
          <div class="card-word">${c.word}</div>
          ${c.pron ? `<div class="card-pron">${c.pron}</div>` : ''}
          <div class="card-hint">${c.hint}</div>
          <span class="learned-badge">✓</span>
          <div class="diff-dots">${dots(c.diff)}</div>
          <button class="learn-btn" onclick="toggleLearn('${c.id}',event)">${isLearned?'학습 완료':'학습하기'}</button>
        </div>
        <div class="card-face card-back">
          <div class="def-ko">${c.ko}</div>
          <div class="def-en">${c.en}</div>
          ${c.ex ? `<div class="example">${c.ex}</div>` : ''}
        </div>
      </div>`;
    grid.appendChild(wrap);
  });
  updateProgress();
}

function tagLabel(t) {
  return {phrasal:'Phrasal Verb',idiom:'Idiom',colloc:'Collocation',vocab:'고급단어',biz:'비즈니스'}[t]||t;
}

function flip(id, e) {
  if (e.target.classList.contains('learn-btn')) return;
  document.getElementById('card-'+id).classList.toggle('flipped');
}

function toggleLearn(id, e) {
  e.stopPropagation();
  const card = document.getElementById('card-'+id);
  const btn = card.querySelector('.learn-btn');
  if (learned.has(id)) {
    learned.delete(id);
    card.classList.remove('learned');
    btn.textContent = '학습하기';
  } else {
    learned.add(id);
    card.classList.add('learned');
    btn.textContent = '학습 완료';
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
  updateProgress();
}

function updateProgress() {
  const total = cards.length;
  const done = learned.size;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = `${done} / ${total} 학습 완료`;
}

let current = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    current = btn.dataset.filter;
    render(current);
  });
});

render('all');
</script>
</body>
</html>
